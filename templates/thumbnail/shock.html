<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Thumbnail (shock)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1280px; height: 720px; overflow: hidden; font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif; }

    body {
      position: relative;
      background:
        radial-gradient(ellipse at 30% 30%, #ff3b3b 0%, #8a0000 60%, #2c0000 100%);
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* 斜めの装飾ライン */
    .diagonal {
      position: absolute;
      width: 200%;
      height: 80px;
      background: rgba(255, 240, 0, 0.12);
      top: -40px;
      left: -50%;
      transform: rotate(-8deg);
    }
    .diagonal.lower { top: auto; bottom: 80px; height: 60px; background: rgba(255,255,255,0.08); }

    /* キャプション帯（上部・小さめ） */
    .caption {
      position: absolute;
      top: 26px;
      left: 36px;
      padding: 6px 16px;
      background: #fff200;
      color: #b30000;
      font-size: 28px;
      font-weight: 900;
      border-radius: 6px;
      transform: skewX(-6deg);
      letter-spacing: 0.04em;
    }

    /* メインコピー */
    .main {
      position: absolute;
      top: 110px;
      left: 40px;
      right: 380px;
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: -0.01em;
      text-shadow:
        4px 4px 0 #000,
        -3px 3px 0 #000,
        3px -3px 0 #000,
        -3px -3px 0 #000,
        0 8px 18px rgba(0,0,0,0.7);
    }
    .main .l1 {
      display: inline-block;
      font-size: var(--main-fontsize);
      color: #fff;
      padding: 0 6px;
    }
    .main .emphasis {
      display: inline-block;
      background: #fff200;
      color: #b30000;
      padding: 0 14px;
      margin: 0 2px;
      transform: skewX(-6deg);
      box-shadow: 0 6px 0 #6b0000, 0 12px 24px rgba(0,0,0,0.55);
    }

    /* サブコピー（下） */
    .sub {
      position: absolute;
      bottom: 32px;
      left: 40px;
      right: 380px;
      font-size: 36px;
      font-weight: 800;
      color: #ffeb99;
      text-shadow: 2px 2px 0 #000, -2px 2px 0 #000, 0 4px 12px rgba(0,0,0,0.6);
    }

    /* 立ち絵（右下） */
    .character {
      position: absolute;
      right: -20px;
      bottom: 0;
      height: 100%;
      filter: drop-shadow(0 0 14px rgba(0,0,0,0.6)) drop-shadow(0 12px 28px rgba(0,0,0,0.5));
    }
    .character img {
      height: 100%;
      width: auto;
      object-fit: contain;
      display: block;
    }

    /* 速報バッジ（左下） */
    .badge {
      position: absolute;
      left: 36px;
      top: 70px;
      background: #000;
      color: #ff4d4d;
      border: 4px solid #ff4d4d;
      padding: 4px 14px;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 0.08em;
      transform: rotate(-3deg);
    }
  </style>
</head>
<body>
  <div class="diagonal"></div>
  <div class="diagonal lower"></div>

  <div class="badge">{{BADGE_TEXT}}</div>
  <div class="caption">{{CAPTION_TEXT}}</div>

  <div class="main" style="--main-fontsize: {{MAIN_FONTSIZE}}px;">
    {{MAIN_HTML}}
  </div>

  <div class="sub">{{SUB_TEXT}}</div>

  <div class="character">
    <img src="{{CHARACTER_IMAGE}}" alt="character" />
  </div>
</body>
</html>
