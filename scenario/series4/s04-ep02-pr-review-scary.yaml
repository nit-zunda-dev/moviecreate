title: "【シリーズ4 第2話】レビューコメントが怖いのだ｜エンジニアの現場あるあるから学ぶ英会話"

characters:
  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.22
      intonationScale: 1.12

  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.18
      intonationScale: 1.04

global:
  defaultSpeaker: "zundamon"
  defaultBackground: "./image/background/bg_security_lesson.png"
  videoFrame: "./docs/generate_scene_illustrations/hikei.png"
  slidesHtml: "./s04-ep02-pr-review-grammar-slides.html"
  voice:
    speedScale: 1.15
    postPhonemeLength: 0.08

output:
  fps: 30
  width: 1280
  height: 720

scenes:
  - id: "intro"
    slideIndex: 0
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "PRにコメントがついて、英語だらけで心臓がバクバクなのだ……！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "今日も3つだけ。レビューで揉めないための、短い型を覚えるわよ。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "Standupのときみたいに、型なら安心なのだ。"

  - id: "drama_review"
    slideIndex: 2
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "海外メンバーからコメントが来たわ。This approach seems fragile."
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "フラジャイル……け、脆弱ってことなのだ？ どこが、どう直せばいいのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "まずは確認の型。Could you clarify what you mean by fragile here?"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "クッド ユー クラリファイ ホワット ユー ミーン バイ フラジャイル ヒア、なのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ここは依頼の文法。Could you は丁寧なお願い、clarify の後に what you mean by で、相手の言葉の定義を聞きにいく。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "Could you clarify which part looks risky? みたいに、what のかわりに which part を置いても通じるわ。"

  - id: "suggest_point"
    slideIndex: 3
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "次は、自分がレビューするとき。Change this. だとキツいでしょ。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "命令みたいで、相手が凹むのだ……。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "2つ目。I suggest extracting this into a helper function."
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "アイ サジェスト エクストラクティング ディス イントゥ ア ヘルパー ファンクション、なのだ！"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "I suggest のあとは動名詞が基本。代替案を提案しているから、相手の顔を立てやすいの。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "I suggest adding a test for the edge case. も同じ型ね。"

  - id: "address_point"
    slideIndex: 4
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "最後は、対応する側の一言。コメントを放置すると不安になるから。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "すぐ直せるか分からないときもあるのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "3つ目。I'll address your feedback and push an update today."
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "アイル アドレス ユア フィードバック アンド プッシュ アン アップデート トゥデイ、なのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "address はここでは対応する、処理する、という意味。future は I'll address this in a follow-up PR. で、後続PRに回す宣言もできるわ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "不安を減らすのが仕事の英語。期限や条件を足すと、さらに親切ね。"

  - id: "replay"
    slideIndex: 6
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "実戦リプレイ。相手のコメントは、This approach seems fragile."
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "Could you clarify what you mean by fragile here?"
      - type: dialogue
        character: metan
        face: "通常"
        text: "じゃあレビュー側の返し。Change this. のかわりに？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "I suggest extracting this into a helper function."
      - type: dialogue
        character: metan
        face: "通常"
        text: "最後に、対応表明は？"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "I'll address your feedback and push an update today."

  - id: "ending"
    slideIndex: 7
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "今日の3フレーズは、確認・提案・対応の骨組み。相手の言葉を取りにいけば、怖いコメントも会話にできるわ。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "コメント欄が戦場じゃなくなる気がするのだ！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "次回は、障害対応の頭の真っ白シーン。We're investigating now. と ETA を組み合わせるわ。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "チャンネル登録と高評価、よろしくなのだ！"

