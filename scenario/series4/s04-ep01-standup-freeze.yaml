title: "【シリーズ4 第1話】Standupでフリーズしたのだ｜エンジニアの現場あるあるから学ぶ英会話"

characters:
  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.22
      intonationScale: 1.12

  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.18
      intonationScale: 1.04

global:
  defaultSpeaker: "zundamon"
  defaultBackground: "./image/background/bg_security_lesson.png"
  videoFrame: "./docs/generate_scene_illustrations/hikei.png"
  slidesHtml: "./s04-ep01-standup-grammar-slides.html"
  voice:
    speedScale: 1.15
    postPhonemeLength: 0.08

output:
  fps: 30
  width: 1280
  height: 720

scenes:
  - id: "intro"
    slideIndex: 0
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "朝会で急に英語で話し始められて、ずんだもんの脳が止まったのだ……！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "現場あるあるを使って、会議で使える英語を3つだけ覚えるわよ。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "3つなら、なんとかなる気がするのだ。"

  - id: "drama_standup"
    slideIndex: 2
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "じゃあ現場再現。海外メンバーから聞かれたわ。What are you working on today?"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "うっ……今日の作業は、ログイン画面のバグ修正なのだ。英語が出ないのだ。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "まず1つ目。I'm working on fixing a bug in the login page."
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "アイム ワーキング オン フィクシング ア バグ イン ザ ログイン ページ、なのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "いいわね。ここは文法で覚えるの。I am + 動詞ing で現在進行形、on は取り組み対象。だからタスクが変わっても使い回せるわ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "例えば、I'm working on writing test cases. や I'm working on improving CI speed. みたいに置き換えれば、別案件でもそのまま通用する。"

  - id: "blocked_point"
    slideIndex: 3
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "次の質問。Any blockers?"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "あるのだ。認証サーバーが不安定で、先に進めないのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "2つ目の鉄板。I'm blocked by an unstable auth server."
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "アイム ブロックト バイ アン アンステイブル オース サーバー、なのだ！"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "ここは受動態。I am blocked by で、自分のせいじゃなく外的要因で止まっていると伝えられる。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "レビューでも I'm blocked by unclear acceptance criteria. みたいに使えるから、障害対応専用フレーズじゃないの。"

  - id: "eta_point"
    slideIndex: 4
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "最後に聞かれがち。When can you finish it?"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "えっと、状況しだいなのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "3つ目。ETA is tomorrow afternoon if the server recovers."
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "イーティーエー イズ トゥモロー アフタヌーン イフ ザ サーバー リカバーズ、なのだ！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ETA は到着予定時刻の意味だけど、開発現場では完了見込みの意味でよく使うわ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そして if 節で条件を明示するのが文法の肝。ETA is Friday if review is completed today. みたいに、責任ある見積もりになる。"

  - id: "replay"
    slideIndex: 6
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "実戦リプレイいくわ。What are you working on today?"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "I'm working on fixing a bug in the login page."
      - type: dialogue
        character: metan
        face: "通常"
        text: "Any blockers?"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "I'm blocked by an unstable auth server."
      - type: dialogue
        character: metan
        face: "通常"
        text: "When can you finish it?"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "ETA is tomorrow afternoon if the server recovers."

  - id: "ending"
    slideIndex: 7
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "今日の3フレーズは、文法の型として覚えるの。現在進行形、受動態、if節。この3つで、いろんな場面に応用できるわ。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "なるほどなのだ。単語丸暗記じゃなくて、型で覚えるから応用できるのだ！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "次回は、レビューコメントで使う英語。Could you clarify ...? を扱うわ。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "チャンネル登録と高評価、よろしくなのだ！"
