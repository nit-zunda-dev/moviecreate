# ============================================================
# シナリオで使える「できること」をすべて示すサンプルです。
# 各セクションのコメントを参考に、必要な項目だけ使ってください。
# ============================================================

title: "シナリオ機能オールインワンサンプル"
output:
  file: "./output/sample-all-features.wav"
  # width / height / fps は型にはあるが音声専用CLIでは未使用

global:
  defaultSpeaker: "zundamon"  # character/speaker 未指定時に使う話者名
  voice:                       # 全体のデフォルト音声パラメータ
    speedScale: 1.0            # 話速（1.0=標準）
    pitchScale: 0.0             # 音高（0=標準、正で高く）
    intonationScale: 1.0        # 抑揚
    volumeScale: 1.0            # 音量
    pauseLengthScale: 1.0       # 間の長さの倍率
    prePhonemeLength: 0.1       # 開始無音（秒）
    postPhonemeLength: 0.1      # 終了無音（秒）

characters:
  zundamon:
    speakerId: 3                # ずんだもん・ノーマル（list-speakers で確認）
    styleId: 0                  # 任意・将来用
    voice:                      # このキャラのデフォルト（global を上書き）
      speedScale: 1.05
      intonationScale: 1.1
  metan:
    speakerId: 2                # 四国めたん・ノーマル
    voice:
      speedScale: 0.98
      pitchScale: 0.02
  narrator:
    speakerId: 16               # 九州そら・ノーマル（別ボイス例）
    voice:
      speedScale: 1.0
      intonationScale: 1.05
  zundamon_amama:
    speakerId: 1                # ずんだもん・あまあま（声色の違い）
  metan_sasayaki:
    speakerId: 36               # 四国めたん・ささやき

scenes:
  # --- 1. 基本: character 指定と type: dialogue ---
  - id: "basic"
    lines:
      - type: "dialogue"
        character: "zundamon"
        text: "キャラ名で誰がしゃべるか指定できるのだ。"
      - type: "dialogue"
        character: "metan"
        text: "characters で定義した名前を、character に書くのよ。"

  # --- 2. speaker 指定（config の nameToSpeakerId で解決）---
  - id: "speaker_name"
    lines:
      - type: "dialogue"
        speaker: "zundamon"
        text: "speaker で話者名を指定してもいいのだ。character より優先度は低い。"

  # --- 3. type: dialogue / narration / subtitle_only ---
  - id: "narration"
    lines:
      - type: "narration"
        character: "narrator"
        text: "type は dialogue か narration。どちらも音声が出ます。"
      - type: "subtitle_only"
        character: "zundamon"
        text: "subtitle_only も text があれば音声になる。テロップ専用にしたい場合は text を省略。"

  # --- 4. 行ごとの voice 上書き（この行だけ速く・抑揚強くなど）---
  - id: "line_voice"
    lines:
      - type: "dialogue"
        character: "zundamon"
        text: "この行だけ、話速と抑揚を変えてみるのだ。"
        voice:
          speedScale: 1.2
          intonationScale: 1.25
      - type: "dialogue"
        character: "metan"
        text: "開始無音と終了無音を長くすると、間ができるわ。"
        voice:
          prePhonemeLength: 0.3
          postPhonemeLength: 0.4

  # --- 5. subtitle（テロップ用。音声ツールでは未使用・将来用）---
  - id: "subtitle"
    lines:
      - type: "dialogue"
        character: "zundamon"
        text: "読み上げる文と、表示用のテロップを分けられるのだ。"
        subtitle: "表示用に別の文字列を指定可能"

  # --- 6. 複数声色（別スタイルのキャラ）---
  - id: "multi_style"
    lines:
      - type: "dialogue"
        character: "zundamon"
        text: "ノーマルなのだ。"
      - type: "dialogue"
        character: "zundamon_amama"
        text: "あまあまバージョンで、同じキャラの別声色なのだ。"
      - type: "dialogue"
        character: "metan_sasayaki"
        text: "ささやきボイスで、雰囲気を変えられるの。"

  # --- 7. start / offset（将来の無音挿入用・現状は並び順で連結）---
  - id: "timing"
    lines:
      - type: "dialogue"
        character: "zundamon"
        text: "start や offset は将来用。今は行の並び順で連結されるのだ。"
        start: 0
      - type: "dialogue"
        character: "metan"
        text: "effects の volume や face も型にはあるが、現状は未使用よ。"
        offset: 0

  # --- 8. まとめ ---
  - id: "summary"
    lines:
      - type: "dialogue"
        character: "zundamon"
        text: "このサンプルで、シナリオのできることは一通り試せるのだ。"
      - type: "dialogue"
        character: "metan"
        text: "本番用は case-001-heart-sync.yaml みたいに、必要な項目だけ使ってね。"
