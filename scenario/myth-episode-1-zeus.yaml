        subtitle: "ゼウスはギリシャ神話全体の「根っこ」なの。ゼウスを知らずにギリシャ神話を読むのは、登場人物が誰かわからないまま映画を観るようなものよ。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "だからゼウスを最初に知っておくと、あとあと全部つながってくるのだ！"
        subtitle: "だからゼウスを最初に知っておくと、あとあと全部つながってくるのだ！"

  - id: "summary"
    background: "./image/background/bg_greek_temple_1773641171319.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "今日のまとめね。"
        subtitle: "今日のまとめね。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ゼウスはギリシャ神話の王であり、空と雷の神。10年間の大戦争を経て世界の王になった、実力と経歴を持つ存在よ。"
        subtitle: "ゼウスはギリシャ神話の王であり、空と雷の神。10年間の大戦争を経て世界の王になった、実力と経歴を持つ存在よ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そして最強なのに、嫉妬して、悩んで、失敗する。完璧じゃないからこそ、物語が生まれる。"
        subtitle: "そして最強なのに、嫉妬して、悩んで、失敗する。完璧じゃないからこそ、物語が生まれる。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ギリシャ神話は「完璧な神様の教え」じゃなくて、「人間くさい神様たちのドラマ」。だから3000年経っても面白い。"
        subtitle: "ギリシャ神話は「完璧な神様の教え」じゃなくて、「人間くさい神様たちのドラマ」。だから3000年経っても面白い。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "ゼウスの話、最初は「すごい神様」くらいにしか思ってなかったけど、家族関係とか戦争とか全部わかると、めちゃくちゃ奥深いのだ！"
        subtitle: "ゼウスの話、最初は「すごい神様」くらいにしか思ってなかったけど、家族関係とか戦争とか全部わかると、めちゃくちゃ奥深いのだ！"

  - id: "ending"
    background: "./image/background/bg_greek_temple_1773641171319.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "次回は、ゼウスの兄弟・ポセイドンとハデスの話をするわ。同じ兄弟なのに、こんなに性格が違うの？という話よ。"
        subtitle: "次回は、ゼウスの兄弟・ポセイドンとハデスの話をするわ。同じ兄弟なのに、こんなに性格が違うの？という話よ。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "兄弟で海・天・地下を分担してるの、ロマンがあるのだ！次回も絶対見るのだ！"
        subtitle: "兄弟で海・天・地下を分担してるの、ロマンがあるのだ！次回も絶対見るのだ！"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "チャンネル登録と高評価、ぜひよろしくなのだ！ずんだもんは今日もずんだもちが食べたいのだ！"
        subtitle: "チャンネル登録と高評価、ぜひよろしくなのだ！ずんだもんは今日もずんだもちが食べたいのだ！"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "最後は自分の話ね。それじゃあ、またね！"
        subtitle: "最後は自分の話ね。それじゃあ、またね！"
