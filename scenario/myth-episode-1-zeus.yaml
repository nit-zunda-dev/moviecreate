        subtitle: "神話なのに、すごくリアルな話なのだ。"

  - id: "zeus-as-father"
    background: "./image/background/bg_olympus_palace_1773641201610.png"
    lines:
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "ゼウスって子供も多いのだ？"
        subtitle: "ゼウスって子供も多いのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "それがゼウスを知ることが大事な、もうひとつの理由なの。"
        subtitle: "それがゼウスを知ることが大事な、もうひとつの理由なの。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ゼウスの子供たちは、ギリシャ神話に登場するほぼすべての重要キャラクターにつながっているの。"
        subtitle: "ゼウスの子供たちは、ギリシャ神話に登場するほぼすべての重要キャラクターにつながっているの。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "知恵の神アテナ、太陽と芸術の神アポロン、英雄ヘラクレス、勝利の女神ニケ、美の女神アフロディテ……みんなゼウスの血縁よ。"
        subtitle: "知恵の神アテナ、太陽と芸術の神アポロン、英雄ヘラクレス、勝利の女神ニケ、美の女神アフロディテ……みんなゼウスの血縁よ。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "オリンピックのロゴのニケも！？ヘラクレスも！？ぜんぶゼウスの子なのだ！？"
        subtitle: "オリンピックのロゴのニケも！？ヘラクレスも！？ぜんぶゼウスの子なのだ！？"
      - type: dialogue
        character: metan
        face: "通常"
