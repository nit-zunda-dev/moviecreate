# =============================================================================
# シーズン4 第6話 — オンボーディングで置いていかれない英語
# テーマ: オンボーディングが早口すぎるのだ（新メンバー受け入れ）
# 持ち帰り3フレーズ:
#   - Could you walk me through ...?
#   - Where is ... documented?
#   - I'll follow up async after I review the doc.
# スライド（動画キャプチャ＋ブラウザ学習）: s04-ep06-onboarding-fast-grammar-slides.html
# （簡易 Reveal 版・参照用）: s04-ep06-onboarding-fast-reveal-slides.html
# slideIndex ⇔ scene.id :
#   0 recap · 1 crisis · 2 stuck · 3 lesson_walk · 4 lesson_doc · 5 lesson_async · 6 variants · 7 replay · 8 summary
# 動画生成例:
#   node dist/cli.js lint-retention scenario/english/s04-ep06-onboarding-fast.yaml
#   node dist/cli.js generate-video scenario/english/s04-ep06-onboarding-fast.yaml
# =============================================================================
title: "【現場English】オンボーディングが早口すぎる…初日で置いていかれない英語フレーズなのだ！"

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.15
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.15
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  defaultBackground: "./image/background/background.png"
  slidesHtml: "./s04-ep06-onboarding-fast-grammar-slides.html"
  voice:
    speedScale: 1.12
    postPhonemeLength: 0.07
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.14

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 5200
  text: "初日の説明が早すぎて、頭が追いつかない"
  emphasis:
    - "早すぎて"
    - "追いつかない"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff4466"
    durationMs: 220
  zoom:
    from: 1.0
    to: 1.16
  shake: true

scenes:
  - id: "recap"
    slideIndex: 0
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "前回は見積もりの返し方だったわね。今日はオンボーディングの英語よ。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "初日から英語で説明が早口だと、置いていかれるのだ。"

  - id: "crisis"
    slideIndex: 1
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "キックオフで『Repo, CI, deploy, monitoring』って一気に来たのだ！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "全部理解したフリをしないのがコツ。段階的に質問しましょう。"

  - id: "stuck"
    slideIndex: 2
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "勢いで『Yeah, got it』って言ったら、あとで手が止まるのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "だから、手順を頼む・ドキュメントを確認・あとでフォロー、の3つよ。"

  - id: "lesson_walk"
    slideIndex: 3
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "一つ目。『Could you walk me through the local setup?』"
        subtitle: "Could you walk me through the local setup?"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "walk me through は『手順を順番に説明して』。一度に全部じゃなくていいの。"

  - id: "lesson_doc"
    slideIndex: 4
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "二つ目。『Where is the architecture overview documented?』"
        subtitle: "Where is the architecture overview documented?"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "documented で、あとで自分で読める場所を先に押さえられるのだ。"

  - id: "lesson_async"
    slideIndex: 5
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "三つ目。『I'll follow up async after I review the doc.』"
        subtitle: "I'll follow up async after I review the doc."
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "その場で全部覚えなくても、読んでから質問するって宣言できるのだ。"

  - id: "variants"
    slideIndex: 6
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "丁寧なら『Would you mind walking me through the release process?』。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "カジュアルなら『Can you point me to the onboarding runbook?』でも通るわ。"
      - type: dialogue
        character: metan
        face: "怒り"
        text: "時間がないときは『Could we focus on just the deploy flow for now?』で十分。"

  - id: "replay"
    slideIndex: 7
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "クッド・ユー・ウォーク・ミー・スルー・ザ・ローカル・セットアップ。"
        subtitle: "Could you walk me through the local setup?"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "ウェア・イズ・ザ・アーキテクチャ・オーバービュー・ドキュメンテッド。"
        subtitle: "Where is the architecture overview documented?"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "アイル・フォロー・アップ・エイシンク・アフター・アイ・レビュー・ザ・ドック。"
        subtitle: "I'll follow up async after I review the doc."

  - id: "summary"
    slideIndex: 8
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "今日はこの3つ。walk me through、documented、follow up async。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "次に説明が早くても、置いていかれずに進めそうなのだ！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "次回は1on1で『I'd like to improve』を使う話よ。楽しみにしてて。"

shorts:
  - id: "hook-crisis"
    title: "オンボーディングが早口すぎる…英語で置いていかれない一言"
    pickScenes: ["crisis", "stuck"]
    overlayCaption: "📝 初日キックオフで詰まらない英語"
    cta: "👇 解説フルは本編（概要欄）"

  - id: "three-phrases"
    title: "手順を頼む英語：Could you walk me through?"
    pickScenes: ["lesson_walk", "lesson_doc", "lesson_async"]
    overlayCaption: "💬 walk through / documented / follow up"
    cta: "続き・言い換えは本編へ"

  - id: "replay-only"
    title: "実戦リプレイ：オンボーディングを英語で切り返す"
    pickScenes: ["replay"]
    overlayCaption: "🔁 同じ場面を英語で言い直し"
    cta: "チャンネル登録で次回も"

youtube:
  audience:
    - "初級〜中級エンジニア"
    - "英語会議が怖い開発者"
    - "新卒・中途でオンボーディング中の人"
  hookKeywords:
    - "オンボーディング"
    - "walk me through"
    - "英語 初日"
    - "onboarding english"
  hashtags:
    - "#エンジニア英語"
    - "#ビジネス英語"
    - "#英会話"
    - "#ずんだもん"
    - "#四国めたん"
  relatedEpisodes:
    - ep: 5
      title: "見積もり聞かれて詰んだのだ"
    - ep: 7
      title: "1on1で言いたいことが出ないのだ"
  titleHints:
    - { style: "shock" }
    - { style: "howto" }
    - { style: "exam" }
  imageStyle: "fun"
