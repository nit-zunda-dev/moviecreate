# =============================================================================
# シーズン4 第7話 — 1on1で言いたいことが出ない
# テーマ: 上司との1on1
# 持ち帰り3フレーズ:
#   - I'd like to improve ...
#   - I'm struggling with ...
#   - I'd appreciate your feedback on ...
# スライド: s04-ep07-one-on-one-grammar-slides.html
# slideIndex ⇔ scene.id :
#   0 recap · 1 crisis · 2 stuck · 3 lesson_improve · 4 lesson_struggling
#   5 lesson_feedback · 6 variants · 7 replay · 8 summary
# =============================================================================
title: "【現場English】1on1で言いたいことが出ない…本音を伝える英語フレーズなのだ！"

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.15
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.15
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  defaultBackground: "./image/background/background.png"
  slidesHtml: "./s04-ep07-one-on-one-grammar-slides.html"
  voice:
    speedScale: 1.12
    postPhonemeLength: 0.07
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.14

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 5200
  text: "1on1で言いたいことが出ないのだ"
  emphasis:
    - "言いたいことが"
    - "出ない"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff4466"
    durationMs: 220
  zoom:
    from: 1.0
    to: 1.16
  shake: true

scenes:
  - id: "recap"
    slideIndex: 0
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "前回はオンボーディングの英語だったわね。今日は上司との1on1よ。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "『How's it going?』って聞かれても、本音が出ないのだ。"

  - id: "crisis"
    slideIndex: 1
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "30分の1on1が、『Good, good!』で終わったのだ……。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "相談したいのに短い返事だけ、はもったいない。型を持ちましょう。"

  - id: "stuck"
    slideIndex: 2
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "英語だと弱音が言えなくて、『問題ないです』って言っちゃうのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "だから、伸ばしたいこと・困っていること・フィードバックを頼む、の3つよ。"

  - id: "lesson_improve"
    slideIndex: 3
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "一つ目。『I'd like to improve my code review comments.』"
        subtitle: "I'd like to improve my code review comments."
      - type: dialogue
        character: metan
        face: "笑い"
        text: "I'd like to improve は『伸ばしたい』の丁寧な入り口。攻撃じゃなく成長の話よ。"

  - id: "lesson_struggling"
    slideIndex: 4
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "二つ目。『I'm struggling with prioritizing multiple projects.』"
        subtitle: "I'm struggling with prioritizing multiple projects."
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "struggling with で、一人で抱え込んでる苦しさを共有できるのだ。"

  - id: "lesson_feedback"
    slideIndex: 5
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "三つ目。『I'd appreciate your feedback on my recent PRs.』"
        subtitle: "I'd appreciate your feedback on my recent PRs."
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "appreciate で感謝を先に置ける。何を見てほしいかも on で指定できるのだ。"

  - id: "variants"
    slideIndex: 6
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "丁寧なら『I was hoping to improve how I communicate blockers in standup.』。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "カジュアルなら『I'm having a hard time juggling two projects.』でも通るわ。"
      - type: dialogue
        character: metan
        face: "怒り"
        text: "時間がないときは『Quick question — any feedback on last sprint?』で十分。"

  - id: "replay"
    slideIndex: 7
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "アイド・ライク・トゥー・インプルーヴ・ハウ・アイ・エスティメイト・タスクス。"
        subtitle: "I'd like to improve how I estimate tasks."
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "アイム・ストラグルイング・ウィズ・コンテキスト・スイッチング。"
        subtitle: "I'm struggling with context switching."
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "アイド・アプリシエイト・ユア・フィードバック・オン・マイ・ワン・オン・ワン・トピックス。"
        subtitle: "I'd appreciate your feedback on my 1:1 topics."

  - id: "summary"
    slideIndex: 8
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "今日はこの3つ。I'd like to improve、I'm struggling with、appreciate your feedback。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "次の1on1は『Good』だけじゃ終わらせないのだ！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "次回は設計議論で『trade-off』を言う話よ。楽しみにしてて。"

shorts:
  - id: "hook-crisis"
    title: "1on1が「Good」で終わる問題"
    pickScenes: ["crisis", "stuck"]
    overlayCaption: "💬 本音が出ない1on1"
    cta: "👇 解説フルは本編（概要欄）"

  - id: "three-phrases"
    title: "1on1で使える英語3フレーズ"
    pickScenes: ["lesson_improve", "lesson_struggling", "lesson_feedback"]
    overlayCaption: "improve / struggling / feedback"
    cta: "続き・言い換えは本編へ"

  - id: "replay-only"
    title: "実戦リプレイ：1on1を英語で切り返す"
    pickScenes: ["replay"]
    overlayCaption: "🔁 3フレーズ連続"
    cta: "チャンネル登録で次回も"

youtube:
  audience:
    - "初級〜中級エンジニア"
    - "英語1on1が怖い開発者"
    - "キャリア相談を英語でしたい人"
  hookKeywords:
    - "1on1"
    - "英語"
    - "I'd like to improve"
    - "I'm struggling with"
    - "feedback"
  hashtags:
    - "#エンジニア英語"
    - "#ビジネス英語"
    - "#1on1"
    - "#ずんだもん"
    - "#四国めたん"
  relatedEpisodes:
    - ep: 6
      title: "オンボーディングが早口すぎる"
    - ep: 8
      title: "設計議論で黙ってしまう"
  titleHints:
    - { style: "shock" }
    - { style: "howto" }
    - { style: "exam" }
  imageStyle: "fun"
