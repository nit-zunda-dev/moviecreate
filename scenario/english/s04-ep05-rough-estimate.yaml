# =============================================================================
# シーズン4 第5話 — 工数見積もりで詰まらない英語
# テーマ: 見積もり聞かれて詰んだのだ
# 持ち帰り3フレーズ:
#   - My rough estimate is ...
#   - It depends on ...
#   - I'll get back to you ...
# =============================================================================
title: "【現場English】見積もり聞かれて詰んだ…工数を安全に返す英語フレーズなのだ！"

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.15
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.15
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  defaultBackground: "./image/background/background.png"
  slidesHtml: "./s04-ep05-rough-estimate-reveal-slides.html"
  voice:
    speedScale: 1.12
    postPhonemeLength: 0.07
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.14

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 5200
  text: "会議で突然「何日？」って聞かれて固まる"
  emphasis:
    - "何日？"
    - "固まる"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff4466"
    durationMs: 220
  zoom:
    from: 1.0
    to: 1.16
  shake: true

scenes:
  - id: "recap"
    slideIndex: 0
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "前回は要件変更の返し方だったわね。今日は見積もりの返し方よ。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "数字を急に聞かれると、頭が真っ白になるのだ。"

  - id: "crisis"
    slideIndex: 1
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "会議でいきなり『How long will it take?』って来たのだ！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "その場で断言しないのがコツ。まずは安全に返しましょう。"

  - id: "stuck"
    slideIndex: 2
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "勢いで『2日です』って言ったら、後で炎上しそうなのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "だから、ざっくり見積もりと条件をセットで言うの。"

  - id: "lesson_rough"
    slideIndex: 3
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "一つ目。『My rough estimate is two to three days.』"
        subtitle: "My rough estimate is two to three days."
      - type: dialogue
        character: metan
        face: "笑い"
        text: "rough estimate は『ざっくり見積もり』。確定じゃないって先に伝えられる。"

  - id: "lesson_depends"
    slideIndex: 4
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "二つ目。『It depends on the API response time.』"
        subtitle: "It depends on the API response time."
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "depends で条件を言えば、雑な約束を避けられるのだ。"

  - id: "lesson_followup"
    slideIndex: 5
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "三つ目。『I'll get back to you after checking with the team.』"
        subtitle: "I'll get back to you after checking with the team."
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "その場で無理なら、ちゃんと持ち帰るって宣言するのだ。"

  - id: "variants"
    slideIndex: 6
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "丁寧なら『At a high level, I'd estimate around three days.』。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "カジュアルなら『Probably around two or three days.』でも通るわ。"
      - type: dialogue
        character: metan
        face: "怒り"
        text: "緊急時は『Need to confirm dependencies first.』で十分。"

  - id: "replay"
    slideIndex: 7
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "マイ・ラフ・エスティメイト・イズ・トゥー・トゥー・スリー・デイズ。"
        subtitle: "My rough estimate is two to three days."
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "イット・ディペンズ・オン・ジ・エーピーアイ・レスポンスタイム。"
        subtitle: "It depends on the API response time."
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "アイル・ゲット・バック・トゥー・ユー・アフター・チェッキング・ウィズ・ザ・チーム。"
        subtitle: "I'll get back to you after checking with the team."

  - id: "summary"
    slideIndex: 8
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "今日はこの3つ。rough estimate、depends、get back to you。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "次に数字を聞かれても、固まらずに返せそうなのだ！"

youtube:
  hashtags:
    - "#エンジニア英語"
    - "#ビジネス英語"
    - "#英会話"
    - "#ずんだもん"
    - "#四国めたん"
