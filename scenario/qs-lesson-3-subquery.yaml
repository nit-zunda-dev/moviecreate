title: "QuerySync レッスン3: サブクエリ入門"

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: left
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: right
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.2

global:
  defaultSpeaker: "metan"
  voice:
    speedScale: 1.25
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/Movidrill.png"

output:
  fps: 30
  width: 1280
  height: 720

scenes:
  - id: "intro"
    lines:
      - type: dialogue
        character: metan
        face: "喜び"
        text: "みんな、こんにちは。めたんだよ。前までセレクトとジョインをやってきたね。今日はサブクエリをやっていくよ。"
        subtitle: "みんな、こんにちは。めたんだよ。前まで SELECT と JOIN をやってきたね。今日はサブクエリをやっていくよ。"
      - type: dialogue
        character: metan
        face: "喜び"
        text: "サブクエリって、セレクトのなかに、もうひとつセレクトを書くことなの。"
        subtitle: "サブクエリって、SELECT のなかに、もうひとつ SELECT を書くことなの。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "セレクトのなかにセレクト？ 入れ子みたいな感じ？"
        subtitle: "SELECT のなかに SELECT？ 入れ子みたいな感じ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そう。例えば「平均給与より稼いでる人だけ出したい」ってなったとき、平均はエーブイジー サラリーで出せるけど、その「平均」をいちいち自分で計算して数字を書くんじゃなくて、SQLのなかで「平均を出すセレクト」を書いて、その結果を条件に使う、みたいな感じ。"
        subtitle: "そう。例えば「平均給与より稼いでる人だけ出したい」ってなったとき、平均は《AVG(salary)》で出せるけど、その「平均」をいちいち自分で計算して数字を書くんじゃなくて、SQL のなかで「平均を出す SELECT」を書いて、その結果を条件に使う、みたいな感じ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そういう「クエリの結果を、別のクエリの条件やテーブルとして使う」のがサブクエリだよ。"
        subtitle: "そういう「クエリの結果を、別のクエリの条件やテーブルとして使う」のがサブクエリだよ。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "なるほど。一回のクエリの答えを、もう一回のクエリで使うんだね。"
        subtitle: "なるほど。一回のクエリの答えを、もう一回のクエリで使うんだね。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そう。今日はサブクエリのイメージを押さえる → ウェアで「ひとつの値」として使う → ウェアで「複数行」をインで使う → フロムのうしろにセレクトを書いて「表として」使うまで、順番にやっていくね。"
        subtitle: "そう。今日はサブクエリのイメージを押さえる → WHERE で「ひとつの値」として使う → WHERE で「複数行」を《IN》で使う → FROM のうしろに SELECT を書いて「表として」使うまで、順番にやっていくね。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "おけ、順番にいこう。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "じゃあ、まず「サブクエリってどういう形か」から見ていこう。"

  - id: "step1-image"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "サブクエリは、かっこでくくったセレクト文を、ほかのセレクトの「値が入る場所」に書くの。例えばウェア サラリー グレーターザン カッコ セレクト エーブイジー サラリー フロム エンプロイーズ カッコトジ みたいに。"
        subtitle: "サブクエリは、かっこ《()》でくくった SELECT 文を、ほかの SELECT の「値が入る場所」に書くの。例えば《WHERE salary > (SELECT AVG(salary) FROM employees)》みたいに。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "このとき、内側のカッコ セレクト エーブイジー サラリー フロム エンプロイーズ カッコトジ が先に実行されて、平均給与がひとつの値になる。その値とサラリーを比較して、「平均より大きい行だけ」を外側のセレクトが取り出す、って流れね。"
        subtitle: "このとき、内側の《(SELECT AVG(salary) FROM employees)》が先に実行されて、平均給与がひとつの値になる。その値と《salary》を比較して、「平均より大きい行だけ」を外側の SELECT が取り出す、って流れね。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "内側が先に実行されて、その答えを外側が使うんだ。"
      - type: dialogue
        character: metan
        face: "喜び"
        text: "そう。だから「内側のセレクトが返す結果」が、外側から見ると「ひとつの値」だったり「複数行」だったりする。返す結果の形によって、ウェアでイコールやグレーターザンで使うか、インで使うか、あるいはフロムのうしろに「表」として書くか、が決まってくるよ。"
        subtitle: "そう。だから「内側の SELECT が返す結果」が、外側から見ると「ひとつの値」だったり「複数行」だったりする。返す結果の形によって、WHERE で《=》や《>》で使うか、《IN》で使うか、あるいは FROM のうしろに「表」として書くか、が決まってくるよ。"
      - type: dialogue
        character: metan
        face: "喜び"
        text: "まずは「かっこでくくったセレクトが、外側のクエリのどこかで使われる」って形を頭に入れておこう。"
        subtitle: "まずは「かっこでくくった SELECT が、外側のクエリのどこかで使われる」って形を頭に入れておこう。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "かっこでくくったセレクトが、外側で使われる。分かった。"
        subtitle: "かっこでくくった SELECT が、外側で使われる。分かった。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "では、「サブクエリ」がどこに書かれているか、次の文のなかで探してみて。セレクト アスタリスク フロム エンプロイーズ ウェア サラリー グレーターザン カッコ セレクト エーブイジー サラリー フロム エンプロイーズ カッコトジ。"
        subtitle: "では、「サブクエリ」がどこに書かれているか、次の文のなかで探してみて。《SELECT * FROM employees WHERE salary > (SELECT AVG(salary) FROM employees)》"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ここで手を動かしてみましょう！ 一度止めて、自分で考えてみて。"
        subtitle: "【演習キュー】ここで手を動かしてみましょう！ 一度止めて、自分で考えてみて。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "この文のなかで、サブクエリはどこか。かっこでくくられたセレクトがどれか、指さしてみて。答えはこのあとすぐ見せるから。"
        subtitle: "この文のなかで、サブクエリはどこか。かっこでくくられた SELECT がどれか、指さしてみて。答えはこのあとすぐ見せるから。"

  - id: "step1-answer"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解は、カッコ セレクト エーブイジー サラリー フロム エンプロイーズ カッコトジ の部分だよ。このかっこのなかのセレクトがサブクエリ。ここが先に実行されて「平均給与」がひとつの値になり、その値とサラリーを比較しているね。"
        subtitle: "正解は、《(SELECT AVG(salary) FROM employees)》の部分だよ。このかっこのなかの SELECT がサブクエリ。ここが先に実行されて「平均給与」がひとつの値になり、その値と《salary》を比較しているね。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "ウェアのうしろで、比べる「もう片方」がサブクエリになってるんだ。"
        subtitle: "WHERE のうしろで、比べる「もう片方」がサブクエリになってるんだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そう。こういう「ひとつの値、1行1列」を返すサブクエリのことを、スカラーサブクエリって呼ぶことがあるよ。グレーターザンやイコールで比較するときは、内側は必ず1行1列になるように書く。"
        subtitle: "そう。こういう「ひとつの値（1行1列）」を返すサブクエリのことを、スカラーサブクエリって呼ぶことがあるよ。《>》や《=》で比較するときは、内側は必ず1行1列になるように書く。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "次は、この「平均より高い給与の人」を実際に書く練習をしよう。"
        subtitle: "次は、この「平均より高い給与の人」を実際に書く練習をしよう。"

  - id: "step2-where-scalar"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "ウェア 列名 比較演算子 カッコ セレクト … カッコトジ の形で、「その列の値が、サブクエリの結果と比較して真になる行だけ」を取り出すの。"
        subtitle: "《WHERE 列名 比較演算子 (SELECT …)》の形で、「その列の値が、サブクエリの結果と比較して真になる行だけ」を取り出すの。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "セレクト エーブイジー カッコサラリー カッコトジ フロム エンプロイーズ は全社員の平均給与を1行1列で返すから、ウェア サラリー グレーターザン カッコ セレクト エーブイジー カッコサラリー カッコトジ フロム エンプロイーズ カッコトジ と書けば、「平均給与より高い社員」だけが取れるよ。"
        subtitle: "《SELECT AVG(salary) FROM employees》は「全社員の平均給与」を1行1列で返すから、《WHERE salary > (SELECT AVG(salary) FROM employees)》と書けば、「平均給与より高い社員」だけが取れるよ。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "平均を自分で計算しなくていいの、便利だね。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "うん。条件に「いまのデータから出した値」を使いたいときに、サブクエリで書いておけば、データが変わっても自動でやり直してくれるの。"
        subtitle: "うん。条件に「いまのデータから出した値」を使いたいときに、サブクエリで書いておけば、データが変わっても自動でやり直してくれるの。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "では、平均給与より高い給与をもらっている社員を、全カラムで取得する文を考えてみて。"
        subtitle: "では、平均給与より高い給与をもらっている社員を、全カラムで取得する文を考えてみて。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ここで手を動かしてみましょう！ 一度止めて、自分で書いてみて。"
        subtitle: "【演習キュー】ここで手を動かしてみましょう！ 一度止めて、自分で書いてみて。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "平均給与より高い給与の社員を、全カラムで取得する文を考えてみて。答えはこのあとすぐ見せるから。"
        subtitle: "平均給与より高い給与の社員を、全カラムで取得する文を考えてみて。答えはこのあとすぐ見せるから。"

  - id: "step2-answer"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解の例は、セレクト アスタリスク フロム エンプロイーズ ウェア サラリー グレーターザン カッコ セレクト エーブイジー サラリー フロム エンプロイーズ カッコトジ だよ。内側で平均が求まって、その値より大きいサラリーの行だけ出てくるはず。"
        subtitle: "正解の例は《SELECT * FROM employees WHERE salary > (SELECT AVG(salary) FROM employees)》だよ。内側で平均が求まって、その値より大きい《salary》の行だけ出てくるはず。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "出た！ サブクエリで条件が書けた。"
      - type: dialogue
        character: metan
        face: "喜び"
        text: "いいね。次は、「ひとつの値」じゃなくて「複数行」を条件に使うパターン。例えば「開発部と営業部に所属してる社員だけ」出したいとき、部署IDの一覧をサブクエリで出して、ウェア デパートメントID イン カッコその結果カッコトジ みたいに書くの。"
        subtitle: "いいね。次は、「ひとつの値」じゃなくて「複数行」を条件に使うパターン。例えば「開発部と営業部に所属してる社員だけ」出したいとき、部署IDの一覧をサブクエリで出して、《WHERE department_id IN (その結果)》みたいに書くの。"
      - type: dialogue
        character: metan
        face: "喜び"
        text: "インは「この列の値が、かっこのなかのどれかと一致した行」を残すよ。"
        subtitle: "《IN》は「この列の値が、かっこのなかのどれかと一致した行」を残すよ。"

  - id: "step3-in-multirow"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "ウェア 列名 イン カッコ セレクト 列名 フロム テーブル … カッコトジ と書くと、サブクエリが返す複数行1列のどれかと一致した行だけが残るよ。"
        subtitle: "WHERE 列名 IN (SELECT 列名 FROM テーブル …) と書くと、サブクエリが返す複数行1列のどれかと一致した行だけが残るよ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "例えばデパートメンツから部署名が「開発部」か「営業部」のIDを セレクト アイディー フロム デパートメンツ ウェア ネーム イン カッコ '開発部', '営業部' カッコトジ で取ってきて、"
        subtitle: "例えば departments から部署名が「開発部」か「営業部」の id を SELECT id FROM departments WHERE name IN ('開発部', '営業部') で取ってきて、"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ウェア エンプロイーズ ドット デパートメントID イン カッコ セレクト アイディー フロム デパートメンツ ウェア ネーム イン カッコ '開発部', '営業部' カッコトジ カッコトジ とすれば、開発部と営業部の社員だけを取れる。"
        subtitle: "WHERE employees.department_id IN (SELECT id FROM departments WHERE name IN ('開発部', '営業部')) とすれば、開発部と営業部の社員だけを取れる。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "IN のなかに SELECT を入れると、その結果のどれかと一致、ってことだね。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そう。サブクエリが複数行1列を返すときは、イコールじゃなくてインを使う。"
        subtitle: "そう。サブクエリが複数行1列を返すときは、《=》じゃなくて《IN》を使う。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "では、部署名が『開発部』の社員を、全カラムで取得する文を考えてみて。デパートメンツから「開発部」のIDを取るサブクエリとインを使ってね。"
        subtitle: "では、部署名が『開発部』の社員を、全カラムで取得する文を考えてみて。departments から「開発部」の id を取るサブクエリと《IN》を使ってね。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ここで手を動かしてみましょう！ 一度止めて、自分で書いてみて。部署名が『開発部』の社員を、エンプロイーズから全カラムで取得する文を考えてみて。答えはこのあとすぐ見せるから。"
        subtitle: "【演習キュー】ここで手を動かしてみましょう！ 一度止めて、自分で書いてみて。部署名が『開発部』の社員を、employees から全カラムで取得する文を考えてみて。答えはこのあとすぐ見せるから。"

  - id: "step3-answer"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解の例は、セレクト アスタリスク フロム エンプロイーズ ウェア デパートメントID イン カッコ セレクト アイディー フロム デパートメンツ ウェア ネーム イコール '開発部' カッコトジ だよ。"
        subtitle: "正解の例は《SELECT * FROM employees WHERE department_id IN (SELECT id FROM departments WHERE name = '開発部')》だよ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "サブクエリで「開発部」のIDを取って、そのIDに一致するデパートメントIDの社員だけ残してるね。"
        subtitle: "サブクエリで「開発部」の id を取って、その id に一致する《department_id》の社員だけ残してるね。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "インでサブクエリ、覚えた。"
        subtitle: "IN でサブクエリ、覚えた。"
      - type: dialogue
        character: metan
        face: "喜び"
        text: "うん。最後に、フロムのうしろにサブクエリを書くパターン。セレクトの結果をひとつの表のように見なして、さらにその上でセレクトしたりジョインしたりするやり方だよ。"
        subtitle: "うん。最後に、FROM のうしろにサブクエリを書くパターン。SELECT の結果をひとつの表のように見なして、さらにその上で SELECT したり JOIN したりするやり方だよ。"

  - id: "step4-from-derived"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "フロム カッコ セレクト … カッコトジ アズ 別名 と書くと、かっこのなかのセレクトの結果が、ひとつのテーブルとして扱われるの。これを派生テーブルって言うことがあるよ。別名アズは必ず付けることになってる。"
        subtitle: "《FROM (SELECT …) AS 別名》と書くと、かっこのなかの SELECT の結果が、ひとつのテーブルとして扱われるの。これを派生テーブルって言うことがあるよ。別名《AS》は必ず付けることになってる。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "例えば「部署ごとの平均給与」を出した結果を、さらに「その平均給与が50万以上の部署だけ」に絞りたいとき、フロム カッコ セレクト デパートメントID カンマ エーブイジー カッコサラリー カッコトジ アズ アブサル フロム エンプロイーズ グループバイ デパートメントID カッコトジ アズ デプトアブ みたいに書いて、そのうしろで ウェア アブサル グレーターザンイコール 500000 とかできるの。"
        subtitle: "例えば「部署ごとの平均給与」を出した結果を、さらに「その平均給与が 50 万以上の部署だけ」に絞りたいとき、《FROM (SELECT department_id, AVG(salary) AS avg_sal FROM employees GROUP BY department_id) AS dept_avg》みたいに書いて、そのうしろで《WHERE avg_sal >= 500000》とかできるの。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "いったん集計した結果を表だと思って、もう一回クエリするんだね。"
      - type: dialogue
        character: metan
        face: "喜び"
        text: "そう。「まずサブクエリで集計や絞り込みをした結果」を表に見立てて、外側でもう一度セレクトする、っていう形。"
        subtitle: "そう。「まずサブクエリで集計や絞り込みをした結果」を表に見立てて、外側でもう一度 SELECT する、っていう形。"
      - type: dialogue
        character: metan
        face: "喜び"
        text: "では、エンプロイーズから「部署ごとの平均給与」を出すサブクエリをフロムに書いて、その結果にデプトアブって別名を付けるところまで、自分で書いてみて。"
        subtitle: "では、《employees》から「部署ごとの平均給与」を出すサブクエリを FROM に書いて、その結果に《dept_avg》って別名を付けるところまで、自分で書いてみて。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ここで手を動かしてみましょう！ 一度止めて、自分で書いてみて。"
        subtitle: "【演習キュー】ここで手を動かしてみましょう！ 一度止めて、自分で書いてみて。"
      - type: dialogue
        character: metan
        face: "通常"
