title: "【クラウドアーキテクチャパズル】コンテナとCI/CDの本番構成の仕組みをゼロから理解するのだ！"

# YouTube: TBD



characters:

  metan:

    speakerId: 2

    image: "./image/metan/通常.png"

    position: right

    subtitleColor: "#FF88BB"

    voice:

      speedScale: 1.25

      intonationScale: 1.05



  zundamon:

    speakerId: 3

    image: "./image/zundamon/通常.png"

    position: left

    subtitleColor: "#88DD44"

    voice:

      speedScale: 1.25

      intonationScale: 1.1



global:

  defaultSpeaker: "zundamon"

  voice:

    speedScale: 1.2

    postPhonemeLength: 0.08

  defaultBackground: "./image/background/Movidrill.png"



output:

  fps: 30

  width: 1280

  height: 720



scenes:

  # ============================================================

  # 1. オープニング：クラウドパズル最終チャレンジ

  # ============================================================

  - id: "opening"

    lines:

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "みんな、こんにちはなのだ！ずんだもんなのだ！"

        subtitle: "みんな、こんにちはなのだ！ずんだもんなのだ！"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "前回はチャレンジ7「IoTデータ分析基盤」だったのだ！ストリーム、サーバーレス、時系列DB、データウェアハウス、頭がパンクしそうなのだ！"

        subtitle: "前回はチャレンジ7「IoTデータ分析基盤」だったのだ！ストリーム、サーバーレス、時系列DB、データウェアハウス、頭がパンクしそうなのだ！"

      - type: dialogue

        character: metan

        face: "通常"

        text: "四国めたんです。今回はクラウドアーキテクチャパズル・上級の最終回、チャレンジ8、「コンテナとCI/CDの本番構成」よ。"

        subtitle: "四国めたんです。今回はクラウドアーキテクチャパズル・上級の最終回、チャレンジ8、「コンテナとCI/CDの本番構成」よ。"

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "ECもSNSもIoTも、さっきまで「アプリ単体」の図だったのだ。本番の会社さんは、もっと下に土台があるのだ？"

        subtitle: "ECもSNSもIoTも、さっきまで「アプリ単体」の図だったのだ。本番の会社さんは、もっと下に土台があるのだ？"

      - type: dialogue

        character: metan

        face: "喜び"

        text: "その通り。今回は「チームみんなが同じように使う共有の土台」と、その上に載るサービスの型を、参照アーキテクチャに近い形でまとめるわ。"

        subtitle: "その通り。今回は「チームみんなが同じように使う共有の土台」と、その上に載るサービスの型を、参照アーキテクチャに近い形でまとめるわ。"

      - type: dialogue

        character: metan

        face: "喜び"

        text: "入口の多層化、コンテナ、CIとレジストリ、あと監視・ログ・トレースの三本柱まで、一度に見渡すのがポイントね。"

        subtitle: "入口の多層化、コンテナ、CIとレジストリ、あと監視・ログ・トレースの三本柱まで、一度に見渡すのがポイントね。"



  # ============================================================

  # 2. 北側トラフィック：DNSからAPI Gatewayまで

  # ============================================================

  - id: "north-traffic"

    lines:

      - type: dialogue

        character: zundamon

        face: "通常"

        text: "利用者から見て、最初に何が並ぶのだ？"

        subtitle: "利用者から見て、最初に何が並ぶのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "まずDNSでホスト名をIPに解決し、WAFで攻撃を落とし、ロードバランサーで負荷分散し、API GatewayでAPIの入口を統制する、という多層の流れよ。"

        subtitle: "まずDNSでホスト名をIPに解決し、WAFで攻撃を落とし、ロードバランサーで負荷分散し、API GatewayでAPIの入口を統制する、という多層の流れよ。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "チャレンジ6のSNSはDNS→WAF→LBだったのだ。今回はそのあとにAPI Gatewayが入って、さらにコンテナ基盤へ繋がるのだ！"

        subtitle: "チャレンジ6のSNSはDNS→WAF→LBだったのだ。今回はそのあとにAPI Gatewayが入って、さらにコンテナ基盤へ繋がるのだ！"

      - type: dialogue

        character: metan

        face: "喜び"

        text: "パズル上はクライアント→DNS→WAF→ロードバランサー→API Gateway→コンテナ基盤まで、ノード間の線は五本。北側の一本道ね。"

        subtitle: "パズル上はクライアント→DNS→WAF→ロードバランサー→API Gateway→コンテナ基盤まで、ノード間の線は五本。北側の一本道ね。"



  # ============================================================

  # 3. コンテナ上の複数サービス：APIとgRPC

  # ============================================================

  - id: "workloads-on-cluster"

    lines:

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "業務アプリが増えると、どのピースが増えるイメージなのだ？"

        subtitle: "業務アプリが増えると、どのピースが増えるイメージなのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "共有で一つになりやすいのはDNSやゲートウェイ、コンテナクラスタ、レジストリ、可観測性のバックエンド。増えやすいのはデプロイ単位のAPIやワーカー、DBやキャッシュの論理単位ね。"

        subtitle: "共有で一つになりやすいのはDNSやゲートウェイ、コンテナクラスタ、レジストリ、可観測性のバックエンド。増えやすいのはデプロイ単位のAPIやワーカー、DBやキャッシュの論理単位ね。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "今回の正解では、コンテナ基盤から外向きのAPIサーバーと、サービス間のgRPCサービス、二本に分けて表現しているわ。"

        subtitle: "今回の正解では、コンテナ基盤から外向きのAPIサーバーと、サービス間のgRPCサービス、二本に分けて表現しているわ。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "コンテナ基盤→APIサーバー、コンテナ基盤→gRPCサービス、で二本出るのだ！"

        subtitle: "コンテナ基盤→APIサーバー、コンテナ基盤→gRPCサービス、で二本出るのだ！"



  # ============================================================

  # 4. データ層：RDB・キャッシュ

  # ============================================================

  - id: "data-layer"

    lines:

      - type: dialogue

        character: metan

        face: "通常"

        text: "APIはRDBとキャッシュに接続。キャッシュで読みを速くし、gRPC側も同じRDBを読む想定で、API→RDB、gRPC→RDB、API→キャッシュの三本ね。"

        subtitle: "APIはRDBとキャッシュに接続。キャッシュで読みを速くし、gRPC側も同じRDBを読む想定で、API→RDB、gRPC→RDB、API→キャッシュの三本ね。"

      - type: dialogue

        character: zundamon

        face: "通常"

        text: "実務ではDBをサービスごとに分けることもあるのだ。パズルでは1つのRDBピースにまとめているのだ！"

        subtitle: "実務ではDBをサービスごとに分けることもあるのだ。パズルでは1つのRDBピースにまとめているのだ！"



  # ============================================================

  # 5. 非同期：メッセージキューとジョブワーカー

  # ============================================================

  - id: "async-queue"

    lines:

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "動画配信やECでも出てきたメッセージキューとジョブワーカーなのだ！"

        subtitle: "動画配信やECでも出てきたメッセージキューとジョブワーカーなのだ！"

      - type: dialogue

        character: metan

        face: "通常"

        text: "重い処理はAPIからキューに積んで、ジョブワーカーが非同期に処理する。チャレンジ3や5と同じパターンを、本番基盤側にも載せるわ。"

        subtitle: "重い処理はAPIからキューに積んで、ジョブワーカーが非同期に処理する。チャレンジ3や5と同じパターンを、本番基盤側にも載せるわ。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "API→メッセージキュー→ジョブワーカーなのだ！"

        subtitle: "API→メッセージキュー→ジョブワーカーなのだ！"



  # ============================================================

  # 6. CI/CDとコンテナレジストリ

  # ============================================================

  - id: "cicd-registry"

    lines:

      - type: dialogue

        character: metan

        face: "通常"

        text: "デプロイの流れは、CI/CDがイメージをビルドしてコンテナレジストリへプッシュし、コンテナ基盤がイメージを取得して反映する、という二本の線ね。"

        subtitle: "デプロイの流れは、CI/CDがイメージをビルドしてコンテナレジストリへプッシュし、コンテナ基盤がイメージを取得して反映する、という二本の線ね。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "CI/CDパイプライン→コンテナレジストリ→コンテナ基盤。利用者のリクエスト線とは別ルートなのだ！"

        subtitle: "CI/CDパイプライン→コンテナレジストリ→コンテナ基盤。利用者のリクエスト線とは別ルートなのだ！"



  # ============================================================

  # 7. 可観測性：監視・ログ・分散トレース

  # ============================================================

  - id: "observability"

    lines:

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "監視とログだけじゃ足りないのだ？"

        subtitle: "監視とログだけじゃ足りないのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "本番の参照構成では、メトリクス・ログに加えて分散トレースでリクエストを横断追跡する「三本柱」がよくセットで語られるわ。"

        subtitle: "本番の参照構成では、メトリクス・ログに加えて分散トレースでリクエストを横断追跡する「三本柱」がよくセットで語られるわ。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "主解答では、監視・ログ管理・分散トレースをコンテナ基盤にまとめてつなぐ想定。プラットフォーム側のエージェントが集めるイメージね。"

        subtitle: "主解答では、監視・ログ管理・分散トレースをコンテナ基盤にまとめてつなぐ想定。プラットフォーム側のエージェントが集めるイメージね。"

      - type: dialogue

        character: metan

        face: "喜び"

        text: "別解では、監視とログをAPIサーバー、gRPCには分散トレース、とサービスに直接つなぐつなぎ方も正解よ。"

        subtitle: "別解では、監視とログをAPIサーバー、gRPCには分散トレース、とサービスに直接つなぐつなぎ方も正解よ。"



  # ============================================================

  # 8. パズル出題

  # ============================================================

  - id: "puzzle"

    lines:

      - type: dialogue

        character: metan

        face: "通常"

        text: "ではここでパズル。コンテナとCI/CDの本番構成を完成させるのに必要なコンポーネントと接続を考えてみて。"

        subtitle: "ではここでパズル。コンテナとCI/CDの本番構成を完成させるのに必要なコンポーネントと接続を考えてみて。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "ヒントは、北側がDNSからAPI Gatewayまで長く、コンテナからAPIとgRPCが二本、データと非同期とCI/CD、あと可観測性が三本柱、の五ブロックよ。"

        subtitle: "ヒントは、北側がDNSからAPI Gatewayまで長く、コンテナからAPIとgRPCが二本、データと非同期とCI/CD、あと可観測性が三本柱、の五ブロックよ。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "部品数が多いから、紙に矢印を書きながらやると落ち着くのだ！"

        subtitle: "部品数が多いから、紙に矢印を書きながらやると落ち着くのだ！"



  # ============================================================

  # 9. パズルの答え

  # ============================================================

  - id: "puzzle-answer"

    lines:

      - type: dialogue

        character: metan

        face: "通常"

        text: "では今回のパズルの答えをまとめるわ。コンポーネントは十七個。上級最終チャレンジ、最多ピースよ。"

        subtitle: "では今回のパズルの答えをまとめるわ。コンポーネントは十七個。上級最終チャレンジ、最多ピースよ。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "クライアント、DNS、WAF、ロードバランサー、API Gateway、コンテナ基盤、APIサーバー、gRPCサービス、RDB、キャッシュ、メッセージキュー、ジョブワーカー、CI/CDパイプライン、コンテナレジストリ、監視、ログ管理、分散トレーシング。"

        subtitle: "クライアント、DNS、WAF、ロードバランサー、API Gateway、コンテナ基盤、APIサーバー、gRPCサービス、RDB、キャッシュ、メッセージキュー、ジョブワーカー、CI/CDパイプライン、コンテナレジストリ、監視、ログ管理、分散トレーシング。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "接続は十七本。まず北側五本、クライアント→DNS、DNS→WAF、WAF→ロードバランサー、ロードバランサー→API Gateway、API Gateway→コンテナ基盤、と続くわ。"

        subtitle: "接続は十七本。まず北側五本、クライアント→DNS、DNS→WAF、WAF→ロードバランサー、ロードバランサー→API Gateway、API Gateway→コンテナ基盤、と続くわ。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "コンテナ基盤からはAPIサーバーとgRPCサービスへ二本。データはAPI→RDB、gRPC→RDB、API→キャッシュの三本。非同期はAPI→メッセージキュー→ジョブワーカーの二本。"

        subtitle: "コンテナ基盤からはAPIサーバーとgRPCサービスへ二本。データはAPI→RDB、gRPC→RDB、API→キャッシュの三本。非同期はAPI→メッセージキュー→ジョブワーカーの二本。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "デプロイ経路はCI/CDパイプライン→コンテナレジストリ→コンテナ基盤の二本。可観測性の主解答は、コンテナ基盤→監視、コンテナ基盤→ログ管理、コンテナ基盤→分散トレーシングの三本ね。"

        subtitle: "デプロイ経路はCI/CDパイプライン→コンテナレジストリ→コンテナ基盤の二本。可観測性の主解答は、コンテナ基盤→監視、コンテナ基盤→ログ管理、コンテナ基盤→分散トレーシングの三本ね。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "五たす二たす三たす二たす二たす三で十七本、十七ピースなのだ！"

        subtitle: "五たす二たす三たす二たす二たす三で十七本、十七ピースなのだ！"

      - type: dialogue

        character: metan

        face: "通常"

        text: "別解では、監視とログをAPIサーバーへ、分散トレースをgRPCサービスへ直接つなぐつなぎ方も満点。部品の集合は同じ十七個よ。"

        subtitle: "別解では、監視とログをAPIサーバーへ、分散トレースをgRPCサービスへ直接つなぐつなぎ方も満点。部品の集合は同じ十七個よ。"

      - type: dialogue

        character: metan

        face: "喜び"

        text: "パズルのキャンバスに十七個を置いて、十七本の線でつなげば「コンテナとCI/CDの本番構成」チャレンジクリアよ。"

        subtitle: "パズルのキャンバスに十七個を置いて、十七本の線でつなげば「コンテナとCI/CDの本番構成」チャレンジクリアよ。"



  # ============================================================

  # 10. まとめとエンディング

  # ============================================================

  - id: "summary"

    lines:

      - type: dialogue

        character: metan

        face: "通常"

        text: "今日のまとめ。本番の共有基盤は、入口の多層化、コンテナ上の複数サービス、データとキャッシュ、非同期、CI/CDとレジストリ、可観測性の三本柱、を一続きで眺めるのが近道よ。"

        subtitle: "今日のまとめ。本番の共有基盤は、入口の多層化、コンテナ上の複数サービス、データとキャッシュ、非同期、CI/CDとレジストリ、可観測性の三本柱、を一続きで眺めるのが近道よ。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "ずんだもち屋のシステムも、いつかこういう土台の上に載せられるようになりたいのだ！"

        subtitle: "ずんだもち屋のシステムも、いつかこういう土台の上に載せられるようになりたいのだ！"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "クラウドアーキテクチャパズル、チャレンジ1から8までついてきてくれてありがとなのだ！"

        subtitle: "クラウドアーキテクチャパズル、チャレンジ1から8までついてきてくれてありがとなのだ！"

      - type: dialogue

        character: metan

        face: "笑い"

        text: "ここまでやれば、クラウドの全体像を自分の言葉で説明できる土台はできているわ。実務ではクラウドベンダーごとに名前が違うけれど、役割の対応はこのパズルが助けになるはずよ。"

        subtitle: "ここまでやれば、クラウドの全体像を自分の言葉で説明できる土台はできているわ。実務ではクラウドベンダーごとに名前が違うけれど、役割の対応はこのパズルが助けになるはずよ。"

      - type: dialogue

        character: metan

        face: "笑い"

        text: "また次の動画で会いましょう。"

        subtitle: "また次の動画で会いましょう。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "ずんだもんとめたんのクラウドアーキ講座、今回もおつかれさまなのだ！"

        subtitle: "ずんだもんとめたんのクラウドアーキ講座、今回もおつかれさまなのだ！"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "チャンネル登録と高評価、よろしくなのだ！"

        subtitle: "チャンネル登録と高評価、よろしくなのだ！"
