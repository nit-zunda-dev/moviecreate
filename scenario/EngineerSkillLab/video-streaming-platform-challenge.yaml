title: "【クラウドアーキテクチャパズル】動画配信プラットフォームの仕組みをゼロから理解するのだ！"

# YouTube: https://youtu.be/m1PI-Cjelhw



characters:

  metan:

    speakerId: 2

    image: "./image/metan/通常.png"

    position: right

    subtitleColor: "#FF88BB"

    voice:

      speedScale: 1.25

      intonationScale: 1.05



  zundamon:

    speakerId: 3

    image: "./image/zundamon/通常.png"

    position: left

    subtitleColor: "#88DD44"

    voice:

      speedScale: 1.25

      intonationScale: 1.1



global:

  defaultSpeaker: "zundamon"

  voice:

    speedScale: 1.2

    postPhonemeLength: 0.08

  defaultBackground: "./image/background/Movidrill.png"



output:

  fps: 30

  width: 1280

  height: 720



scenes:

  # ============================================================

  # 1. オープニング：ずんだもち屋の動画配信チャンネルを作りたい！

  # ============================================================

  - id: "opening"

    lines:

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "みんな、こんにちはなのだ！ずんだもんなのだ！"

        subtitle: "みんな、こんにちはなのだ！ずんだもんなのだ！"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "前回は「動的Webアプリの基本構成」チャレンジだったのだ！DNS、LB、API、認証、DB、キャッシュ、完璧なのだ！"

        subtitle: "前回は「動的Webアプリの基本構成」チャレンジだったのだ！DNS、LB、API、認証、DB、キャッシュ、完璧なのだ！"

      - type: dialogue

        character: metan

        face: "通常"

        text: "四国めたんです。今回はチャレンジ3、「動画配信プラットフォーム」よ。"

        subtitle: "四国めたんです。今回はチャレンジ3、「動画配信プラットフォーム」よ。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "ずんだもち屋のずんだもち作り動画を配信したいのだ！アップロードして、みんなに観てもらう、あのサービスなのだ！"

        subtitle: "ずんだもち屋のずんだもち作り動画を配信したいのだ！アップロードして、みんなに観てもらう、あのサービスなのだ！"

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "でも前回のチャレンジ2の構成だと、動画ファイルが大きすぎてDBに入らないのだ……。"

        subtitle: "でも前回のチャレンジ2の構成だと、動画ファイルが大きすぎてDBに入らないのだ……。"

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "変換もしないといけないし、さらに世界中のひとに速く届けたいのだ。どうすればいいのだ？"

        subtitle: "変換もしないといけないし、さらに世界中のひとに速く届けたいのだ。どうすればいいのだ？"

      - type: dialogue

        character: metan

        face: "喜び"

        text: "それが今回のテーマよ。「大きなファイルをどこに置くか」「変換をどう非同期でやるか」「どう速く届けるか」の三つが鍵。"

        subtitle: "それが今回のテーマよ。「大きなファイルをどこに置くか」「変換をどう非同期でやるか」「どう速く届けるか」の三つが鍵。"



  # ============================================================

  # 2. 動画の特殊性：DBには入れられない

  # ============================================================

  - id: "why-not-db"

    lines:

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "そもそも、なぜ動画はDBに入れちゃダメなのだ？テキストは入れてたのに。"

        subtitle: "そもそも、なぜ動画はDBに入れちゃダメなのだ？テキストは入れてたのに。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "動画一本が数百メガバイトから数ギガバイトあるわ。RDBはそういう大きなバイナリを得意としてないし、入れるとすぐ遅くなる。"

        subtitle: "動画一本が数百メガバイトから数ギガバイトあるわ。RDBはそういう大きなバイナリを得意としてないし、入れるとすぐ遅くなる。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "DBに入れるのは、タイトル・説明文・投稿者・再生数みたいな「メタデータ」だけ。ファイル本体は別の場所に置く。"

        subtitle: "DBに入れるのは、タイトル・説明文・投稿者・再生数みたいな「メタデータ」だけ。ファイル本体は別の場所に置く。"

      - type: dialogue

        character: zundamon

        face: "驚き"

        text: "DBはメタデータ専用で、動画ファイルは専用の場所があるのだ！"

        subtitle: "DBはメタデータ専用で、動画ファイルは専用の場所があるのだ！"

      - type: dialogue

        character: metan

        face: "喜び"

        text: "そう。その専用の場所が「オブジェクトストレージ」よ。AWSだとS3、GCPだとCloud Storageと呼ぶクラウドサービスね。"

        subtitle: "そう。その専用の場所が「オブジェクトストレージ」よ。AWSだとS3、GCPだとCloud Storageと呼ぶクラウドサービスね。"



  # ============================================================

  # 3. オブジェクトストレージ：大容量ファイルの置き場

  # ============================================================

  - id: "object-storage"

    lines:

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "オブジェクトストレージって、普通のファイルサーバーと何が違うのだ？"

        subtitle: "オブジェクトストレージって、普通のファイルサーバーと何が違うのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "フォルダ構造じゃなく、キーと値のペアで管理するの。「この動画ID.mp4」みたいなキーで、どこにでも置けて、容量制限がほぼない。"

        subtitle: "フォルダ構造じゃなく、キーと値のペアで管理するの。「この動画ID.mp4」みたいなキーで、どこにでも置けて、容量制限がほぼない。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "耐久性も高くて、自動的にバックアップされる。大量のファイルを安く安全に保管するのが得意よ。"

        subtitle: "耐久性も高くて、自動的にバックアップされる。大量のファイルを安く安全に保管するのが得意よ。"

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "でもアップロードするとき、クライアントはAPIを通して動画ファイルを渡せばいいのだ？"

        subtitle: "でもアップロードするとき、クライアントはAPIを通して動画ファイルを渡せばいいのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "APIを中継すると数ギガの動画がAPIサーバーを圧迫するわ。だから実務では「署名付きURL」という仕組みで、クライアントがオブジェクトストレージに直接アップロードすることが多い。"

        subtitle: "APIを中継すると数ギガの動画がAPIサーバーを圧迫するわ。だから実務では「署名付きURL」という仕組みで、クライアントがオブジェクトストレージに直接アップロードすることが多い。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "パズルではシンプルに、APIがオブジェクトストレージと接続して動画の管理をまとめて担う形で考えるわ。"

        subtitle: "パズルではシンプルに、APIがオブジェクトストレージと接続して動画の管理をまとめて担う形で考えるわ。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "API→オブジェクトストレージの線が一本増えるのだ！"

        subtitle: "API→オブジェクトストレージの線が一本増えるのだ！"



  # ============================================================

  # 4. 非同期処理の必要性：トランスコードは時間がかかる

  # ============================================================

  - id: "why-async"

    lines:

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "動画をアップロードしたら、すぐ観られるようにしないといけないのだ。変換はどうするのだ？"

        subtitle: "動画をアップロードしたら、すぐ観られるようにしないといけないのだ。変換はどうするのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "動画の変換、つまりトランスコードは時間がかかるの。1時間の動画を720pと1080pに変換したら、処理に数分以上かかることもある。"

        subtitle: "動画の変換、つまりトランスコードは時間がかかるの。1時間の動画を720pと1080pに変換したら、処理に数分以上かかることもある。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "その間ずっとAPIサーバーが占有されると、他のユーザーのリクエストが詰まってしまうわ。"

        subtitle: "その間ずっとAPIサーバーが占有されると、他のユーザーのリクエストが詰まってしまうわ。"

      - type: dialogue

        character: zundamon

        face: "驚き"

        text: "変換中にAPIがビジーになったら、予約もログインもできなくなるのだ！それは困るのだ！"

        subtitle: "変換中にAPIがビジーになったら、予約もログインもできなくなるのだ！それは困るのだ！"

      - type: dialogue

        character: metan

        face: "喜び"

        text: "だから「非同期処理」にする。APIは「変換してね」というメッセージをキューに積むだけ。実際の変換は別のジョブワーカーが担当する。"

        subtitle: "だから「非同期処理」にする。APIは「変換してね」というメッセージをキューに積むだけ。実際の変換は別のジョブワーカーが担当する。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "APIは依頼を出すだけで、変換は別のひとに任せるのだ！そのあいだ他の仕事ができるのだ！"

        subtitle: "APIは依頼を出すだけで、変換は別のひとに任せるのだ！そのあいだ他の仕事ができるのだ！"



  # ============================================================

  # 5. メッセージキューとジョブワーカー：非同期処理の仕組み

  # ============================================================

  - id: "queue-and-worker"

    lines:

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "キューって何なのだ？郵便ポストみたいなのだ？"

        subtitle: "キューって何なのだ？郵便ポストみたいなのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "近いわ。メッセージキューは、仕事の依頼をためておく待ち行列。投稿された順番に積まれて、ジョブワーカーが取り出して処理する。"

        subtitle: "近いわ。メッセージキューは、仕事の依頼をためておく待ち行列。投稿された順番に積まれて、ジョブワーカーが取り出して処理する。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "AWSだとSQS、GCPだとPub/Subが代表例ね。"

        subtitle: "AWSだとSQS、GCPだとPub/Subが代表例ね。"

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "ジョブワーカーってどこで動いてるのだ？"

        subtitle: "ジョブワーカーってどこで動いてるのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "ジョブワーカーは独立したサーバーまたはコンテナで動いていて、キューを常に監視している。メッセージが来たら取り出して、オブジェクトストレージから動画を読み込んで変換し、変換後の動画を書き戻す。"

        subtitle: "ジョブワーカーは独立したサーバーまたはコンテナで動いていて、キューを常に監視している。メッセージが来たら取り出して、オブジェクトストレージから動画を読み込んで変換し、変換後の動画を書き戻す。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "ジョブワーカー→メッセージキューで「仕事を取る」、ジョブワーカー→オブジェクトストレージで「読んで書く」の二本が増えるのだ！"

        subtitle: "ジョブワーカー→メッセージキューで「仕事を取る」、ジョブワーカー→オブジェクトストレージで「読んで書く」の二本が増えるのだ！"

      - type: dialogue

        character: metan

        face: "喜び"

        text: "その通り。キューのおかげで、アップロード数が急増しても、メッセージがたまるだけでシステムが壊れない。ジョブワーカーを増やせば処理速度も上げられる。"

        subtitle: "その通り。キューのおかげで、アップロード数が急増しても、メッセージがたまるだけでシステムが壊れない。ジョブワーカーを増やせば処理速度も上げられる。"



  # ============================================================

  # 6. 動画配信とCDN：再登場の理由

  # ============================================================

  - id: "cdn-for-video"

    lines:

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "変換が終わったあと、視聴者はどうやって動画を観るのだ？オブジェクトストレージに直接アクセスするのだ？"

        subtitle: "変換が終わったあと、視聴者はどうやって動画を観るのだ？オブジェクトストレージに直接アクセスするのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "直接だと遅いし、ストレージへのアクセスコストもかさむ。ここでチャレンジ1に出てきた「CDN」が再登場するの。"

        subtitle: "直接だと遅いし、ストレージへのアクセスコストもかさむ。ここでチャレンジ1に出てきた「CDN」が再登場するの。"

      - type: dialogue

        character: zundamon

        face: "驚き"

        text: "CDN、久しぶりなのだ！今回はどんな役割なのだ？"

        subtitle: "CDN、久しぶりなのだ！今回はどんな役割なのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "チャレンジ1ではHTMLや画像を配信するためだったけど、今回はずっと重い動画ファイルを世界中に届けるのが仕事。"

        subtitle: "チャレンジ1ではHTMLや画像を配信するためだったけど、今回はずっと重い動画ファイルを世界中に届けるのが仕事。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "視聴者はまずDNSで配信用ホスト名を解決してCDNのエッジに届く。CDNが持っていればそのまま返し、なければオブジェクトストレージから取ってきてキャッシュする。"

        subtitle: "視聴者はまずDNSで配信用ホスト名を解決してCDNのエッジに届く。CDNが持っていればそのまま返し、なければオブジェクトストレージから取ってきてキャッシュする。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "人気動画はCDNがキャッシュするから、世界中のひとがサクサク観られるのだ！"

        subtitle: "人気動画はCDNがキャッシュするから、世界中のひとがサクサク観られるのだ！"

      - type: dialogue

        character: metan

        face: "喜び"

        text: "そう。クライアント→DNSのあと、DNSからロードバランサー向けとCDN向けに分岐するの。動画の視聴はDNS→CDNでエッジに届き、CDN→オブジェクトストレージでオリジンから取りにいくわ。"

        subtitle: "そう。クライアント→DNSのあと、DNSからロードバランサー向けとCDN向けに分岐するの。動画の視聴はDNS→CDNでエッジに届き、CDN→オブジェクトストレージでオリジンから取りにいくわ。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "Webサイトの表示はチャレンジ2と同じくDNS→LB→Web→APIの流れ。動画の視聴はDNS→CDN→オブジェクトストレージで、配信用ホスト名を別にDNSで解決するのが、今回の構成の特徴よ。"

        subtitle: "Webサイトの表示はチャレンジ2と同じくDNS→LB→Web→APIの流れ。動画の視聴はDNS→CDN→オブジェクトストレージで、配信用ホスト名を別にDNSで解決するのが、今回の構成の特徴よ。"



  # ============================================================

  # 7. 全体フローの整理：アップロードと視聴の二つの流れ

  # ============================================================

  - id: "flow-summary"

    lines:

      - type: dialogue

        character: zundamon

        face: "困り"

        text: "ちょっと整理したいのだ。「アップロードの流れ」と「視聴の流れ」で別々に考えたほうがいいのだ？"

        subtitle: "ちょっと整理したいのだ。「アップロードの流れ」と「視聴の流れ」で別々に考えたほうがいいのだ？"

      - type: dialogue

        character: metan

        face: "通常"

        text: "そう整理すると分かりやすいわ。まずアップロードの流れ。クライアントがLBを通してAPIに動画情報を送る。APIはオブジェクトストレージに動画ファイルを保管して、メッセージキューに変換ジョブを積む。"

        subtitle: "そう整理すると分かりやすいわ。まずアップロードの流れ。クライアントがLBを通してAPIに動画情報を送る。APIはオブジェクトストレージに動画ファイルを保管して、メッセージキューに変換ジョブを積む。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "ジョブワーカーはキューからジョブを受け取り、オブジェクトストレージから動画を読み込んで変換し、変換後の動画を書き戻す。変換完了後はAPIがRDBのメタデータを更新する。"

        subtitle: "ジョブワーカーはキューからジョブを受け取り、オブジェクトストレージから動画を読み込んで変換し、変換後の動画を書き戻す。変換完了後はAPIがRDBのメタデータを更新する。"

      - type: dialogue

        character: zundamon

        face: "喜び"

        text: "アップロードはAPI→オブジェクトストレージ→キュー→ジョブワーカー、って流れなのだ！"

        subtitle: "アップロードはAPI→オブジェクトストレージ→キュー→ジョブワーカー、って流れなのだ！"

      - type: dialogue

        character: metan

        face: "通常"

        text: "次に視聴の流れ。クライアントはDNSで配信用ホスト名を解決してCDNのエッジに届き、動画を受け取る。CDNにキャッシュがなければオブジェクトストレージから取得する。動画一覧や検索はLBを通してAPIへ、通常のWeb操作と同じ流れよ。"

        subtitle: "次に視聴の流れ。クライアントはDNSで配信用ホスト名を解決してCDNのエッジに届き、動画を受け取る。CDNにキャッシュがなければオブジェクトストレージから取得する。動画一覧や検索はLBを通してAPIへ、通常のWeb操作と同じ流れよ。"

      - type: dialogue

        character: zundamon

        face: "驚き"

        text: "同じクライアントが、DNSでアプリ用と配信用の名前を分けて、LBへの道とCDNへの道の両方を持つのだ！用途で使い分けるのだ！"

        subtitle: "同じクライアントが、DNSでアプリ用と配信用の名前を分けて、LBへの道とCDNへの道の両方を持つのだ！用途で使い分けるのだ！"



  # ============================================================

  # 8. パズルの答え

  # ============================================================

  - id: "puzzle-answer"

    lines:

      - type: dialogue

        character: metan

        face: "通常"

        text: "では今回のパズルの答えをまとめるわ。コンポーネントは十一個。"

        subtitle: "では今回のパズルの答えをまとめるわ。コンポーネントは十一個。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "クライアント、DNS、CDN、ロードバランサー、Webサーバー、APIサーバー、認証サービス、RDB、オブジェクトストレージ、メッセージキュー、ジョブワーカー。"

        subtitle: "クライアント、DNS、CDN、ロードバランサー、Webサーバー、APIサーバー、認証サービス、RDB、オブジェクトストレージ、メッセージキュー、ジョブワーカー。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "接続は十三本。クライアント→DNS、DNS→LB、DNS→CDN、LB→Webサーバー、LB→APIサーバーの五本が、名前解決と入口。DNSからロードバランサー向けとCDN向けに分岐するわ。"

        subtitle: "接続は十三本。クライアント→DNS、DNS→LB、DNS→CDN、LB→Webサーバー、LB→APIサーバーの五本が、名前解決と入口。DNSからロードバランサー向けとCDN向けに分岐するわ。"

      - type: dialogue

        character: metan

        face: "通常"

        text: "認証まわりはクライアント→認証サービス、APIサーバー→認証サービスの二本。APIの先はAPIサーバー→RDB、APIサーバー→オブジェクトストレージ、APIサーバー→メッセージキューの三本。"

        subtitle: "認証まわりはクライアント→認証サービス、APIサーバー→認証サービスの二本。APIの先はAPIサーバー→RDB、APIサーバー→オブジェクトストレージ、APIサーバー→メッセージキューの三本。"

      - type: dialogue

        character: metan

        face: "通常"

