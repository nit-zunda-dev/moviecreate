title: "【case-001】恋人に送る本音をAIが書く"
output:
  file: "./output/case-001-heart-sync.wav"
global:
  defaultSpeaker: "zundamon"

characters:
  zundamon:
    speakerId: 3
    styleId: 0
  metan:
    speakerId: 2
    styleId: 0

scenes:
  - id: "op"
    lines:
      - type: "dialogue"
        character: "zundamon"
        text: "今日のテーマ、たぶん一番やりそうなのだ。"
      - type: "dialogue"
        character: "metan"
        text: "恋人へのラインを、AIに全部考えてもらう話よ。"

  - id: "case"
    lines:
      - type: "dialogue"
        character: "metan"
        text: "AIアシスタント、ハートシンクは、返信文や気遣い、記念日の提案まで全部やってくれるの。"
      - type: "dialogue"
        character: "metan"
        text: "使い始めてから、あなたは恋人に、最近すごく優しいねと言われるようになった。"
      - type: "dialogue"
        character: "zundamon"
        text: "でも実際は、ほとんど自分で考えてないのだ。"
      - type: "dialogue"
        character: "metan"
        text: "そんな中、恋人がプロポーズの相談をしてくる。もちろん返答案も、AIは完璧に作るの。"

  - id: "choices"
    lines:
      - type: "dialogue"
        character: "zundamon"
        text: "選択エーは、続ける。幸せにできるなら、AI代筆でもいいのだ。"
      - type: "dialogue"
        character: "metan"
        text: "結果として関係が良くなるなら、手段は問わないという考え方ね。"
      - type: "dialogue"
        character: "zundamon"
        text: "選択ビーは、やめる。恋愛の言葉をAIに外注するのは違う、なのだ。"
      - type: "dialogue"
        character: "metan"
        text: "不器用でも、自分の言葉で向き合うべきだという立場よ。"

  - id: "rebuttal"
    lines:
      - type: "dialogue"
        character: "metan"
        text: "エーを選んだ人へ。相手が好きになっているのは、あなた本人？それともAIが磨いた人格？"
      - type: "dialogue"
        character: "zundamon"
        text: "優しい恋人は存在してるけど、中身がほぼAIなのは、ちょっとずるいのだ。"
      - type: "dialogue"
        character: "metan"
        text: "ビーを選んだ人にも聞くわ。AIを使えば避けられたすれ違いや別れを、純度のために受け入れるの？"
      - type: "dialogue"
        character: "zundamon"
        text: "本音の価値と、うまくいく関係の価値がぶつかるのだ。"

  - id: "philosophy"
    lines:
      - type: "dialogue"
        character: "metan"
        text: "これは、本物らしさの問題ね。"
      - type: "dialogue"
        character: "metan"
        text: "恋愛は結果が良ければいいのか。それとも、その過程にある不器用さや戸惑いも含めて本物なのか。"
      - type: "dialogue"
        character: "zundamon"
        text: "AIで最適化された優しさは、品質は高いけど、本人性が薄いのだ。"

  - id: "summary"
    lines:
      - type: "dialogue"
        character: "zundamon"
        text: "恋人を幸せにできるなら、AIが書いた言葉でもアリなのだ？"
      - type: "dialogue"
        character: "metan"
        text: "それとも、下手でも自分の言葉じゃなければ意味がないのかしら。"
      - type: "dialogue"
        character: "zundamon"
        text: "みんなは、恋愛の代筆AIを使うのだ？"

