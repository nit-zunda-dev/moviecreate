    lines:
      - type: dialogue
        character: ieyasu
        text: "What is this Twitter you speak of? Explain it to me plainly, as if I were a lord of Edo."
        subtitle: "What is this Twitter you speak of? Explain it to me plainly, as if I were a lord of Edo."
        speechText: "ワット・イズ・ディス・ツイッター・ユー・スピーク・オブ？エクスプレイン・イット・トゥ・ミー・プレインリー、アズ・イフ・アイ・ウェア・ア・ロード・オブ・エド。"
