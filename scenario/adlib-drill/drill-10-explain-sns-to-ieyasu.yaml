        face: "通常"
        text: "Imagine a messenger that ~ は「〜のような伝令を想像して」。You send short messages, and a messenger carries them to thousands of people instantly で、短い文を伝令が一瞬で届けるイメージよ。"
        subtitle: "Imagine a messenger that ~ / You send short messages"
        speechText: "イマジン・ア・メッセンジャー・ザットは、伝令を想像して。ユー・センド・ショート・メッセージズ、アンド・ア・メッセンジャー・キャリーズ・ゼム・トゥ・サウザンズ・オブ・ピープル・インスタントリーで、短い文を伝令が一瞬で届けるイメージよ。"
      - type: dialogue
