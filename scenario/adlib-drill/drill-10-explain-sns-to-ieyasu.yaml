        face: "驚き"
        text: "家康公にTwitterを説明しろって！？ 英語で、しかも分かりやすく、急に言えって言われたのだ！？"

  - id: "part1_prompt"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "あなたなら、家康にも分かるように、Twitterとは何かを英語で説明するのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "江戸の広場、伝令、みんなに届く—この3つの比喩で組み立ててみて。答えはこのあと。"

