        text: "It's like a town square where ~ は「〜のような広場のようなもの」。Think of it like a town square in Edo, but everyone in Japan can hear you at once で、江戸の広場に例えるわ。"
        subtitle: "It's like a town square where ~ / Think of it like ~"
