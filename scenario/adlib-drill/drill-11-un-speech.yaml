  # ---------- Part1（お題）----------
  - id: "part1_intro"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "国連気候変動会議。日本代表として壇上に立って、60秒で各国に即時行動を訴えるスピーチ、あるあるよね。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "議長に指名されたのに、格式ある英語のスピーチが思い浮かばないのだ……"

  - id: "part1_question"
    chapter: { label: "お題" }
    lines:
      - type: dialogue
        character: chairman
        text: "The floor is yours, Japan. You have sixty seconds. Distinguished delegates are listening—please address the need for immediate climate action."
        subtitle: "The floor is yours, Japan. You have sixty seconds. Distinguished delegates are listening—please address the need for immediate climate action."
        speechText: "ザ・フロア・イズ・ユアーズ、ジャパン。ユー・ハヴ・シクスティ・セカンズ。ディスティングウィッシュド・デリゲイツ・アー・リスニング、プリーズ・アドレス・ザ・ニード・フォー・イミーディエット・クライメイト・アクション。"
        voice:
          speedScale: 0.92
          postPhonemeLength: 0.12
        emphasis:
          - "sixty seconds"
          - "Distinguished delegates"
          - "immediate climate action"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "国連で60秒スピーチ！？ 格式と説得力のある英語、急に言えって言われたのだ！？"

  - id: "part1_prompt"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "あなたなら、日本代表として、各国の即時行動を訴える60秒スピーチを英語で話すのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "Distinguished delegates で始めて、The time for action is now で緊急性を、We owe it to future generations で未来への責任を。答えはこのあと。"

