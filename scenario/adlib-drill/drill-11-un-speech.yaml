    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "まず模範。挨拶→今すぐ行動→日本のコミット→未来世代への責任、の流れよ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "Distinguished delegates, the time for action is now. Japan commits to bolder emissions cuts this decade. We owe it to future generations to act together—not tomorrow, but today."
