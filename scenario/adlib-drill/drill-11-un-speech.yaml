      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "Distinguished delegates と The time for action is now と We owe it to future generations、覚えるのだ！"
        speechText: "ディスティングウィッシュド・デリゲイツと、ザ・タイム・フォー・アクション・イズ・ナウと、ウィ・オウ・イット・トゥ・フューチャー・ジェネレーションズ、覚えるのだ！"

