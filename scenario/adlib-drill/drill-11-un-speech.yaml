        subtitle: "Distinguished delegates, the time for action is now. Japan commits to bolder emissions cuts this decade. We owe it to future generations to act together—not tomorrow, but today."
        speechText: "ディスティングウィッシュド・デリゲイツ、ザ・タイム・フォー・アクション・イズ・ナウ。ジャパン・コミッツ・トゥ・ボルダー・イミッションズ・カッツ・ディス・ディケイド。ウィ・オウ・イット・トゥ・フューチャー・ジェネレーションズ・トゥ・アクト・トゥゲザー、ノット・トゥモロー、バット・トゥデイ。"
        voice:
          speedScale: 0.95
          intonationScale: 1.05
        emphasis:
          - "Distinguished delegates"
          - "the time for action is now"
          - "future generations"
          - "not tomorrow, but today"

  - id: "part2_outro"
    slideIndex: 7
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "Distinguished delegates、The time for action is now、We owe it to future generations。この3つを持ち帰って。アプリの超人級編でも練習してね。"
        speechText: "ディスティングウィッシュド・デリゲイツ、ザ・タイム・フォー・アクション・イズ・ナウ、ウィ・オウ・イット・トゥ・フューチャー・ジェネレーションズ。この3つを持ち帰って。アプリの超人級編でも練習してね。"
