        character: metan
        face: "通常"
        text: "Distinguished delegates は国連・外交の定番挨拶。「尊敬する代表各位」—格式を一発で出すわ。Honorable delegates や Esteemed colleagues でも同じ役割よ。"
        subtitle: "Distinguished delegates / Honorable delegates"
        speechText: "ディスティングウィッシュド・デリゲイツは、国連・外交の定番挨拶。尊敬する代表各位、格式を一発で出すわ。オナラブル・デリゲイツ、や、エスティームド・コリーグズ、でも同じ役割よ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "冒頭の Distinguished delegates で、国連の壇上に立っている感じが出るのだ。"
        speechText: "冒頭の、ディスティングウィッシュド・デリゲイツで、国連の壇上に立っている感じが出るのだ。"

  - id: "part2_time_for_action"
    slideIndex: 3
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "The time for action is now は「今こそ行動の時」。Japan commits to bolder emissions cuts this decade で、日本の具体的コミットを宣言するの。"
        subtitle: "The time for action is now / Japan commits to ~"
        speechText: "ザ・タイム・フォー・アクション・イズ・ナウは、今こそ行動の時。ジャパン・コミッツ・トゥ・ボルダー・イミッションズ・カッツ・ディス・ディケイドで、日本の具体的コミットを宣言するの。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "bolder emissions cuts this decade で「この10年でより大胆な削減」—数字がなくても、方向性は伝わるのだ。"
        speechText: "ボルダー・イミッションズ・カッツ・ディス・ディケイドで、この10年でより大胆な削減。数字がなくても、方向性は伝わるのだ。"

  - id: "part2_future_generations"
    slideIndex: 4
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "We owe it to future generations to ~ は「未来の世代に対する責任として〜すべき」。act together—not tomorrow, but today で、協力と「今日」を強調。"
        subtitle: "We owe it to future generations to ~ / not tomorrow, but today"
        speechText: "ウィ・オウ・イット・トゥ・フューチャー・ジェネレーションズ・トゥは、未来の世代に対する責任としてすべき。アクト・トゥゲザー、ノット・トゥモロー、バット・トゥデイで、協力と今日を強調。"
      - type: dialogue
