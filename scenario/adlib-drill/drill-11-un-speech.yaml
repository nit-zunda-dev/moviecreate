        face: "困り"
        text: "緊張したら、Distinguished delegates と The time for action is now の2文だけ覚えておけば、なんとかなるのだ。"
        speechText: "緊張したら、ディスティングウィッシュド・デリゲイツと、ザ・タイム・フォー・アクション・イズ・ナウの2文だけ覚えておけば、なんとかなるのだ。"

