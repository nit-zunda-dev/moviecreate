    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "短く言うなら Distinguished delegates, we must act now. Japan will lead with bolder cuts. Our children are counting on us—today. でもOK。60秒以内がルールよ。"
        speechText: "短く言うなら、ディスティングウィッシュド・デリゲイツ、ウィ・マスト・アクト・ナウ。ジャパン・ウィル・リード・ウィズ・ボルダー・カッツ。アワ・チルドレン・アー・カウンティング・オン・アス、トゥデイ。でもオーケー。60秒以内がルールよ。"
      - type: dialogue
