# アプリ: ENGLISH_AD-LIB_DRILL / Question.id = beginner-1

#

# 解説スライド: drill-01-cafe-order-grammar-slides.html

# slideIndex ⇔ scene.id (Part2):

#   0 part2_intro · 1 part2_model · 2 part2_id_like · 3 part2_can_i_have

#   4 part2_vocab · 5 part2_variants · 6 part2_replay · 7 part2_outro

#

# drill-meta（レンダ後に実測して stages.ts へ）:

#   setupEndSeconds / revealStartSeconds: 15

