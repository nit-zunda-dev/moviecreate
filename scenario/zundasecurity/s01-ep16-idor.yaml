title: "【登録セキスペ 第16回｜Season2】URLの数字をいじったら他人の請求書？　IDOR（不適切な直接オブジェクト参照）と認可の試験ポイントなのだ！"

# =============================================================================
# 学習スライドとの対応（詳細図: s01-ep16-idor-study-slides.html）
# generate-video 用 Reveal: s01-ep16-idor-reveal-slides.html ← global.slidesHtml
# -----------------------------------------------------------------------------
# スライドの「1/13」など = 下表の「スライド #」。study HTML では data-i="N"。
# 先頭スライドは incident（導入）、2枚目が opening（全体地図）。台本の並びと一致。
# -----------------------------------------------------------------------------
# 台本 id (scenes)       | slideIndex | 内容のあたり
# ----------------------|------------|----------------------------------
# incident               | 0          | 導入：請求書PDFの id パラメータ
# opening                | 1          | 第16回の位置づけ・学習目標
# concept_authz          | 2          | 認証と認可の二段
# direct_reference         | 3          | URL／API に直書きの危険
# horizontal_vertical      | 4          | 水平・垂直のイメージ
# surfaces                 | 5          | REST・ダウンロード・モバイルAPI 等
# defense_policy_engine    | 6          | サーバ側で毎回チェック
# defense_indirect_map     | 7          | 間接参照・トークン
# defense_uuid_limit       | 8          | UUID だけでは足りない理由
# defense_logging          | 9          | 監査・異常検知・レート制限
# compare_axes             | 10         | 第7回・13回・15回との違い
# exam_tips                | 11         | 試験のひっかけ
# summary                  | 12         | まとめ
# 動画生成（generate-video）: global.slidesHtml と slideIndex の対応
# =============================================================================
# docs/series3/企画書.md: ずんだもん＝初心者視点／めたん＝解説。失敗から学ぶ導入。
# =============================================================================

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/Movidrill.png"
  videoFrame: "./docs/generate_scene_illustrations/hikei.png"
  slidesHtml: "./s01-ep16-idor-reveal-slides.html"

output:
  fps: 30
  width: 1280
  height: 720

scenes:
  # ============================================================
  # インシデント導入（請求書PDFの id）
  # ============================================================
  - id: "incident"
    slideIndex: 0
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "たすけてほしいのだ！　経費精算の『請求書PDF』を開く画面で、URL の orderId を自分の 10042 から、たまたま隣の 10043 に書き換えたら……別人の宛名と金額が表示されたのだ……！　ログインは自分のアカウントなのに……！"
        subtitle: "たすけてほしいのだ！　経費精算の『請求書PDF』を開く画面で、URL の orderId を自分の 10042 から、たまたま隣の 10043 に書き換えたら……別人の宛名と金額が表示されたのだ……！　ログインは自分のアカウントなのに……！"
      - type: dialogue
        character: metan
        face: "困り"
        text: "典型ね。『誰か』は分かったけど『このデータを見ていいか』をサーバが毎回確認していないパターン。教科書では不適切な直接オブジェクト参照、略して IDOR と呼ばれることが多いわ。OWASP でもアクセス制御の不備の代表例として扱われる。"
        subtitle: "典型ね。『誰か』は分かったけど『このデータを見ていいか』をサーバが毎回確認していないパターン。教科書では不適切な直接オブジェクト参照、略して IDOR と呼ばれることが多いわ。OWASP でもアクセス制御の不備の代表例として扱われる。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "第15回は XML の冒頭の話だったのに、今回はブラウザのアドレスバーなのだ？"
        subtitle: "第15回は XML の冒頭の話だったのに、今回はブラウザのアドレスバーなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "効く先が違う。第15回は読み取り処理が外へ広がる話。今回は『渡された番号のデータを、そのまま出す』ことで、他人の領域まで見えてしまう話。どちらも『サーバが渡す前に、もう一段確認すべきだった』が共通よ。"
        subtitle: "効く先が違う。第15回は読み取り処理が外へ広がる話。今回は『渡された番号のデータを、そのまま出す』ことで、他人の領域まで見えてしまう話。どちらも『サーバが渡す前に、もう一段確認すべきだった』が共通よ。"

  # ============================================================
  # オープニング：第16回の位置づけ
  # ============================================================
  - id: "opening"
    slideIndex: 1
    lines:
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "じゃあ第16回の本題なのだ。ログインできてる＝安全、って思ってたのが間違いだったのだ……。"
        subtitle: "じゃあ第16回の本題なのだ。ログインできてる＝安全、って思ってたのが間違いだったのだ……。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "今回は IDOR の話。ざっくり『オブジェクト——請求やファイル、レコードみたいな“塊”——を指す番号や名前を、利用者が変えられるのに、サーバが持ち主を確認しない』欠陥よ。流れは、認証と認可の整理、壊れ方、よくある画面、防ぎ方、他の弱点との違い——この順でいくわ。"
        subtitle: "今回は IDOR の話。ざっくり『オブジェクト——請求やファイル、レコードみたいな“塊”——を指す番号や名前を、利用者が変えられるのに、サーバが持ち主を確認しない』欠陥よ。流れは、認証と認可の整理、壊れ方、よくある画面、防ぎ方、他の弱点との違い——この順でいくわ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "このチャンネル第16回目、Webアプリの弱点シリーズもだいぶ揃ってきたのだ？"
        subtitle: "このチャンネル第16回目、Webアプリの弱点シリーズもだいぶ揃ってきたのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "その通り。覚えどころは『認可は毎回サーバ側』と『番号を推測されにくくするだけでは足りない』。午後の記述でも、アクセス制御の設計として出やすいわ。"
        subtitle: "その通り。覚えどころは『認可は毎回サーバ側』と『番号を推測されにくくするだけでは足りない』。午後の記述でも、アクセス制御の設計として出やすいわ。"

  # ============================================================
  # 認証と認可
  # ============================================================
  - id: "concept_authz"
    slideIndex: 2
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "認証と認可、どっちがどっちなのだ？"
        subtitle: "認証と認可、どっちがどっちなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "二段で覚えて。認証は『あなたは誰』。認可は『そのデータをあなたが見ていいか』。IDOR は後者が抜けたときに起きる。ログインできただけで、URL の id を信じてファイルを出す——よくある落とし穴ね。"
        subtitle: "二段で覚えて。認証は『あなたは誰』。認可は『そのデータをあなたが見ていいか』。IDOR は後者が抜けたときに起きる。ログインできただけで、URL の id を信じてファイルを出す——よくある落とし穴ね。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "試験では『ログを取る』『HTTPS にする』が正しそうに見えても、本命は『要求されたオブジェクトと利用者の関係をサーバで検証する』側になりやすいわ。"
        subtitle: "試験では『ログを取る』『HTTPS にする』が正しそうに見えても、本命は『要求されたオブジェクトと利用者の関係をサーバで検証する』側になりやすいわ。"

  # ============================================================
  # 直接参照
  # ============================================================
  - id: "direct_reference"
    slideIndex: 3
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "『直接』って、URL に連番がそのまま出てるやつのことなのだ？"
        subtitle: "『直接』って、URL に連番がそのまま出てるやつのことなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "典型例はそう。請求書、発注、会員番号、添付ファイルの保存名——データベースの主キーや連番がそのまま外部に出ると、いじるだけで他人の領域に届く。REST のパスに id が並ぶ API も同じ構造よ。"
        subtitle: "典型例はそう。請求書、発注、会員番号、添付ファイルの保存名——データベースの主キーや連番がそのまま外部に出ると、いじるだけで他人の領域に届く。REST のパスに id が並ぶ API も同じ構造よ。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "ずんだもん、『連番だから業務的に分かりやすい』で載せがちなのだ……。"
        subtitle: "ずんだもん、『連番だから業務的に分かりやすい』で載せがちなのだ……。"

  # ============================================================
  # 水平・垂直
  # ============================================================
  - id: "horizontal_vertical"
    slideIndex: 4
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "同じ一般ユーザー同士で他人のデータが見えるのと、一般ユーザーが管理者メニューを触るのと、どっちも IDOR なのだ？"
        subtitle: "同じ一般ユーザー同士で他人のデータが見えるのと、一般ユーザーが管理者メニューを触るのと、どっちも IDOR なのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "厳密なラベル付けは文献でぶれるけど、試験では大枠を『アクセス制御の不備』でまとめて考えていいわ。同格のユーザー横の越えは水平権限の話として語られることが多い。役割を超えるのは垂直に近いイメージ。どちらも『その操作をしていい主体か』の確認が抜けてる点は同じ。"
        subtitle: "厳密なラベル付けは文献でぶれるけど、試験では大枠を『アクセス制御の不備』でまとめて考えていいわ。同格のユーザー横の越えは水平権限の話として語られることが多い。役割を超えるのは垂直に近いイメージ。どちらも『その操作をしていい主体か』の確認が抜けてる点は同じ。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "用語より『毎回サーバで持ち主チェック』が書けるかが勝負よ。"
        subtitle: "用語より『毎回サーバで持ち主チェック』が書けるかが勝負よ。"

  # ============================================================
  # 発生箇所
  # ============================================================
  - id: "surfaces"
    slideIndex: 5
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "請求・注文・医療・学務——マルチテナントで区切ってるほど、id をいじるだけの事故が目立つ。スマホアプリの API、GraphQL のフィールド、バッチのダウンロードリンク、古い画面の「ファイル名＝実ファイル名」も要注意ね。"
        subtitle: "請求・注文・医療・学務——マルチテナントで区切ってるほど、id をいじるだけの事故が目立つ。スマホアプリの API、GraphQL のフィールド、バッチのダウンロードリンク、古い画面の「ファイル名＝実ファイル名」も要注意ね。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "フロントで『このボタンは自分のときだけ表示』にしてれば安心、はウソなのだ？"
        subtitle: "フロントで『このボタンは自分のときだけ表示』にしてれば安心、はウソなのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "ウソ。画面を消すのはユーザ体験の話で、防衛の本体はサーバ。直接 URL を叩かれたら終わる。"
        subtitle: "ウソ。画面を消すのはユーザ体験の話で、防衛の本体はサーバ。直接 URL を叩かれたら終わる。"

  # ============================================================
  # 対策① サーバ側認可
  # ============================================================
  - id: "defense_policy_engine"
    slideIndex: 6
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の第一。オブジェクトを返す直前に、『この利用者がこのテナント／この所有者のデータか』をサーバで検証。中央のポリシーに寄せるか、各ハンドラで必ず通すかは設計次第だけど、抜けないゲートを一つは置くの。"
        subtitle: "対策の第一。オブジェクトを返す直前に、『この利用者がこのテナント／この所有者のデータか』をサーバで検証。中央のポリシーに寄せるか、各ハンドラで必ず通すかは設計次第だけど、抜けないゲートを一つは置くの。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "開発のとき『とりあえず id で取って表示』しちゃダメなのだ？"
        subtitle: "開発のとき『とりあえず id で取って表示』しちゃダメなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "プロトタイプがそのまま本番になるのが一番危ない。試験の記述でも『認可チェックをデータ取得の直前に置く』が点数の乗りやすい答え方ね。"
        subtitle: "プロトタイプがそのまま本番になるのが一番危ない。試験の記述でも『認可チェックをデータ取得の直前に置く』が点数の乗りやすい答え方ね。"

  # ============================================================
  # 対策② 間接参照
  # ============================================================
  - id: "defense_indirect_map"
    slideIndex: 7
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の第二。外部に出すのは推測されにくい一時トークンや、セッションに紐づいた間接参照——『見せたいもの』と『内部の主キー』の対応表をサーバ側だけが持つ。URL が漏れてもすぐ無効にできるのも利点ね。"
        subtitle: "対策の第二。外部に出すのは推測されにくい一時トークンや、セッションに紐づいた間接参照——『見せたいもの』と『内部の主キー』の対応表をサーバ側だけが持つ。URL が漏れてもすぐ無効にできるのも利点ね。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "第12回のオープンリダイレクトみたいに、トークン付き URL も設計次第なのだ？"
        subtitle: "第12回のオープンリダイレクトみたいに、トークン付き URL も設計次第なのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "関連はあるわ。今回の主役は『誰のデータか』の検証。リダイレクト先の許可リストは別軸。混ぜないで表に二列書きね。"
        subtitle: "関連はあるわ。今回の主役は『誰のデータか』の検証。リダイレクト先の許可リストは別軸。混ぜないで表に二列書きね。"

  # ============================================================
  # UUID の限界
  # ============================================================
  - id: "defense_uuid_limit"
    slideIndex: 8
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "主キーを UUID にしたら IDOR は消えるのだ？"
        subtitle: "主キーを UUID にしたら IDOR は消えるのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "推測は難しくなるけど、『持ち主チェック』が無ければ、メールやログに載った URL をそのまま横流しされたら意味が薄い。UUID は補助であって、本命は認可の実装よ。"
        subtitle: "推測は難しくなるけど、『持ち主チェック』が無ければ、メールやログに載った URL をそのまま横流しされたら意味が薄い。UUID は補助であって、本命は認可の実装よ。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "試験の選択肢で『ランダム化だけで十分』は疑ってかかって。"
        subtitle: "試験の選択肢で『ランダム化だけで十分』は疑ってかかって。"

  # ============================================================
  # ログ・検知
  # ============================================================
  - id: "defense_logging"
    slideIndex: 9
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の第三。監査ログ、失敗と成功の区別、短時間に大量の id を叩く異常——根本は認可だけど、検知とフォレンジックスは長い問題の追加点になりやすいわ。WAF だけに賭けないのは第15回でも触れた通りね。"
        subtitle: "対策の第三。監査ログ、失敗と成功の区別、短時間に大量の id を叩く異常——根本は認可だけど、検知とフォレンジックスは長い問題の追加点になりやすいわ。WAF だけに賭けないのは第15回でも触れた通りね。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "ログだけ増やして終わり、はダメなのだ？"
        subtitle: "ログだけ増やして終わり、はダメなのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "ログはあとからの証拠と改善の材料。止めるのはサーバ側の認可よ。"
        subtitle: "ログはあとからの証拠と改善の材料。止めるのはサーバ側の認可よ。"

  # ============================================================
  # 混同ゼロ
  # ============================================================
  - id: "compare_axes"
    slideIndex: 10
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "第13回のパストラバーサルと、今日の話、どっちも『他人のファイル』っぽいのだ。"
        subtitle: "第13回のパストラバーサルと、今日の話、どっちも『他人のファイル』っぽいのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "第13回はフォルダの道を継ぎ足して OS の読み取り範囲をずらす話。今日は『サーバが用意した id の空間』で持ち主確認が抜けた話。第7回の CSRF は『本人のブラウザを騙して依頼を送る』が主で、今日は番号の直接いじりが主——問題文の動詞で切って。"
        subtitle: "第13回はフォルダの道を継ぎ足して OS の読み取り範囲をずらす話。今日は『サーバが用意した id の空間』で持ち主確認が抜けた話。第7回の CSRF は『本人のブラウザを騙して依頼を送る』が主で、今日は番号の直接いじりが主——問題文の動詞で切って。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "動詞で切るのだ。『継ぎ足し』か『番号いじり』か、メモしたのだ。"
        subtitle: "動詞で切るのだ。『継ぎ足し』か『番号いじり』か、メモしたのだ。"

  # ============================================================
  # 試験のひっかけ
  # ============================================================
  - id: "exam_tips"
    slideIndex: 11
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "試験で怪しい選択肢はどれなのだ？"
        subtitle: "試験で怪しい選択肢はどれなのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "一つ、ログインできてるから大丈夫——認可が抜けてると意味がない。二つ、UUID にすれば完全防御——横流しで突破される。三つ、フロントでボタンを隠せば十分——直接 API を叩かれる。四つ、HTTPS と WAF だけでアクセス制御は完結——設計の本体はアプリ側の検証よ。"
        subtitle: "一つ、ログインできてるから大丈夫——認可が抜けてると意味がない。二つ、UUID にすれば完全防御——横流しで突破される。三つ、フロントでボタンを隠せば十分——直接 API を叩かれる。四つ、HTTPS と WAF だけでアクセス制御は完結——設計の本体はアプリ側の検証よ。"
      - type: dialogue
        character: zundamon
        face: "笑い"
