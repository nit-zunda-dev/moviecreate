    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "まとめ。IDOR は、オブジェクトを指す番号や名前を利用者が変えられるのに、サーバが持ち主や権限を検証しないことで他人のデータが見える欠陥。対策の柱は、返す直前の認可、間接参照や一時トークン、UUID だけに頼らない設計——の三本よ。"
        subtitle: "まとめ。IDOR は、オブジェクトを指す番号や名前を利用者が変えられるのに、サーバが持ち主や権限を検証しないことで他人のデータが見える欠陥。対策の柱は、返す直前の認可、間接参照や一時トークン、UUID だけに頼らない設計——の三本よ。"
