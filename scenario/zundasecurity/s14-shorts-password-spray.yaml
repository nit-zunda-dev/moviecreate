title: "【登録セキスペ】パスワードスプレー攻撃の仕組み"

# 「パスワードスプレー攻撃の解説図解」Shorts 専用
# - generate-shorts --ids password-spray-full で縦長 MP4 を出力

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.3
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.3
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.25
    postPhonemeLength: 0.05
  defaultBackground: "./image/background/background.png"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 3500
  text: "パスワードスプレーは少数の定番PWを多数IDに薄く広く—— アカウントロックを避ける試験頻出なのだ！"
  emphasis:
    - "パスワードスプレー"
    - "薄く広く"
    - "アカウントロック"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.15
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "q4_definition"
    chapter:
      label: "Q4：パスワードスプレー攻撃とは"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Q4——パスワードスプレー攻撃とは何？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "少数のよく使われるPWを、多数のユーザーIDに順番に試す攻撃なのだ！ 1つのIDに大量試行せず、ロックアウトを避けるのが狙いなのだ！"
        emphasis: ["少数のPW", "多数のID"]
        se: "./se/correct_bell.mp3"

  - id: "question_answer"
    chapter:
      label: "確認問題：正解はどれ？"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "確認問題——パスワードスプレーに当てはまるのはどれ？ アからエの四択よ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "正解はウ！ よく使われるPWを複数IDに順番に試す—— 薄く広く試すのがスプレーなのだ！"
        emphasis: ["ウ", "薄く広く"]
        se: "./se/correct_bell.mp3"

  - id: "why_correct"
    chapter:
      label: "理由：なぜウが正解か"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "なぜウが正解？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "本質は1つのPWを多数IDに試すこと—— 1つのIDに多数PWを試すのは辞書攻撃や総当たり、タイミングやIPを変えて検知も避けるのだ！"
        emphasis: ["1つのPW", "多数ID"]
        se: "./se/correct_bell.mp3"

  - id: "wrong_patterns"
    chapter:
      label: "ひっかけ：ア・イ・エがダメな理由"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "ア・イ・エはなぜ不正解？"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "アは辞書攻撃—— 1つのIDに単語リスト、イは総当たり—— 1つのIDに全組合せ、エはクレデンシャルスタッフィング—— 漏えいID/PWペアの使い回しなのだ！"
        emphasis: ["辞書攻撃", "総当たり", "クレデンシャルスタッフィング"]
        se: "./se/correct_bell.mp3"

  - id: "summary_exam"
    chapter:
      label: "まとめ：試験のポイント"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "スプレー＝少数の定番PWを多数アカウントへ—— 辞書・総当たり・スタッフィングとセットで覚えるのだ！"
        emphasis: ["少数の定番PW", "多数アカウント"]
        se: "./se/callout_pop.mp3"

shorts:
  - id: "password-spray-full"
    title: "パスワードスプレー攻撃の仕組み"
    pickScenes:
      - "q4_definition"
      - "question_answer"
      - "why_correct"
      - "wrong_patterns"
      - "summary_exam"
    overlayCaption: "💦 パスワードスプレー"
    cta: "👇 関連動画は概要欄"
