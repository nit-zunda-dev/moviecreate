title: "【登録セキスペ 第15回｜Season2】XMLで秘密が読まれる？　XXEのしくみと安全な読み方なのだ！"

# =============================================================================
# 学習スライドとの対応（詳細図: s01-ep15-xxe-study-slides.html）
# generate-video 用 Reveal: s01-ep15-xxe-reveal-slides.html ← global.slidesHtml
# -----------------------------------------------------------------------------
# スライドの「1/13」など = 下表の「スライド #」。study HTML では data-i="N"。
# 先頭スライドは incident（導入）、2枚目が opening（全体地図）。台本の並びと一致。
# -----------------------------------------------------------------------------
# 台本 id (scenes)       | slideIndex | 内容のあたり
# ----------------------|------------|----------------------------------
# incident               | 0          | 導入：B2B XML 取込と DOCTYPE
# opening                | 1          | 第15回の位置づけ・学習目標
# concept_parser         | 2          | 入力→パーサ→副作用の3段
# doctype_entity         | 3          | ENTITY SYSTEM と URI 解決
# uri_axes               | 4          | file:// と http(s)://／SSRF との関係
# blind_oob              | 5          | ブラインド・OOB の考え方
# surfaces               | 6          | SOAP・SAML・インポート等
# defense_parser         | 7          | 外部実体OFF・DTD禁止
# defense_design         | 8          | JSON化・スキーマ・WAFの位置づけ
# defense_layers         | 9          | 分離・権限・エラー抑制
# compare_axes           | 10         | SQLi・SSRF・パストラ・14回との違い
# exam_tips              | 11         | 試験のひっかけ
# summary                | 12         | まとめ
# 動画生成（generate-video）: global.slidesHtml と slideIndex の対応
# =============================================================================

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/Movidrill.png"
  videoFrame: "./docs/generate_scene_illustrations/hikei.png"
  slidesHtml: "./s01-ep15-xxe-reveal-slides.html"

output:
  fps: 30
  width: 1280
  height: 720

scenes:
  # ============================================================
  # インシデント導入（B2B の XML 取込）
  # ============================================================
  - id: "incident"
    slideIndex: 0
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "たすけてほしいのだ！　取引先連携の『XMLインポート』を試したくて、サンプルの先頭に変な宣言を足したら……ログに変なファイル読み取りっぽい痕跡が！　あれ何なのだ……！"
        subtitle: "たすけてほしいのだ！　取引先連携の『XMLインポート』を試したくて、サンプルの先頭に変な宣言を足したら……ログに変なファイル読み取りっぽい痕跡が！　あれ何なのだ……！"
      - type: dialogue
        character: metan
        face: "困り"
        text: "それ、典型の入り口ね。XMLを読む処理が『外のファイルやインターネットの場所』まで取りにいける設定のままだと、宣言に書いた場所へサーバがアクセスする。秘密ファイルが読まれたり、サーバから内部へ通信したり——対策の教科書では XXE、XML外部実体参照攻撃って呼ばれるわ。"
        subtitle: "それ、典型の入り口ね。XMLを読む処理が『外のファイルやインターネットの場所』まで取りにいける設定のままだと、宣言に書いた場所へサーバがアクセスする。秘密ファイルが読まれたり、サーバから内部へ通信したり——対策の教科書では XXE、XML外部実体参照攻撃って呼ばれるわ。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "第14回はコマンドに変な記号を混ぜた話だったのに、今回はファイルの冒頭の宣言なのだ？"
        subtitle: "第14回はコマンドに変な記号を混ぜた話だったのに、今回はファイルの冒頭の宣言なのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "効く先が違う。第14回は黒い画面でのコマンド実行。今回はXMLを読む処理——『外への参照』まで許したせいで広がる穴。どちらも『見た目より強い処理に、入力がそのまま入った』が共通。試験では『どの部分が動いたか』で切り分けるの。"
        subtitle: "効く先が違う。第14回は黒い画面でのコマンド実行。今回はXMLを読む処理——『外への参照』まで許したせいで広がる穴。どちらも『見た目より強い処理に、入力がそのまま入った』が共通。試験では『どの部分が動いたか』で切り分けるの。"

  # ============================================================
  # オープニング：第15回の位置づけ
  # ============================================================
  - id: "opening"
    slideIndex: 1
    lines:
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "じゃあ第15回の本題なのだ。XMLって設定ファイルくらいのイメージだったのが、攻撃の入口にもなるのだ……。"
        subtitle: "じゃあ第15回の本題なのだ。XMLって設定ファイルくらいのイメージだったのが、攻撃の入口にもなるのだ……。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "今回はXXEの話。ざっくり言うと『XMLを読むだけのつもりが、外のファイルやURLまで取りにいってしまう』問題よ。流れは、壊れ方のイメージ、被害のパターン、よくある勘違い、防ぎ方——この順で整理するわ。"
        subtitle: "今回はXXEの話。ざっくり言うと『XMLを読むだけのつもりが、外のファイルやURLまで取りにいってしまう』問題よ。流れは、壊れ方のイメージ、被害のパターン、よくある勘違い、防ぎ方——この順で整理するわ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "このチャンネルも第15回目だし、まだWebアプリの弱点を順番に見てる途中なのだ？"
        subtitle: "このチャンネルも第15回目だし、まだWebアプリの弱点を順番に見てる途中なのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "その通り。前回までと同じで『入力が、どの処理に効いてるか』がキーワード。覚えどころは『XML読み込みの安全設定』と『外への参照を止める』。試験の記述でもここが出やすいわ。"
        subtitle: "その通り。前回までと同じで『入力が、どの処理に効いてるか』がキーワード。覚えどころは『XML読み込みの安全設定』と『外への参照を止める』。試験の記述でもここが出やすいわ。"

  # ============================================================
  # 仕組み① パーサ三段
  # ============================================================
  - id: "concept_parser"
    slideIndex: 2
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "XMLを読み取る係って、タグを整理するだけじゃないのだ？　なのにファイルを開いたり、勝手に通信したりするのだ？"
        subtitle: "XMLを読み取る係って、タグを整理するだけじゃないのだ？　なのにファイルを開いたり、勝手に通信したりするのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "名前の『中身』を差し込むとき、『このファイル』『このURL』みたいに外を指す書き方が許されていると、読み取り処理がそこまで取りにいく——それが危ない。三段で覚えて：①届いたXML、②読み取り処理が外を見にいく、③秘密が読まれたりサーバから通信したりする。"
        subtitle: "名前の『中身』を差し込むとき、『このファイル』『このURL』みたいに外を指す書き方が許されていると、読み取り処理がそこまで取りにいく——それが危ない。三段で覚えて：①届いたXML、②読み取り処理が外を見にいく、③秘密が読まれたりサーバから通信したりする。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の本命は、読み取り処理で『外への参照』や『型宣言まわり』をそもそも無効にできる設定を選ぶこと。試験では『文字をごまかしただけ』より『危ない機能をオフにする』が正解側になりやすいわ。"
        subtitle: "対策の本命は、読み取り処理で『外への参照』や『型宣言まわり』をそもそも無効にできる設定を選ぶこと。試験では『文字をごまかしただけ』より『危ない機能をオフにする』が正解側になりやすいわ。"

  # ============================================================
  # ENTITY / SYSTEM
  # ============================================================
  - id: "doctype_entity"
    slideIndex: 3
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "ファイルの冒頭の宣言と、名前と中身をひも付けるやつ——試験ではセットで出るのだ？"
        subtitle: "ファイルの冒頭の宣言と、名前と中身をひも付けるやつ——試験ではセットで出るのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "セットで覚えると楽ね。『名前』と『外の場所』をひも付ける書き方が典型。参照された時点で読み取り処理が動く——作者は注文データだけ見てるつもりでも、先に型宣言まわりが処理されて穴が開く。"
        subtitle: "セットで覚えると楽ね。『名前』と『外の場所』をひも付ける書き方が典型。参照された時点で読み取り処理が動く——作者は注文データだけ見てるつもりでも、先に型宣言まわりが処理されて穴が開く。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "記述問題では『危ないタグを消した』だけより『外から型定義を取らない』『読み取りを安全モードにする』の方が点数が乗りやすいパターンね。"
        subtitle: "記述問題では『危ないタグを消した』だけより『外から型定義を取らない』『読み取りを安全モードにする』の方が点数が乗りやすいパターンね。"

  # ============================================================
  # file vs http / SSRF
  # ============================================================
  - id: "uri_axes"
    slideIndex: 4
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "サーバ上の秘密ファイルを読んで、つぎに社内の管理用URLへサーバからアクセスする——みたいな二段構えもあるのだ？"
        subtitle: "サーバ上の秘密ファイルを読んで、つぎに社内の管理用URLへサーバからアクセスする——みたいな二段構えもあるのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ありうる。第11回の『サーバが勝手に通信する攻撃』と似た見え方になることがあるわ。ただ問題文では、きっかけが『XMLを読んだ結果』か、ふつうの通信処理か、を読み分けるの。"
        subtitle: "ありうる。第11回の『サーバが勝手に通信する攻撃』と似た見え方になることがあるわ。ただ問題文では、きっかけが『XMLを読んだ結果』か、ふつうの通信処理か、を読み分けるの。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "『どの部品が動いたか』メモをマージンに書くのだ。"
        subtitle: "『どの部品が動いたか』メモをマージンに書くのだ。"

  # ============================================================
  # ブラインド
  # ============================================================
  - id: "blind_oob"
    slideIndex: 5
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "レスポンスにデータが出ないタイプもあるのだ？"
        subtitle: "レスポンスにデータが出ないタイプもあるのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ある。画面に出なくても、外部への通信や名前解決、処理の遅れで『狙いが当たったか』を見る手もあるわ。でも対策の本質は同じ。『外を見にいく』処理を許さないこと。"
        subtitle: "ある。画面に出なくても、外部への通信や名前解決、処理の遅れで『狙いが当たったか』を見る手もあるわ。でも対策の本質は同じ。『外を見にいく』処理を許さないこと。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "画面に出ないからといって、ログだけ見て様子見、は続きにくい。最初から『外を見にいかない』設定で詰めるの。"
        subtitle: "画面に出ないからといって、ログだけ見て様子見、は続きにくい。最初から『外を見にいかない』設定で詰めるの。"

  # ============================================================
  # 発生箇所
  # ============================================================
  - id: "surfaces"
    slideIndex: 6
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "会社同士のデータ連携、ログインの連携、設定ファイルの取り込み——XMLをそのまま渡すところほどハマりやすい。昔のままの読み取り設定が残ってるケースもね。"
        subtitle: "会社同士のデータ連携、ログインの連携、設定ファイルの取り込み——XMLをそのまま渡すところほどハマりやすい。昔のままの読み取り設定が残ってるケースもね。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "ずんだもん、『取引先フォーマットだから検証サボり』しがちなのだ……反省なのだ……。"
        subtitle: "ずんだもん、『取引先フォーマットだから検証サボり』しがちなのだ……反省なのだ……。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "だから仕様書と、XMLの読み取り設定はセットでレビュー。午後の長い問題も、機械の話と運用の話がいっしょに出るからね。"
        subtitle: "だから仕様書と、XMLの読み取り設定はセットでレビュー。午後の長い問題も、機械の話と運用の話がいっしょに出るからね。"

  # ============================================================
  # 対策① パーサ
  # ============================================================
  - id: "defense_parser"
    slideIndex: 7
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の第一。『外への参照』をオフ、型定義を外から取らない、読み取りを安全側に——言語ごとに名前は違うけど、マニュアルで『安全』『外部』って単語をたどるの。"
        subtitle: "対策の第一。『外への参照』をオフ、型定義を外から取らない、読み取りを安全側に——言語ごとに名前は違うけど、マニュアルで『安全』『外部』って単語をたどるの。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "とりあえず中身のデータ構造に載せれば大丈夫、はウソなのだ？"
        subtitle: "とりあえず中身のデータ構造に載せれば大丈夫、はウソなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ウソになりやすい。読みにいく段階ですでに外へアクセスするから。設定が先。"
        subtitle: "ウソになりやすい。読みにいく段階ですでに外へアクセスするから。設定が先。"

  # ============================================================
  # 対策② 設計
  # ============================================================
  - id: "defense_design"
    slideIndex: 8
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の第二。新規ならJSONなどXMLを使わない形も検討。どうしてもXMLなら形の検証——ただし『名前の中身を広げる』前後でズレないよう、読み取りの安全設定といっしょに説明できると強いわ。"
        subtitle: "対策の第二。新規ならJSONなどXMLを使わない形も検討。どうしてもXMLなら形の検証——ただし『名前の中身を広げる』前後でズレないよう、読み取りの安全設定といっしょに説明できると強いわ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "WAF を置けば XML の穴も全部塞げる、みたいな選択肢が試験に出るのだ？"
        subtitle: "WAF を置けば XML の穴も全部塞げる、みたいな選択肢が試験に出るのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "出やすいわね。境界防御だけに賭けない、が正しい読み方。"
        subtitle: "出やすいわね。境界防御だけに賭けない、が正しい読み方。"

  # ============================================================
  # 対策③ 多層
  # ============================================================
  - id: "defense_layers"
    slideIndex: 9
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の第三。XML読み取りを動かすOSの権限を下げる、読めるフォルダを減らす、クラウドの内部操作みたいなURLへ届かないようネットで区切る——重ね掛けね。"
        subtitle: "対策の第三。XML読み取りを動かすOSの権限を下げる、読めるフォルダを減らす、クラウドの内部操作みたいなURLへ届かないようネットで区切る——重ね掛けね。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "エラーメッセージにファイルの断片が出ないよう、もセットなのだ？"
        subtitle: "エラーメッセージにファイルの断片が出ないよう、もセットなのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "エラーで中身が見えないようにする話もセット。根本は読み取り設定だけど、ここも長い問題だと書けると有利よ。"
        subtitle: "エラーで中身が見えないようにする話もセット。根本は読み取り設定だけど、ここも長い問題だと書けると有利よ。"

  # ============================================================
  # 混同ゼロ
  # ============================================================
  - id: "compare_axes"
    slideIndex: 10
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "第11回の『サーバが勝手に通信』と、今日の話、ラベルがかぶる気がするのだ。"
        subtitle: "第11回の『サーバが勝手に通信』と、今日の話、ラベルがかぶる気がするのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "かぶりうるから問題文で切る。HTTPで内部を叩くなら第11回寄り、きっかけがXMLの読み取りなら今日の話寄り。あわせて、第5回はデータベース、第13回はフォルダの道、第14回はコマンド——『どこが動いたか』の表に一行足して。"
        subtitle: "かぶりうるから問題文で切る。HTTPで内部を叩くなら第11回寄り、きっかけがXMLの読み取りなら今日の話寄り。あわせて、第5回はデータベース、第13回はフォルダの道、第14回はコマンド——『どこが動いたか』の表に一行足して。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "表に一行足したのだ。めたん列車、進むのだ。"
        subtitle: "表に一行足したのだ。めたん列車、進むのだ。"

  # ============================================================
  # 試験のひっかけ
  # ============================================================
  - id: "exam_tips"
    slideIndex: 11
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "試験で怪しい選択肢はどれなのだ？"
        subtitle: "試験で怪しい選択肢はどれなのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "一つ、危険そうなタグを消せば絶対安全——実は型宣言のほうが別問題。二つ、手前の防御機械だけで十分——読み取り本体の設定が本命。三つ、第11回の対策だけで今日の穴も消える——きっかけが違うこともある。"
        subtitle: "一つ、危険そうなタグを消せば絶対安全——実は型宣言のほうが別問題。二つ、手前の防御機械だけで十分——読み取り本体の設定が本命。三つ、第11回の対策だけで今日の穴も消える——きっかけが違うこともある。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "正しい方は、『外を見にいかない』読み取り設定、あたりなのだ。"
        subtitle: "正しい方は、『外を見にいかない』読み取り設定、あたりなのだ。"

  # ============================================================
  # まとめ
  # ============================================================
  - id: "summary"
    slideIndex: 12
    lines:
      - type: dialogue
