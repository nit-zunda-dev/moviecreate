title: "【登録セキスペ 第21回｜Season4】PKIと証明書—公開鍵を誰が保証するのだ！"

# =============================================================================
# Season 4 第1回：PKI（公開鍵基盤）・証明書
# - 詳細図: s01-ep21-pki-study-slides.html ← global.slidesHtml
# - 要約版 Reveal: s01-ep21-pki-reveal-slides.html
# -----------------------------------------------------------------------------
# 台本 id (scenes)              | slideIndex | study スライド
# ------------------------------|------------|------------------
# incident                      | 0          | 導入（証明書エラー）
# opening                       | 1          | 第21回・ゴール
# symmetric_vs_asymmetric       | 2          | 共通鍵と公開鍵
# encrypt_flow                  | 3          | 公開鍵で暗号化
# signature_flow                | 4          | 秘密鍵で署名
# pki_chain                     | 5          | CA と証明書チェーン
# cert_fields                   | 6          | 証明書の項目
# tls_https_meaning             | 7          | HTTPSと🔒の意味
# tls_handshake                 | 8          | TLS握手（証明書→共通鍵）
# exam_traps                    | 9          | 試験の誤答
# summary                       | 10         | まとめ
# =============================================================================

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/background.png"
  slidesHtml: "./s01-ep21-pki-study-slides.html"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12
  endScreen:
    enabled: true
    durationMs: 7000
    subscribeText: "チャンネル登録で次回も見逃さない！"
    nextEpisode:
      title: "次回：ハッシュ関数—改ざんを検知する完全性の仕組み"

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 5000
  text: "社内サイトが証明書エラーで開けないのだ"
  emphasis:
    - "証明書エラー"
    - "開けない"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.18
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "incident"
    slideIndex: 0
    chapter:
      label: "導入：証明書が信頼されない"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "社内ポータルが『接続はプライベートではありません』って出て、上司に怒られたのだ。証明書って何なのだ……！"
        se: "./se/warn_buzz.mp3"
      - type: dialogue
        character: metan
        face: "通常"
        text: "期限切れ、名前不一致、信頼できない発行者——どれも PKI と証明書の話よ。Season4、暗号と認証の世界に入るわ。"
        se: "./se/emphasis_chime.mp3"

  - id: "opening"
    slideIndex: 1
    chapter:
      label: "第21回の地図：PKIで押さえる論点"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "今日のゴールは三つ。公開鍵暗号の役割、電子署名、CA と証明書チェーン。HTTPS で何を確認しているかまで言えること。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "VPN まで来たら、次は『誰の鍵が本物か』なのだ！ Season4 スタートなのだ！"
        se: "./se/callout_pop.mp3"

  - id: "symmetric_vs_asymmetric"
    slideIndex: 2
    chapter:
      label: "鍵の種類：共通鍵と公開鍵"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "暗号化って、みんな同じパスワードを使うのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "それは共通鍵——速いけど鍵の配布が大変。公開鍵暗号はペアで、公開鍵は配って秘密鍵は守る。試験では用途で選ぶの。"
        se: "./se/emphasis_chime.mp3"

  - id: "encrypt_flow"
    slideIndex: 3
    chapter:
      label: "暗号化：公開鍵で包む"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "相手に送るときは、相手の公開鍵で暗号化して、相手の秘密鍵だけが開ける——この向きなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解。秘密鍵で暗号化するのは署名の話。向きを混同すると午後も即死よ。"
        se: "./se/callout_pop.mp3"

  - id: "signature_flow"
    slideIndex: 4
    chapter:
      label: "署名：秘密鍵で書いた証拠"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "電子署名は、データのハッシュを秘密鍵で署名し、受信者が公開鍵で検証する。改ざん検知と非否認の説明が定番。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "暗号化と署名で、鍵の向きが逆なのだ！ 図で覚えるのだ！"
        se: "./se/emphasis_chime.mp3"

  - id: "pki_chain"
    slideIndex: 5
    chapter:
      label: "PKI：信頼の鎖"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "公開鍵をネットに置いたら、偽物を置き換えられるのでは……？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "だから認証局 CA が証明書を発行するの。ルート CA、中間 CA、サーバ証明書——チェーンを端末が検証する。"
        se: "./se/callout_pop.mp3"

  - id: "cert_fields"
    slideIndex: 6
    chapter:
      label: "証明書の中身"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Subject、Issuer、有効期限、公開鍵、失効確認——試験では項目名と意味の対応が出るわ。社内 CA はルートを配らないと警告のまま、も実務あるある。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "ずんだもんのエラー、期限切れだったのだ……！"
        se: "./se/warn_buzz.mp3"

  - id: "tls_https_meaning"
    slideIndex: 7
    chapter:
      label: "HTTPS：🔒は路上を守る話"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "鍵マークが付いたら、もうログイン済みなのだ？ パスワード入れなくていいのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "違うわ。HTTPSはHTTPにTLSという鎧をかぶせたもの。🔒は路上の盗聴や改ざんを防ぐ話で、誰がログインしたかは別の仕組みよ。"
        se: "./se/warn_buzz.mp3"

  - id: "tls_handshake"
    slideIndex: 8
    chapter:
      label: "TLS握手：証明書で確認してから本番通信"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "じゃあTLSは、いつ証明書を見るのだ？ ずっと見てるのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "最初の握手だけよ。サーバ証明書を受け取り、CAチェーンや期限を検証。OKなら共通鍵を決めて、あとはその鍵で高速に通信——ここでPKIが効くの。"
        se: "./se/callout_pop.mp3"

  - id: "exam_traps"
    slideIndex: 9
    chapter:
      label: "試験で狙われる誤答"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "公開鍵で暗号＝署名、証明書＝秘密鍵——ひっかけ、来るのだ！"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "その通り。自己署名を誰でも信頼、HTTPS ＝ 本人確認、も誤り。主語と鍵の向きで選びなさい。"
        se: "./se/callout_pop.mp3"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "鍵の向き・CA・TLS。この3点で選ぶのだ！"
        emphasis: ["鍵の向き", "CA", "TLS"]
        se: "./se/emphasis_chime.mp3"

  - id: "summary"
    slideIndex: 10
    chapter:
      label: "まとめ：PKI は信頼できる公開鍵の配布"
    bgm: "./bgm/outro_warm.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "まとめよ。公開鍵暗号と署名の向き、CA と証明書チェーン、TLS での検証とハイブリッド通信。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "次回はハッシュ関数——改ざん検知の数学的な土台よ。"
        se: "./se/correct_bell.mp3"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "Season4 いいスタートなのだ！ チャンネル登録と高評価、よろしくなのだ！"
        se: "./se/callout_pop.mp3"

shorts:
  - id: "pki-basics"
    title: "PKIって何？30秒で理解"
    pickLines:
      - { sceneId: "opening", from: 0, to: 1 }
      - { sceneId: "pki_chain", from: 0, to: 1 }
    overlayCaption: "⚡ PKI基礎"
    cta: "👇 本編で全体像を確認"

  - id: "pki-traps"
    title: "PKIの誤答3選"
    pickScenes: ["exam_traps", "summary"]
    overlayCaption: "🚨 試験ひっかけ"
    cta: "本編で完全マスター（概要欄）"

youtube:
  imageStyle: "diagram"
  audience:
    - "情報処理安全確保支援士の受験者"
    - "HTTPS・証明書・社内CAを学ぶエンジニア"
  hookKeywords:
    - "PKI"
    - "公開鍵暗号"
    - "証明書"
    - "認証局"
    - "TLS"
  hashtags:
    - "#情報処理安全確保支援士"
    - "#セキスペ"
    - "#PKI"
    - "#証明書"
    - "#ずんだもん"
  relatedEpisodes:
    - { ep: 1, title: "ランサムウェアと公開鍵" }
    - { ep: 20, title: "VPN" }
  titleHints:
    - { style: "shock" }
    - { style: "howto" }
    - { style: "exam" }
