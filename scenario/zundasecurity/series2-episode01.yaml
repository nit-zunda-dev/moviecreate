title: "【第1話】探偵事務所、開業なのだ！〜サイバー詐欺師を追え〜"

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

  tsumugi:
    speakerId: 8
    position: center
    subtitleColor: "#FFDD88"
    voice:
      speedScale: 1.25
      intonationScale: 1.0

  narrator:
    speakerId: 16
    position: center
    subtitleColor: "#FFFFFF"
    voice:
      speedScale: 1.25
      intonationScale: 1.0

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/bg_detective_office_interior.png"

output:
  fps: 30
  width: 1280
  height: 720

scenes:
  # ============================================================
  # 1. 導入：サイバーセキュリティ探偵事務所オープン
  # ============================================================
  - id: "intro-opening"
    background: "./image/background/bg_detective_office_entrance.png"
    lines:
      - type: narration
        character: narrator
        text: "ここは、どこかの雑居ビルの三階。小さな看板に書かれた文字は——「ずんだもんとめたんのサイバーセキュリティ探偵事務所」。"
        subtitle: "ここは、どこかの雑居ビルの三階。小さな看板に書かれた文字は——「ずんだもんとめたんのサイバーセキュリティ探偵事務所」。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "じゃじゃーん！ついに探偵事務所がオープンなのだ！ずんだもんはサイバー探偵なのだ！"
        subtitle: "じゃじゃーん！ついに探偵事務所がオープンなのだ！ずんだもんはサイバー探偵なのだ！"
      - type: dialogue
        character: metan
        face: "困り"
        text: "助手ね。私が所長で、あなたは助手。"
        subtitle: "助手ね。私が所長で、あなたは助手。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "えっ、助手なのだ？！ずんだもんが看板に名前入ってるのに！？"
        subtitle: "えっ、助手なのだ？！ずんだもんが看板に名前入ってるのに！？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "あなたの名前が入ってるのは集客のため。セキュリティの知識は私のほうが圧倒的に上だから、私が所長。"
        subtitle: "あなたの名前が入ってるのは集客のため。セキュリティの知識は私のほうが圧倒的に上だから、私が所長。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "……なんか納得いかないのだ。でもまあいいのだ。今日は何の事件が来るのだ？"
        subtitle: "……なんか納得いかないのだ。でもまあいいのだ。今日は何の事件が来るのだ？"

  - id: "intro-office"
    background: "./image/background/bg_detective_office_interior.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "オープン初日だから、まず何も来ないかもしれないけど——"
        subtitle: "オープン初日だから、まず何も来ないかもしれないけど——"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "来ないのだ……。でもずんだもんはもうやる気満々なのだ。ずんだもち食べながら待つのだ。"
        subtitle: "来ないのだ……。でもずんだもんはもうやる気満々なのだ。ずんだもち食べながら待つのだ。"
      - type: dialogue
        character: metan
        face: "困り"
        text: "事務所でずんだもち食べないで——ああ、もうドアが開いた。お客様ね。"
        subtitle: "事務所でずんだもち食べないで——ああ、もうドアが開いた。お客様ね。"

  # ============================================================
  # 2. 依頼人・春日部つむぎの登場
  # ============================================================
  - id: "client-arrives"
    background: "./image/background/bg_detective_office_interior.png"
    lines:
      - type: narration
        character: narrator
        text: "扉を開けて入ってきたのは、ギャルっぽい雰囲気の女の子——春日部つむぎ。どうやら情報通として知られているらしい。"
        subtitle: "扉を開けて入ってきたのは、ギャルっぽい雰囲気の女の子——春日部つむぎ。どうやら情報通として知られているらしい。"
      - type: dialogue
        character: tsumugi
        face: "通常"
        text: "あの～、ここがサイバーセキュリティ探偵事務所？ネットで見かけて来たんだけど～。"
        subtitle: "あの～、ここがサイバーセキュリティ探偵事務所？ネットで見かけて来たんだけど～。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "そうなのだ！ずんだもん探偵——いや、助手のずんだもんなのだ！何かお困りなのだ？"
        subtitle: "そうなのだ！ずんだもん探偵——いや、助手のずんだもんなのだ！何かお困りなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "所長のめたんです。どうぞ、状況を聞かせてください。"
        subtitle: "所長のめたんです。どうぞ、状況を聞かせてください。"
      - type: dialogue
        character: tsumugi
        face: "困り"
        text: "実はうちのお父さんなんだけど……なんか変なメール来て、IDとパスワード入力しちゃったみたいで。"
        subtitle: "実はうちのお父さんなんだけど……なんか変なメール来て、IDとパスワード入力しちゃったみたいで。"
      - type: dialogue
        character: tsumugi
        face: "困り"
        text: "そのあとネットバンクから知らない引き出しがあって……お父さん、青くなってて。"
        subtitle: "そのあとネットバンクから知らない引き出しがあって……お父さん、青くなってて。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "お金が引き出されたのだ！？それは大変なのだ！！"
        subtitle: "お金が引き出されたのだ！？それは大変なのだ！！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "……フィッシング詐欺ね。メールの内容と、お父さんがアクセスしたサイトのURL、覚えてる？"
        subtitle: "……フィッシング詐欺ね。メールの内容と、お父さんがアクセスしたサイトのURL、覚えてる？"

  - id: "client-details"
    background: "./image/background/bg_detective_office_interior.png"
    lines:
      - type: dialogue
        character: tsumugi
        face: "通常"
        text: "えっと……「あなたの口座に不正アクセスの疑いがあります。今すぐこちらから確認してください」って書いてあって、リンクをタップしたって。"
        subtitle: "えっと……「あなたの口座に不正アクセスの疑いがあります。今すぐこちらから確認してください」って書いてあって、リンクをタップしたって。"
      - type: dialogue
        character: tsumugi
        face: "通常"
        text: "URLは……「h-t-t-p-s-colon-slash-slash-○○bank-secure-login.xyz」みたいな感じだったって。"
        subtitle: "URLは……「https://○○bank-secure-login.xyz」みたいな感じだったって。"
      - type: dialogue
        character: metan
        face: "驚き"
        text: "……完璧なフィッシングの典型例ね。ドメインが「.xyz」で、銀行の公式ドメインじゃない。"
        subtitle: "……完璧なフィッシングの典型例ね。ドメインが「.xyz」で、銀行の公式ドメインじゃない。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "フィッシング……釣り？なんで釣りなのだ？"
        subtitle: "フィッシング……釣り？なんで釣りなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "英語で「phishing」——魚釣りの「fishing」をもじった言葉よ。人を餌で釣る詐欺、という意味ね。"
        subtitle: "英語で「phishing」——魚釣りの「fishing」をもじった言葉よ。人を餌で釣る詐欺、という意味ね。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "なんで「f」じゃなくて「ph」なのだ？"
        subtitle: "なんで「f」じゃなくて「ph」なのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ハッカー文化で「sophisticated（高度な）」の頭文字「ph」を使うのが慣習なの。今は試験でも「フィッシング」と書けばOKよ。"
        subtitle: "ハッカー文化で「sophisticated（高度な）」の頭文字「ph」を使うのが慣習なの。今は試験でも「フィッシング」と書けばOKよ。"

  # ============================================================
  # 3. めたんの推理パート（インシデント分析）
  # ============================================================
  - id: "investigation-start"
    background: "./image/background/bg_detective_whiteboard.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "整理しましょう。まず攻撃の起点を特定する。——つむぎさん、お父さんにそのメール、転送してもらえる？"
        subtitle: "整理しましょう。まず攻撃の起点を特定する。——つむぎさん、お父さんにそのメール、転送してもらえる？"
      - type: dialogue
        character: tsumugi
        face: "通常"
        text: "うん、もう送ってもらった。これ。"
        subtitle: "うん、もう送ってもらった。これ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ヘッダーを確認する……送信元アドレスが「noreply@○○bank-alert.xyz」。公式の「○○bank.co.jp」じゃない。完全に偽装よ。"
        subtitle: "ヘッダーを確認する……送信元アドレスが「noreply@○○bank-alert.xyz」。公式の「○○bank.co.jp」じゃない。完全に偽装よ。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "見た目は銀行っぽいのに、本物じゃないのだ？見分けられないのだ……。"
        subtitle: "見た目は銀行っぽいのに、本物じゃないのだ？見分けられないのだ……。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そこが巧妙なところよ。メール本文のデザインは本物そっくりにコピーできる。だから「見た目」じゃなくて「送信元ドメイン」と「リンク先URL」を必ず確認しなきゃいけない。"
        subtitle: "そこが巧妙なところよ。メール本文のデザインは本物そっくりにコピーできる。だから「見た目」じゃなくて「送信元ドメイン」と「リンク先URL」を必ず確認しなきゃいけない。"

  - id: "investigation-attack-flow"
    background: "./image/background/bg_phishing_diagram.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "次に攻撃の経路を追う。今回の攻撃フローはこうね。"
        subtitle: "次に攻撃の経路を追う。今回の攻撃フローはこうね。"
      - type: narration
        character: narrator
        text: "めたんはホワイトボードに図を描きながら説明した。"
        subtitle: "めたんはホワイトボードに図を描きながら説明した。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ステップ1：攻撃者が偽メールを大量送信。ステップ2：被害者がリンクをクリックして偽サイトへ誘導。ステップ3：偽サイトでIDとパスワードを入力させる。"
        subtitle: "ステップ1：攻撃者が偽メールを大量送信。ステップ2：被害者がリンクをクリックして偽サイトへ誘導。ステップ3：偽サイトでIDとパスワードを入力させる。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ステップ4：攻撃者がそのIDとパスワードで本物のサイトにログインして、口座からお金を引き出す。"
        subtitle: "ステップ4：攻撃者がそのIDとパスワードで本物のサイトにログインして、口座からお金を引き出す。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "全部つながってるのだ……！メール→偽サイト→情報盗取→不正ログインって順番なのだ。"
        subtitle: "全部つながってるのだ……！メール→偽サイト→情報盗取→不正ログインって順番なのだ。"
      - type: dialogue
        character: tsumugi
        face: "困り"
        text: "でもなんでお父さんが狙われたの？ランダムに送ってるの？"
        subtitle: "でもなんでお父さんが狙われたの？ランダムに送ってるの？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "大量フィッシングは基本的に無差別よ。何万件も送って、一人でも引っかかればいい、という手法。これをスピアフィッシングと区別して、単に「フィッシング」と呼ぶわ。"
        subtitle: "大量フィッシングは基本的に無差別よ。何万件も送って、一人でも引っかかればいい、という手法。これをスピアフィッシングと区別して、単に「フィッシング」と呼ぶわ。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "スピアフィッシング！？槍釣りなのだ？"
        subtitle: "スピアフィッシング！？槍釣りなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そう。特定の個人や組織を狙い撃ちにする高度なフィッシング。槍で一匹を狙うイメージね。個人情報を事前に調べて、より信じやすいメールを送ってくる。"
        subtitle: "そう。特定の個人や組織を狙い撃ちにする高度なフィッシング。槍で一匹を狙うイメージね。個人情報を事前に調べて、より信じやすいメールを送ってくる。"

  - id: "investigation-social-engineering"
    background: "./image/background/bg_detective_whiteboard.png"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "でもさ、なんでお父さんは怪しいと思わなかったのだ？「不正アクセスの疑いがあります」って書いてあったらすぐわかりそうなのだ。"
        subtitle: "でもさ、なんでお父さんは怪しいと思わなかったのだ？「不正アクセスの疑いがあります」って書いてあったらすぐわかりそうなのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "それがソーシャルエンジニアリングよ。技術じゃなくて、人間の心理を利用した攻撃。"
        subtitle: "それがソーシャルエンジニアリングよ。技術じゃなくて、人間の心理を利用した攻撃。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "「不正アクセスの疑いがある」と言われると、普通は焦る。焦ると冷静な判断ができなくなる。「今すぐ確認しないと口座が凍結される」という緊迫感を演出して、深く考えさせないようにするの。"
        subtitle: "「不正アクセスの疑いがある」と言われると、普通は焦る。焦ると冷静な判断ができなくなる。「今すぐ確認しないと口座が凍結される」という緊迫感を演出して、深く考えさせないようにするの。"
      - type: dialogue
        character: tsumugi
        face: "困り"
        text: "確かに……お父さんも「やばい！すぐ確認しなきゃ」って慌ててたって言ってた。"
        subtitle: "確かに……お父さんも「やばい！すぐ確認しなきゃ」って慌ててたって言ってた。"
      - type: dialogue
        character: zundamon
        face: "悲しみ"
        text: "焦ると騙されちゃうのだ……ずんだもんも焦ったらずんだもち食べ忘れることあるのだ。"
        subtitle: "焦ると騙されちゃうのだ……ずんだもんも焦ったらずんだもち食べ忘れることあるのだ。"
      - type: dialogue
        character: metan
        face: "困り"
        text: "……それは別の問題として。焦らせる、権威を装う、利益や危機感を煽る——これがソーシャルエンジニアリングの三大パターンよ。"
        subtitle: "……それは別の問題として。焦らせる、権威を装う、利益や危機感を煽る——これがソーシャルエンジニアリングの三大パターンよ。"

  # ============================================================
  # 4. 被害範囲の確定と対策
  # ============================================================
  - id: "damage-assessment"
    background: "./image/background/bg_detective_office_interior.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "次に被害範囲を確定する。つむぎさん、お父さんはその銀行アカウントのパスワード、他のサービスでも使い回してた？"
        subtitle: "次に被害範囲を確定する。つむぎさん、お父さんはその銀行アカウントのパスワード、他のサービスでも使い回してた？"
      - type: dialogue
        character: tsumugi
        face: "困り"
        text: "たぶん……メールとかSNSも同じパスワードだって前に言ってた。"
        subtitle: "たぶん……メールとかSNSも同じパスワードだって前に言ってた。"
      - type: dialogue
        character: metan
        face: "驚き"
        text: "パスワードの使い回し！それは危険。すぐに全サービスのパスワードを変更する必要があるわ。"
        subtitle: "パスワードの使い回し！それは危険。すぐに全サービスのパスワードを変更する必要があるわ。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "パスワード使い回しってそんなに危ないのだ？"
        subtitle: "パスワード使い回しってそんなに危ないのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "攻撃者は盗んだIDとパスワードを、他のサービスでも試してくる。これをパスワードリスト攻撃——または「クレデンシャルスタッフィング」と言うわ。"
        subtitle: "攻撃者は盗んだIDとパスワードを、他のサービスでも試してくる。これをパスワードリスト攻撃——または「クレデンシャルスタッフィング」と言うわ。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "クレデンシャル？なんなのだ？"
        subtitle: "クレデンシャル？なんなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "IDとパスワードのセットのこと。「認証情報」ね。攻撃者は盗んだ認証情報のリストを使って、片っ端から他サービスにログイン試行する。"
        subtitle: "IDとパスワードのセットのこと。「認証情報」ね。攻撃者は盗んだ認証情報のリストを使って、片っ端から他サービスにログイン試行する。"
      - type: dialogue
        character: tsumugi
        face: "困り"
        text: "じゃあ銀行だけじゃなくて、メールもSNSも危ないってこと？"
        subtitle: "じゃあ銀行だけじゃなくて、メールもSNSも危ないってこと？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そう。だから今すぐやるべきことは、パスワードの全変更と、多要素認証の設定よ。"
        subtitle: "そう。だから今すぐやるべきことは、パスワードの全変更と、多要素認証の設定よ。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "多要素認証！？なんなのだ？"
        subtitle: "多要素認証！？なんなのだ？"

  - id: "mfa-explanation"
    background: "./image/background/bg_security_lesson.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "多要素認証——MFAはMulti-Factor Authenticationの略。ログインするとき、パスワードだけでなく複数の証明を組み合わせる仕組みよ。"
        subtitle: "多要素認証——MFAはMulti-Factor Authenticationの略。ログインするとき、パスワードだけでなく複数の証明を組み合わせる仕組みよ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "認証の要素は三種類。「知識情報」——パスワードや秘密の質問。「所持情報」——スマートフォンやICカード。「生体情報」——指紋や顔認証ね。"
        subtitle: "認証の要素は三種類。「知識情報」——パスワードや秘密の質問。「所持情報」——スマートフォンやICカード。「生体情報」——指紋や顔認証ね。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "えっと……パスワードが「知識」で、スマホが「所持」で、指紋が「生体」なのだ？"
        subtitle: "えっと……パスワードが「知識」で、スマホが「所持」で、指紋が「生体」なのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "完璧よ、ずんだもん。この三種類のうち二つ以上を組み合わせるのが多要素認証。"
