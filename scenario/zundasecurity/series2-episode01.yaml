        subtitle: "試験で特に頻出なのが認証の三要素。もう一度整理するわ。知識認証——パスワード、PINコード、秘密の質問。所持認証——ICカード、スマートフォン、トークン。生体認証——指紋、静脈、虹彩、顔認識。"
