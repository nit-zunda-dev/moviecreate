title: "【登録セキスペ 第19回｜Season3】VLANで社内ネットワークを分離—横移動を遅らせる設計なのだ！"

# =============================================================================
# Season 3 第3回：VLAN（Virtual LAN）
# - 詳細図: s01-ep19-vlan-study-slides.html
# - generate-video 用 Reveal: s01-ep19-vlan-reveal-slides.html ← global.slidesHtml
# -----------------------------------------------------------------------------
# 台本 id (scenes)  | slideIndex | Reveal セクション（0始まり）
# -----------------|------------|------------------------------------------
# incident         | 0          | 導入
# opening          | 1          | 第19回・ゴール
# mechanism        | 2          | 仕組み（802.1Q）
# keypoint         | 3          | VLAN間通信（L3）
# limits           | 4          | 限界・運用
# exam_tips        | 5          | 試験の誤答
# summary          | 6          | まとめ
# =============================================================================

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/hook_alert.png"
  slidesHtml: "./s01-ep19-vlan-study-slides.html"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12
  endScreen:
    enabled: true
    durationMs: 7000
    subscribeText: "チャンネル登録で次回も見逃さない！"
    nextEpisode:
      title: "次回：VPN で拠点間を安全に接続する基本"

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 5000
  text: "同じフロアなのに、別部署の端末に勝手に見えちゃう"
  emphasis:
    - "別部署の端末"
    - "見えちゃう"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.18
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "incident"
    slideIndex: 0
    chapter:
      label: "導入：社内ネットワークが平らすぎる問題"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "社内のスイッチにつないだだけなのに、別部署の端末と同じブロードキャストが飛んでくるのだ。これだと1台やられたとき横に広がりやすそうで怖いのだ。"
        se: "./se/warn_buzz.mp3"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そこで VLAN。物理配線を増やさなくても、1台のスイッチを論理的に分割して、部署や用途ごとに別セグメントとして扱えるの。"
        se: "./se/emphasis_chime.mp3"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "なるほど、同じ箱でもネットワークの島を分けるイメージなのだ。"

  - id: "opening"
    slideIndex: 1
    chapter:
      label: "第19回の地図：VLANで押さえる論点"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "今日のゴールは三つ。VLANの目的、アクセスポートとトランクポートの違い、そしてVLAN間通信にはL3ルーティングが必要だと説明できること。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "前回のWAFが入口防御なら、今回は社内の区画整理なのだ！"
        se: "./se/callout_pop.mp3"

  - id: "mechanism"
    slideIndex: 2
    chapter:
      label: "仕組み：802.1Qタグで運ぶ"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "アクセスポートとトランクポート、ここが毎回こんがらがるのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "端末向けは基本アクセスポートで1つのVLANに所属。スイッチ間はトランクで複数VLANを流して、802.1QタグでどのVLANのフレームか識別するのが定番よ。"
        se: "./se/emphasis_chime.mp3"

  - id: "keypoint"
    slideIndex: 3
    chapter:
      label: "要点：VLAN間通信はL3で中継"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "VLAN 10とVLAN 20って、同じスイッチ上でもそのまま話せないのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "話せない。別ネットワークだから、ルータやL3スイッチで中継して初めて到達できるわ。そこでACLを使って必要最小限だけ許可するのがポイント。"
        se: "./se/callout_pop.mp3"

  - id: "limits"
    slideIndex: 4
    chapter:
      label: "限界：設定ミスで分離は崩れる"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "VLANを入れたらもう安心、って思っていいのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そこが落とし穴。誤ったVLAN収容、不要トランク、許可VLANの広げすぎで、簡単に分離が崩れるの。だから構成管理と棚卸しが必須なのよ。"
        se: "./se/warn_buzz.mp3"

  - id: "exam_tips"
    slideIndex: 5
    chapter:
      label: "試験で狙われる誤答パターン"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "ひっかけ選択肢、来るのだ！"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "VLANは暗号化だから盗聴対策になる、は誤り。VLAN間通信はL2だけで可能、も誤り。トランクは全部通してよい、も誤り。最小権限の設計で読むのが正解よ。"
        se: "./se/callout_pop.mp3"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "暗号化じゃなく分離、L3で制御、運用で維持。この3点を覚えるのだ！"
        emphasis: ["暗号化じゃなく分離", "L3で制御", "運用で維持"]
        se: "./se/emphasis_chime.mp3"

  - id: "summary"
    slideIndex: 6
    chapter:
      label: "まとめ：VLANは内部ネットワーク分離の基礎"
    bgm: "./bgm/outro_warm.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "まとめよ。VLANはL2の論理分割で、横移動と障害影響を抑える土台。アクセスポート、トランク、802.1Q、そしてVLAN間はL3で制御。この流れで説明できれば強いわ。"
        se: "./se/correct_bell.mp3"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "次回もネットワーク防御を積み上げるのだ！ チャンネル登録と高評価、よろしくなのだ！"
        se: "./se/callout_pop.mp3"

shorts:
  - id: "vlan-basics"
    title: "VLANって何？30秒で理解"
    pickScenes: ["opening", "mechanism"]
    overlayCaption: "⚡ VLAN基礎"
    cta: "👇 本編で全体像を確認"

  - id: "vlan-traps"
    title: "VLANの誤答3選"
    pickScenes: ["exam_tips", "summary"]
    overlayCaption: "🚨 試験ひっかけ"
    cta: "本編で完全マスター（概要欄）"

youtube:
  imageStyle: "diagram"
  audience:
    - "情報処理安全確保支援士の受験者"
    - "ネットワーク設計を学ぶ新人エンジニア"
  hookKeywords:
    - "VLAN"
    - "802.1Q"
    - "トランクポート"
    - "アクセスポート"
    - "L3スイッチ"
  hashtags:
    - "#情報処理安全確保支援士"
    - "#セキスペ"
    - "#VLAN"
    - "#ネットワーク"
    - "#ずんだもん"
  relatedEpisodes:
    - { ep: 18, title: "WAFの正体" }
    - { ep: 20, title: "VPN（次回）" }
  titleHints:
    - { style: "shock" }
    - { style: "howto" }
    - { style: "exam" }
