title: "【登録セキスペ 第14回｜Season2】OSコマンドインジェクションを攻略——シェル連結の欠陥と安全な起動の試験ポイントなのだ！"

# =============================================================================
# 学習スライドとの対応（詳細図: s01-ep14-command-injection-study-slides.html）
# generate-video 用 Reveal: s01-ep14-command-injection-reveal-slides.html ← global.slidesHtml
