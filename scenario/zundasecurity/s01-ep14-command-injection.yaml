scenes:
  # ============================================================
  # インシデント導入（社内ツールの「接続診断」）
  # ============================================================
  - id: "incident"
    slideIndex: 0
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "たすけてほしいのだ！　社内のお守りアプリに『接続診断』があって、ホスト名を入れたら ping してくれるって聞いて試したのだ。　そしたら入力欄にセミコロンを足したら……ログに変なコマンドが動いた形跡が残ってるのだ……！"
        subtitle: "たすけてほしいのだ！　社内のお守りアプリに『接続診断』があって、ホスト名を入れたら ping してくれるって聞いて試したのだ。　そしたら入力欄にセミコロンを足したら……ログに変なコマンドが動いた形跡が残ってるのだ……！"
      - type: dialogue
        character: metan
        face: "困り"
        text: "それ、典型例ね。アプリが『ping と入力をくっつけて、シェルに一行で渡す』みたいに作られていると、セミコロンは『次の命令』の区切りとして解釈される。ユーザー入力が、想定よりずっと広い『OSへの命令』になってしまう——OSコマンドインジェクション、コマンド注入と呼ぶわ。"
        subtitle: "それ、典型例ね。アプリが『ping と入力をくっつけて、シェルに一行で渡す』みたいに作られていると、セミコロンは『次の命令』の区切りとして解釈される。ユーザー入力が、想定よりずっと広い『OSへの命令』になってしまう——OSコマンドインジェクション、コマンド注入と呼ぶわ。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "第13回は、フォルダの外のファイルを読んじゃう話だったのに、今回は『読む』じゃなくて『動かす』なのだ？"
        subtitle: "第13回は、フォルダの外のファイルを読んじゃう話だったのに、今回は『読む』じゃなくて『動かす』なのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "その理解でいい。第13回はサーバがファイルを開くパスの話。今回はシェル経由でプロセスが増える話。どちらも『ユーザー入力をそのまま連結した』が共通の入り口だけど、壊れ方が違う。試験ではこの違いを動詞で切れると強いわ。"
        subtitle: "その理解でいい。第13回はサーバがファイルを開くパスの話。今回はシェル経由でプロセスが増える話。どちらも『ユーザー入力をそのまま連結した』が共通の入り口だけど、壊れ方が違う。試験ではこの違いを動詞で切れると強いわ。"

  # ============================================================
  # オープニング：第14回の位置づけ
  # ============================================================
  - id: "opening"
    slideIndex: 1
    lines:
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "じゃあ第14回の本題なのだ。シェルって単語、難しそうだけど、今日で腹落ちさせるのだ。"
        subtitle: "じゃあ第14回の本題なのだ。シェルって単語、難しそうだけど、今日で腹落ちさせるのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "今回はOSコマンドインジェクション。初心者向けに言うと、『コマンドを文字で組み立てる係』がいるOSでは、その一行に悪意の文字を混ぜると、作者の意図より大きな動きが起きる、という話よ。"
        subtitle: "今回はOSコマンドインジェクション。初心者向けに言うと、『コマンドを文字で組み立てる係』がいるOSでは、その一行に悪意の文字を混ぜると、作者の意図より大きな動きが起きる、という話よ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "企画書だと全27回のなかの第14回で、Webアプリの闇編の延長って感じなのだ？"
        subtitle: "企画書だと全27回のなかの第14回で、Webアプリの闇編の延長って感じなのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "このチャンネルでは Season2 としてWebの弱点を積み上げてきたでしょ。今日も『入力がどのエンジンに効くか』がキーワード。スライドの流れ図は長いけど、シェル三段、連結、メタ文字、対策の三本柱、で頭を整理して。"
        subtitle: "このチャンネルでは Season2 としてWebの弱点を積み上げてきたでしょ。今日も『入力がどのエンジンに効くか』がキーワード。スライドの流れ図は長いけど、シェル三段、連結、メタ文字、対策の三本柱、で頭を整理して。"

  # ============================================================
  # 仕組み① 3段階
  # ============================================================
  - id: "concept_shell"
    slideIndex: 2
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "シェルって、黒い画面のあれなのだ？　アプリとOSの真ん中？"
        subtitle: "シェルって、黒い画面のあれなのだ？　アプリとOSの真ん中？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "イメージでいい。Webアプリが『一行の文字列』を渡す先に、シェルがいて、パイプやセミコロン、コマンド置換みたいなルールで文を解釈する。その結果としてOSがプロセスを起こす——三段で覚えて。"
        subtitle: "イメージでいい。Webアプリが『一行の文字列』を渡す先に、シェルがいて、パイプやセミコロン、コマンド置換みたいなルールで文を解釈する。その結果としてOSがプロセスを起こす——三段で覚えて。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "だから対策の本命は、そもそも②のシェルを通さず、プログラムから安全なAPIで『コマンド名』と『引数』を分けて渡すこと。試験の記述でも『シェルを使わない』が強い正解側になりやすいわ。"
        subtitle: "だから対策の本命は、そもそも②のシェルを通さず、プログラムから安全なAPIで『コマンド名』と『引数』を分けて渡すこと。試験の記述でも『シェルを使わない』が強い正解側になりやすいわ。"

  # ============================================================
  # 連結の欠陥
  # ============================================================
  - id: "concat_problem"
    slideIndex: 3
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "作者は『ping のあとにホスト名が付くだけ』って思ってるのに、攻撃者は『一行全体』に文法があるってことなのだ？"
        subtitle: "作者は『ping のあとにホスト名が付くだけ』って思ってるのに、攻撃者は『一行全体』に文法があるってことなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "その通り。文字列連結で作った一行は、作者の頭の中の『引数』ではなく、シェルが読む『文』になりうる。クォートのはみ出し型もよく出る。だから『エスケープを足す』より『起動の仕方を変える』が試験では高得点ラインになりやすいわ。"
        subtitle: "その通り。文字列連結で作った一行は、作者の頭の中の『引数』ではなく、シェルが読む『文』になりうる。クォートのはみ出し型もよく出る。だから『エスケープを足す』より『起動の仕方を変える』が試験では高得点ラインになりやすいわ。"

  # ============================================================
  # メタ文字
  # ============================================================
  - id: "metacharacters"
    slideIndex: 4
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "セミコロン以外にも、パイプとか、なんか記号がいっぱいあるのだ？"
        subtitle: "セミコロン以外にも、パイプとか、なんか記号がいっぱいあるのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "環境によって違うけれど、区切り・パイプ・リダイレクト・コマンド置換——『一行の中に複数の文を書ける』ための記号が危ない。全部暗記しなくていい。本質は『シェルに一行を渡す設計をやめる』よ。"
        subtitle: "環境によって違うけれど、区切り・パイプ・リダイレクト・コマンド置換——『一行の中に複数の文を書ける』ための記号が危ない。全部暗記しなくていい。本質は『シェルに一行を渡す設計をやめる』よ。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "特定の記号だけ禁止、は抜け道の話が試験に載りがち。禁止リストより、正規化とホワイトリスト、そしてシェル非使用、の順で覚えて。"
        subtitle: "特定の記号だけ禁止、は抜け道の話が試験に載りがち。禁止リストより、正規化とホワイトリスト、そしてシェル非使用、の順で覚えて。"

  # ============================================================
  # ブラインド
  # ============================================================
  - id: "blind_output"
    slideIndex: 5
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "画面に結果が出ないタイプでも、攻撃は成立するのだ？"
        subtitle: "画面に結果が出ないタイプでも、攻撃は成立するのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "成立しうる。外向き通信や遅延、DNS みたいな副作用で『動いたか』を推測する、ブラインドって呼ばれる世界もある。ただし対策の本質は同じ。シェル経由の任意実行を許さないこと。"
        subtitle: "成立しうる。外向き通信や遅延、DNS みたいな副作用で『動いたか』を推測する、ブラインドって呼ばれる世界もある。ただし対策の本質は同じ。シェル経由の任意実行を許さないこと。"

  # ============================================================
  # 発生箇所
  # ============================================================
  - id: "surfaces"
    slideIndex: 6
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "現場では、ping や nslookup、画像変換のCLI、ウイルススキャナ呼び出し、メンテ用のバッチ——『外部コマンドを便利に使う』ほどハマりやすい。管理画面に露出してたり、HTTPのパラメータがそのまま引数に直結してたり。"
        subtitle: "現場では、ping や nslookup、画像変換のCLI、ウイルススキャナ呼び出し、メンテ用のバッチ——『外部コマンドを便利に使う』ほどハマりやすい。管理画面に露出してたり、HTTPのパラメータがそのまま引数に直結してたり。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "ずんだもん、『便利機能』に手を出しがちなのだ……反省なのだ……。"
        subtitle: "ずんだもん、『便利機能』に手を出しがちなのだ……反省なのだ……。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "だから設計段階で『本当にインターネット向けに診断コマンドを生やすか』から疑うの。試験でも、技術と運用の両方がセットで出るわ。"
        subtitle: "だから設計段階で『本当にインターネット向けに診断コマンドを生やすか』から疑うの。試験でも、技術と運用の両方がセットで出るわ。"

  # ============================================================
  # 対策① シェル非使用
  # ============================================================
  - id: "defense_no_shell"
    slideIndex: 7
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の第一。シェルを起動せず、exec 系のAPIで ping のパスは固定、ホスト名は第二引数みたいに配列で渡す。同じ ping でも、呼び方で安全性が変わる——これが試験の定番ね。"
        subtitle: "対策の第一。シェルを起動せず、exec 系のAPIで ping のパスは固定、ホスト名は第二引数みたいに配列で渡す。同じ ping でも、呼び方で安全性が変わる——これが試験の定番ね。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "『文字列を一本渡す関数』は、名前が優しそうでも危ない可能性があるのだ？"
        subtitle: "『文字列を一本渡す関数』は、名前が優しそうでも危ない可能性があるのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "言語ごとに違うからドキュメントを見て。ポイントは『シェルが介在するか』。介在するなら、今日の話の射程圏内よ。"
        subtitle: "言語ごとに違うからドキュメントを見て。ポイントは『シェルが介在するか』。介在するなら、今日の話の射程圏内よ。"

  # ============================================================
  # 対策② 設計・権限
  # ============================================================
  - id: "defense_design"
    slideIndex: 8
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の第二。そもそも任意ホストへの ping を公開しない、社内VPNや管理ロールに閉じる、コンテナや低権限ユーザーで実行する——短絡的なWAF万能や禁止文字だけ、より『機能を減らす・権限を減らす』が並ぶわ。"
        subtitle: "対策の第二。そもそも任意ホストへの ping を公開しない、社内VPNや管理ロールに閉じる、コンテナや低権限ユーザーで実行する——短絡的なWAF万能や禁止文字だけ、より『機能を減らす・権限を減らす』が並ぶわ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "セキュリティって、コードだけじゃなくて『誰が使っていいか』もセットなのだ。"
        subtitle: "セキュリティって、コードだけじゃなくて『誰が使っていいか』もセットなのだ。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "その通り。午後試験の長文でも、技術対策と組織・運用が同じテーブルに並ぶから、両方読めるようにして。"
        subtitle: "その通り。午後試験の長文でも、技術対策と組織・運用が同じテーブルに並ぶから、両方読めるようにして。"

  # ============================================================
  # 対策③ ホワイトリスト
  # ============================================================
  - id: "defense_whitelist"
    slideIndex: 9
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "どうしても入力を受け取るなら、『危険な記号リスト』を作るのだ？"
        subtitle: "どうしても入力を受け取るなら、『危険な記号リスト』を作るのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "試験では『許可する形だけ通す』ホワイトリストの方が強い、と覚えて。例えばホスト名なら文法チェックに加えて、解決先が社内の許可リストか、など。ただし最後の砦はやっぱりシェル非使用よ。"
        subtitle: "試験では『許可する形だけ通す』ホワイトリストの方が強い、と覚えて。例えばホスト名なら文法チェックに加えて、解決先が社内の許可リストか、など。ただし最後の砦はやっぱりシェル非使用よ。"

  # ============================================================
  # 混同ゼロ
  # ============================================================
  - id: "compare_axes"
    slideIndex: 10
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "第5回のSQLインジェクションと、何が違うのだ？　どっちも『文字を足した』じゃないのだ？"
        subtitle: "第5回のSQLインジェクションと、何が違うのだ？　どっちも『文字を足した』じゃないのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "効く先が違う。SQLi はデータベースの解釈。今日はシェルとOSの実行。第11回のSSRF はサーバがHTTPで取りに行く話。第13回はファイルを開くパス。悪い文字列が『どの機械に効くか』で並べ替えるの。"
        subtitle: "効く先が違う。SQLi はデータベースの解釈。今日はシェルとOSの実行。第11回のSSRF はサーバがHTTPで取りに行く話。第13回はファイルを開くパス。悪い文字列が『どの機械に効くか』で並べ替えるの。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "『どのエンジンか』ラベルを貼れば、長文も迷子にならないのだ。"
        subtitle: "『どのエンジンか』ラベルを貼れば、長文も迷子にならないのだ。"

  # ============================================================
  # 試験のひっかけ
  # ============================================================
  - id: "exam_tips"
    slideIndex: 11
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "試験で、どの選択肢が怪しいのだ？"
        subtitle: "試験で、どの選択肢が怪しいのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "一つ、エスケープさえすれば絶対安全——は短絡的になりやすい。二つ、WAFがあればコマンド注入も全部防げる——はレイヤが違う。三つ、第13回の対策をそのまま当てはめる——読取と実行は別、よ。"
        subtitle: "一つ、エスケープさえすれば絶対安全——は短絡的になりやすい。二つ、WAFがあればコマンド注入も全部防げる——はレイヤが違う。三つ、第13回の対策をそのまま当てはめる——読取と実行は別、よ。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "正しい方は、シェルを使わない起動、と権限を減らす、あたりなのだ。"
        subtitle: "正しい方は、シェルを使わない起動、と権限を減らす、あたりなのだ。"

  # ============================================================
  # まとめ
  # ============================================================
  - id: "summary"
    slideIndex: 12
    lines:
      - type: dialogue
        character: metan
