title: "【登録セキスペ 第3回｜Season1】標的型攻撃の入り口——フィッシングと水飲み場攻撃の試験ポイントなのだ！"

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/Movidrill.png"

output:
  fps: 30
  width: 1280
  height: 720

scenes:
  # ============================================================
  # オープニング：インシデント導入（人を騙される）
  # ============================================================
  - id: "incident"
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "あれ？人事からメールが来たのだ。『至急、アカウント更新をしてください』って書いてあるのだ！"
        subtitle: "あれ？人事からメールが来たのだ。『至急、アカウント更新をしてください』って書いてあるのだ！"

      - type: dialogue
        character: metan
        face: "困り"
        text: "それ、標的型攻撃の入り口っぽいわね。文面が“それっぽい”ほど危ないのよ。"
        subtitle: "それ、標的型攻撃の入り口っぽいわね。文面が“それっぽい”ほど危ないのよ。"

      - type: dialogue
        character: zundamon
        face: "困り"
        text: "だって、部署名も自分の名前も入ってたのだ……！会社から来た気がしてしまうのだ……。"
        subtitle: "だって、部署名も自分の名前も入ってたのだ……！会社から来た気がしてしまうのだ……。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "いいの、ポイントは“気がする”じゃなくて、攻撃の狙いを識別すること。今日はフィッシングと水飲み場攻撃を叩き込むわ。"
        subtitle: "いいの、ポイントは“気がする”じゃなくて、攻撃の狙いを識別すること。今日はフィッシングと水飲み場攻撃を叩き込むわ。"


  # ============================================================
  # オープニング：シリーズ紹介
  # ============================================================
  - id: "opening"
    lines:
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "みんな、こんにちはなのだ！ずんだもんなのだ！"
        subtitle: "みんな、こんにちはなのだ！ずんだもんなのだ！"

      - type: dialogue
        character: metan
        face: "通常"
        text: "四国めたんよ。第3回は「標的型攻撃の入り口」。フィッシングと水飲み場攻撃を扱うわ。"
        subtitle: "四国めたんよ。第3回は「標的型攻撃の入り口」。フィッシングと水飲み場攻撃を扱うわ。"

      - type: dialogue
        character: zundamon
        face: "通常"
        text: "第1回でマルウェア、第2回でDDoSだったのに、今回は“人”を狙うのだ？！"
        subtitle: "第1回でマルウェア、第2回でDDoSだったのに、今回は“人”を狙うのだ？！"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "そう。セキスペは“攻撃手段”だけじゃなくて“狙いと流れ”が問われやすいの。用語の定義を正確にね。"
        subtitle: "そう。セキスペは“攻撃手段”だけじゃなくて“狙いと流れ”が問われやすいの。用語の定義を正確にね。"


  # ============================================================
  # 標的型攻撃とは何か
  # ============================================================
  - id: "what_is_targeted_attack"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "標的型攻撃って、DDoSみたいに“いろんな人をまとめて”なのじゃないの？"
        subtitle: "標的型攻撃って、DDoSみたいに“いろんな人をまとめて”なのじゃないの？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "違うわ。標的型攻撃は「特定の個人や組織」を狙うの。だから準備や下調べが入る。"
        subtitle: "違うわ。標的型攻撃は「特定の個人や組織」を狙うの。だから準備や下調べが入る。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "入口としてよく使われるのが、ソーシャルエンジニアリングを伴うフィッシングや、水飲み場攻撃。"
        subtitle: "入口としてよく使われるのが、ソーシャルエンジニアリングを伴うフィッシングや、水飲み場攻撃。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "“入口”ってことは、その後に侵入や情報窃取が続くのだよね？"
        subtitle: "“入口”ってことは、その後に侵入や情報窃取が続くのだよね？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "そう。セキスペ的には「入口（入手）→ 実行 → 被害」が文章で問われることが多いわ。"
        subtitle: "そう。セキスペ的には「入口（入手）→ 実行 → 被害」が文章で問われることが多いわ。"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "今日は特に、“メールっぽい話”と“サイトっぽい話”の違いを整理して覚えるのがコツよ。"
        subtitle: "今日は特に、“メールっぽい話”と“サイトっぽい話”の違いを整理して覚えるのがコツよ。"


  # ============================================================
  # フィッシング：定義と狙い
  # ============================================================
  - id: "phishing_overview"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "フィッシングって“偽のログイン画面”を見せるやつなのは分かるのだ。けど、試験ではどこを見るの？"
        subtitle: "フィッシングって“偽のログイン画面”を見せるやつなのは分かるのだ。けど、試験ではどこを見るの？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "見るのは「入力させて、情報を盗む目的」。たとえばIDやパスワード、ワンタイムコードなどね。"
        subtitle: "見るのは「入力させて、情報を盗む目的」。たとえばIDやパスワード、ワンタイムコードなどね。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "フィッシングはメールやチャットで“自分は正規”と思わせて誘導する。リンクや添付がセットになりやすいの。"
        subtitle: "フィッシングはメールやチャットで“自分は正規”と思わせて誘導する。リンクや添付がセットになりやすいの。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "“リンクを押したら終わり”なのだ？！　添付もあるとさらにヤバいのだ……。"
        subtitle: "“リンクを押したら終わり”なの？！　添付もあるとさらにヤバいのだ……。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "試験では「なぜ危険か」が問われるから、添付＝マルウェア、リンク＝偽画面や誘導、と役割で整理して。"
        subtitle: "試験では「なぜ危険か」が問われるから、添付＝マルウェア、リンク＝偽画面や誘導、と役割で整理して。"


  # ============================================================
  # フィッシング：ありがちな手口（なりすまし）
  # ============================================================
  - id: "phishing_techniques"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "でもメールの差出人や文章が“それっぽい”と判断が難しいのだ。どう見分けるの？"
        subtitle: "でもメールの差出人や文章が“それっぽい”と判断が難しいのだ。どう見分けるの？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "まずは“なりすまし”。差出人名だけ正しく見えても、実際の送信元ドメインや経路が怪しいことがある。"
        subtitle: "まずは“なりすまし”。差出人名だけ正しく見えても、実際の送信元ドメインや経路が怪しいことがある。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "次に“リンク”。URLがほんの少し違ったり、表示文字だけそれっぽくて実URLが別だったりする。"
        subtitle: "次に“リンク”。URLがほんの少し違ったり、表示文字だけそれっぽくて実URLが別だったりする。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "表示と実体が違うのだ？！それ、見抜けない人が出るのが怖いのだ……。"
        subtitle: "表示と実体が違うの？！それ、見抜けない人が出るのが怖いのだ……。"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "だからこそ“定義”が大事。フィッシングは「人に入力させて情報を奪う」が芯よ。"
        subtitle: "だからこそ“定義”が大事。フィッシングは「人に入力させて情報を奪う」が芯よ。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "もう一つ、標的が企業だと“スピアフィッシング”になる。部署や役職に合わせて文章を個別化するわ。"
        subtitle: "もう一つ、標的が企業だと“スピアフィッシング”になる。部署や役職に合わせて文章を個別化するわ。"

      - type: dialogue
        character: zundamon
        face: "通常"
        text: "さっきのメール、まさに個別化っぽかったのだ。じゃあ“スピア”って言葉が出たら警戒なのだ！"
        subtitle: "さっきのメール、まさに個別化っぽかったのだ。じゃあ“スピア”って言葉が出たら警戒なのだ！"


  # ============================================================
  # 水飲み場攻撃：サイトを“餌場”にする
  # ============================================================
  - id: "watering_hole"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "水飲み場攻撃って、ただの怪しいサイトに行かせる話なの？"
        subtitle: "水飲み場攻撃って、ただの怪しいサイトに行かせる話なの？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "ポイントは“ターゲットが普段訪れる場所”を餌場にすること。特定の人がアクセスしそうなサイトを狙うの。"
        subtitle: "ポイントは“ターゲットが普段訪れる場所”を餌場にすること。特定の人がアクセスしそうなサイトを狙うの。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "攻撃側は、サイトの運営者側の弱さや改ざん可能性を利用して、訪問者に不正な誘導やスクリプトを返す。"
        subtitle: "攻撃側は、サイトの運営者側の弱さや改ざん可能性を利用して、訪問者に不正な誘導やスクリプトを返す。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "“公式っぽいサイト”から来るなら、メールより気づきにくいのだ……！"
        subtitle: "“公式っぽいサイト”から来るなら、メールより気づきにくいのだ……！"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "その通り。試験では“誰を狙っているか”と“入口が何か（メールか、サイトか）”を一致させる問題が出やすい。"
        subtitle: "その通り。試験では“誰を狙っているか”と“入口が何か（メールか、サイトか）”を一致させる問題が出やすい。"

      - type: dialogue
        character: zundamon
        face: "困り"
        text: "つまり、同じ“誘導”でも、フィッシングはメールや偽画面中心で、水飲み場は“訪問”が入口なのだね。"
        subtitle: "つまり、同じ“誘導”でも、フィッシングはメールや偽画面中心で、水飲み場は“訪問”が入口なのだね。"


  # ============================================================
  # 例：BEC（CEO詐欺）も標的型の入口になる
  # ============================================================
  - id: "example_bec"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "標的型って、結局メールで騙す話が中心なの？他にもあるのだ？"
        subtitle: "標的型って、結局メールで騙す話が中心なの？他にもあるのだ？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "あるわ。典型がBEC、いわゆるCEO詐欺ね。上司や取引先を装って“振込や承認”を狙う。"
        subtitle: "あるわ。典型がBEC、いわゆるCEO詐欺ね。上司や取引先を装って“振込や承認”を狙う。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "上司が言ってるなら…って思わせるのが強いのだ！"
        subtitle: "上司が言ってるなら…って思わせるのが強いのだ！"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "だから“業務フロー”を狙うのよ。試験では、技術というより「意思決定・承認の弱点」が問われやすい。"
        subtitle: "だから“業務フロー”を狙うのよ。試験では、技術というより「意思決定・承認の弱点」が問われやすい。"

      - type: dialogue
        character: zundamon
        face: "困り"
        text: "それって、技術対策だけじゃなくて運用のルールも必要なのだよね？"
        subtitle: "それって、技術対策だけじゃなくて運用のルールも必要なのだよね？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "そう。たとえば“緊急の振込指示”は、別経路で確認するとかね。次の対策でまとめるわ。"
        subtitle: "そう。たとえば“緊急の振込指示”は、別経路で確認するとかね。次の対策でまとめるわ。"


  # ============================================================
  # 対策：入口で止める多層防御
  # ============================================================
  - id: "countermeasures"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策は、入口で止めるのが基本。技術と運用と教育の三つを組み合わせるのよ。"
        subtitle: "対策は、入口で止めるのが基本。技術と運用と教育の三つを組み合わせるのよ。"

      - type: dialogue
        character: zundamon
        face: "困り"
        text: "技術対策って具体的に何をやるのだ？"
        subtitle: "技術対策って具体的に何をやるのだ？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "代表はメールゲートウェイでの検知・隔離、添付ファイルのサンドボックス実行、URLの安全性チェック。"
        subtitle: "代表はメールゲートウェイでの検知・隔離、添付ファイルのサンドボックス実行、URLの安全性チェック。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "あと電子メール認証の仕組み、SPF・DKIM・DMARCも重要。送信元のなりすましを減らせるわ。"
        subtitle: "あと電子メール認証の仕組み、SPF・DKIM・DMARCも重要。送信元のなりすましを減らせるわ。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "SPFとかDKIMとか、試験で見る単語まで出てくるのだ？！全部“入口”に効くのだね。"
        subtitle: "SPFとかDKIMとか、試験で見る単語まで出てくるのだ？！全部“入口”に効くのね。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "教育は“リンクを押す前に立ち止まる”とか、緊急性の罠に乗らない判断を体に入れること。"
        subtitle: "教育は“リンクを押す前に立ち止まる”とか、緊急性の罠に乗らない判断を体に入れること。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "運用では、MFA（多要素認証）や最小権限、特権操作の承認フローを整えるのが効くの。"
        subtitle: "運用では、MFA（多要素認証）や最小権限、特権操作の承認フローを整えるのが効くの。"

      - type: dialogue
        character: zundamon
        face: "通常"
        text: "“MFAがあれば安心”じゃなくて、状況に応じて“取り返しのつかない操作を減らす”感じなのだね。"
        subtitle: "“MFAがあれば安心”じゃなくて、状況に応じて“取り返しのつかない操作を減らす”感じなのだね。"


  # ============================================================
  # 試験あるある：定義の取り違えに注意
  # ============================================================
  - id: "exam_tips"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "試験のひっかけポイントをまとめてほしいのだ！"
        subtitle: "試験のひっかけポイントをまとめてほしいのだ！"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "定番その1——フィッシングと水飲み場攻撃を混ぜないこと。入口が“メール”か“訪問”かが軸よ。"
        subtitle: "定番その1——フィッシングと水飲み場攻撃を混ぜないこと。入口が“メール”か“訪問”かが軸よ。"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "定番その2——標的型は“特定の個人や組織”。分散型や大量配布と比べて、準備がある前提で考えなさい。"
        subtitle: "定番その2——標的型は“特定の個人や組織”。分散型や大量配布と比べて、準備がある前提で考えなさい。"

      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "定番その3——目的の一致！ フィッシングは“入力させて情報を盗む”。水飲み場は“訪問させて不正を成立させる”。"
        subtitle: "定番その3——目的の一致！ フィッシングは“入力させて情報を盗む”。水飲み場は“訪問させて不正を成立させる”。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "あとはBECみたいに“技術じゃなく業務フロー”が問われることもあるわ。メールが来たから技術問題、とは決めつけない。"
        subtitle: "あとはBECみたいに“技術じゃなく業務フロー”が問われることもあるわ。メールが来たから技術問題、とは決めつけない。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "文章問題では、攻撃フェーズの言葉（誘導、入力、承認、実行など）を拾うと正解に近づくの。"
        subtitle: "文章問題では、攻撃フェーズの言葉（誘導、入力、承認、実行など）を拾うと正解に近づくの。"


  # ============================================================
  # まとめ・次回予告
  # ============================================================
  - id: "summary"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "今回のまとめよ。標的型攻撃の入口は、フィッシングと水飲み場攻撃。フィッシングは入力させて情報窃取、水飲み場は標的が訪れる場所を餌にする。"
        subtitle: "今回のまとめよ。標的型攻撃の入口は、フィッシングと水飲み場攻撃。フィッシングは入力させて情報窃取、水飲み場は標的が訪れる場所を餌にする。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "対策は多層防御。技術（検知・隔離・認証）、運用（MFA・最小権限・承認フロー）、教育（判断力）で入口を塞ぐの。"
        subtitle: "対策は多層防御。技術（検知・隔離・認証）、運用（MFA・最小権限・承認フロー）、教育（判断力）で入口を塞ぐの。"

      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "これで“それっぽいメール”が来ても、焦って押さずに判断できるのだ！"
        subtitle: "これで“それっぽいメール”が来ても、焦って押さずに判断できるのだ！"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "次回（第4回）は、攻撃が成立するためのもう一段階——侵入・実行の流れをつなげて理解するわよ。"
        subtitle: "次回（第4回）は、攻撃が成立するためのもう一段階——侵入・実行の流れをつなげて理解するわよ。"

      - type: dialogue
        character: zundamon
        face: "喜び"
