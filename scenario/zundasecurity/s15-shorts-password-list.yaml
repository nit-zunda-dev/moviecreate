title: "【登録セキスペ】パスワードリスト攻撃の仕組みと対策"

# 「パスワードリスト攻撃の解説図解」Shorts 専用
# - generate-shorts --ids password-list-full で縦長 MP4 を出力

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.3
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.3
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.25
    postPhonemeLength: 0.05
  defaultBackground: "./image/background/background.png"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 3500
  text: "パスワードリスト攻撃は漏えいID/PWを別サービスへ—— 使い回しとMFA、監視で守るのだ！"
  emphasis:
    - "パスワードリスト攻撃"
    - "使い回し"
    - "MFA"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.15
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "q5_definition"
    chapter:
      label: "Q5：パスワードリスト攻撃とは"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Q5——パスワードリスト攻撃とは何？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "あるサービスで漏えいしたIDとPWの組を、別サービスのログインに試す攻撃なのだ！ 総当たりではなく既存の組み合わせを使う、クレデンシャルスタッフィングに近いのだ！"
        emphasis: ["IDとPWの組", "別サービス"]
        se: "./se/correct_bell.mp3"

  - id: "q5_attack_flow"
    chapter:
      label: "Q5補足：攻撃の流れと混同注意"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "攻撃の流れは？"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "サービスAで漏えい、リスト化、サービスBのログイン画面へ—— PW使い回しがあれば成功、辞書は1IDに単語、総当たりは全組合せなのだ！"
        emphasis: ["使い回し", "漏えい"]
        se: "./se/correct_bell.mp3"

  - id: "q6_countermeasures"
    chapter:
      label: "Q6：パスワードリスト攻撃への対策"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Q6——対策は？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "PW使い回し禁止、長く複雑なPW、パスワードマネージャ、MFA—— 漏えいPWの検知・変更も重要、サービス側は異常ログイン監視と試行制限なのだ！"
        emphasis: ["使い回し禁止", "MFA"]
        se: "./se/correct_bell.mp3"

  - id: "q6_countermeasures_detail"
    chapter:
      label: "Q6補足：ユーザーと運用者の対策"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "運用側は何をする？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "漏えいPWチェック、リスクベース認証、ログ監視、CAPTCHA—— 多層防御で漏えい組み合わせの再利用を防ぐのだ！"
        emphasis: ["ログ監視", "多層防御"]
        se: "./se/correct_bell.mp3"

  - id: "summary_exam"
    chapter:
      label: "まとめ：試験のポイント"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "リスト攻撃＝漏えいID/PWを別サービスへ—— 基本は使い回し禁止、MFA、監視、この三つセットなのだ！"
        emphasis: ["使い回し禁止", "監視"]
        se: "./se/callout_pop.mp3"

shorts:
  - id: "password-list-full"
    title: "パスワードリスト攻撃の仕組みと対策"
    pickScenes:
      - "q5_definition"
      - "q5_attack_flow"
      - "q6_countermeasures"
      - "q6_countermeasures_detail"
      - "summary_exam"
    overlayCaption: "📋 パスワードリスト"
    cta: "👇 関連動画は概要欄"
