title: "【登録セキスペ】Check! Q1–Q6・CASB確認問題：ゼロトラスト"

# 教科書 ゼロトラスト章 Check! + 確認問題（R6春 午前Ⅱ 問11）Shorts 専用
# - 本編なし。generate-shorts のみで縦長 MP4 を出力

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/background.png"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 4000
  text: "CASB＝脆弱性診断？ DDoS対策？ シャドーITの正解、試験頻出なのだ！"
  emphasis:
    - "CASB"
    - "シャドーIT"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.15
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "practice_casb"
    chapter:
      label: "確認問題：CASB（R6 春 午前Ⅱ 問11）"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "問題——セキュリティ対策として、CASBを利用した際の効果はどれか。ア顧客管理者が脆弱性診断で脆弱性を把握、イ顧客管理者が利用状況を可視化してシャドーITを把握、ウ事業者がDDoS対策で可用性低下を緩和、エ事業者が入退室管理で物理的不正アクセスを防止。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "CASBはクラウド利用の可視化が本命…… アは脆弱性診断、ウはDDoS、エは物理セキュリティ—— 正解はイ！ 許可なく使われているクラウド、シャドーITを見つけるのだ！"
        emphasis: ["CASB", "シャドーIT"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解はイ。CASBの四本柱は可視化、制御、データ保護、脅威保護。顧客側が従業員のクラウド利用を把握するのが典型。事業者のDDoSや施設入退室はCASBの役割じゃないわ。"
        se: "./se/correct_bell.mp3"

  - id: "check_q1_zero_trust"
    chapter:
      label: "Check! Q1：ゼロトラストとは何か"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Check Q1——ゼロトラストとは何か。定義を述べなさい。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "ネットワークの内外やユーザーの属性を問わず、常に検証してからアクセスを許可する考え方なのだ！ 信頼しない、検証する—— Never trust, always verify なのだ！"
        emphasis: ["常に検証", "Never trust"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解。境界の内側を安全とみなす従来モデルへの対抗概念。試験では常時認証・最小権限とセットで出るわ。"
        se: "./se/correct_bell.mp3"

  - id: "check_q2_perimeter"
    chapter:
      label: "Check! Q2：境界防御モデルとは何か"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Check Q2——境界防御モデルとは何か。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "FWで囲った内部ネットワークを安全圏とみなし、外部からの侵入を防ぐ従来型の考え方なのだ！ 城壁モデル、パリメータ防御とも呼ばれるのだ！"
        emphasis: ["境界防御", "城壁"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解。内部に入ったら信頼——この前提がテレワークやクラウド時代に破綻したから、ゼロトラストが台頭したのよ。"
        se: "./se/correct_bell.mp3"

  - id: "check_q3_implementation"
    chapter:
      label: "Check! Q3：ゼロトラストの実現方式"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Check Q3——ゼロトラストの実現方式について説明せよ。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "マイクロセグメンテーションで細かく区切る、最小権限の原則、多要素認証、継続的なデバイスとユーザの検証—— 全部セットでやるのだ！"
        emphasis: ["マイクロセグメンテーション", "最小権限"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解。一発導入じゃなく、ID・アプリ・ネットワークを段階的にゼロトラスト化するのが現実的な進め方よ。"
        se: "./se/correct_bell.mp3"

  - id: "check_q4_ztna"
    chapter:
      label: "Check! Q4：ZTNAとは何か"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Check Q4——ZTNAとは何か。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "Zero Trust Network Access、ゼロトラストネットワークアクセスなのだ！ VPNの代わりに、アプリ単位で認証・認可してから接続を許可する方式なのだ！"
        emphasis: ["ZTNA", "アプリ単位"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解。ネットワーク全体に入るVPNと違い、必要なアプリだけに最小限アクセス——ゼロトラストのリモートアクセス実装として頻出よ。"
        se: "./se/correct_bell.mp3"

  - id: "check_q5_sase"
    chapter:
      label: "Check! Q5：SASEとは何か"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Check Q5——SASEとは何か。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "Secure Access Service Edge、セキュアアクセスサービスエッジなのだ！ ネットワークとセキュリティ機能をクラウドで一体提供するフレームワークなのだ！"
        emphasis: ["SASE", "クラウド"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解。拠点のFWに頼らず、クラウドエッジでWANとセキュリティをまとめて提供——分散勤務向けの最新アーキテクチャよ。"
        se: "./se/correct_bell.mp3"

  - id: "check_q6_sase_components"
    chapter:
      label: "Check! Q6：SASEの構成技術"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Check Q6——SASEを構成する主な技術やサービスについて説明せよ。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "SD-WAN、CASB、SWG、ZTNA、FWaaS—— WAN最適化とセキュリティをクラウドで束ねるのだ！ CASBもSASEの一部なのだ！"
        emphasis: ["SD-WAN", "CASB", "ZTNA"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解。SASE＝SD-WAN＋セキュリティサービス群。CASBはシャドーIT可視化、SWGはWebフィルタ、ZTNAはゼロトラスト接続——役割を混同しないで。"
        se: "./se/correct_bell.mp3"

  - id: "trap_casb_sase"
    chapter:
      label: "ひっかけ整理：CASBとSASEの関係"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "CASB＝クラウド利用の可視化・制御（顧客側）。SASE＝SD-WAN＋CASB＋SWG＋ZTNA等の統合枠組み。DDoS対策や施設入退室はCASBの効果じゃないわ。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "CASBで脆弱性診断、SASEで物理入退室—— 両方ひっかけ、シャドーIT可視化だけ覚えるのだ！"
        emphasis: ["シャドーIT", "ひっかけ"]
        se: "./se/callout_pop.mp3"

shorts:
  - id: "casb-quiz"
    title: "CASB四択の正解（R6春 問11）"
    pickScenes: ["practice_casb", "trap_casb_sase"]
    overlayCaption: "📝 確認問題"
    cta: "👇 Check! Q1–Q6もショートで"

  - id: "zero-trust-q1"
    title: "Check! Q1：ゼロトラストの定義"
    pickScenes: ["check_q1_zero_trust"]
    overlayCaption: "📝 Check! Q1"
    cta: "👇 CASB問題もショートで"

  - id: "zero-trust-q2"
    title: "Check! Q2：境界防御モデル"
    pickScenes: ["check_q2_perimeter"]
    overlayCaption: "📝 Check! Q2"
    cta: "👇 Q1・Q3もショートで"

  - id: "zero-trust-q3"
    title: "Check! Q3：ゼロトラスト実現方式"
    pickScenes: ["check_q3_implementation"]
    overlayCaption: "📝 Check! Q3"
    cta: "👇 Q4・Q5もショートで"

  - id: "zero-trust-q4"
    title: "Check! Q4：ZTNAとは"
    pickScenes: ["check_q4_ztna"]
    overlayCaption: "📝 Check! Q4"
    cta: "👇 Q5・Q6もショートで"

  - id: "zero-trust-q5"
    title: "Check! Q5：SASEとは"
    pickScenes: ["check_q5_sase"]
    overlayCaption: "📝 Check! Q5"
    cta: "👇 Q6・CASBもショートで"

  - id: "zero-trust-q6"
    title: "Check! Q6：SASEの構成技術"
    pickScenes: ["check_q6_sase_components", "trap_casb_sase"]
    overlayCaption: "📝 Check! Q6"
    cta: "👇 CASB問題もショートで"
