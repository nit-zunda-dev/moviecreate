# =============================================================================
# Sprint 1〜4 動作確認デモ
# - Sprint 1: 冒頭 Hook / Line.emphasis / Line.callout (4スタイル)
# - Sprint 3: global.bgm / scene.bgm / hook.bgm + hook.se / line.se
# - Sprint 4: shorts: [...] で本編から派生 Shorts（縦長 1080×1920）を量産
# 既存16本は触らず、このデモだけで全機能を体感できるようにしてある。
# 必要素材（事前に ./bgm/ ./se/ に配置済み）:
#   bgm/パステルハウス.mp3, intro_tense.mp3, main_serious.mp3, outro_warm.mp3
#   se/hook_impact.mp3, emphasis_chime.mp3, callout_pop.mp3, warn_buzz.mp3, correct_bell.mp3
# 起動例:
#   node dist/cli.js lint-retention scenario/zundasecurity/_demo-hook.yaml
#   node dist/cli.js generate-video scenario/zundasecurity/_demo-hook.yaml
#   node dist/cli.js generate-shorts scenario/zundasecurity/_demo-hook.yaml
# =============================================================================
title: "【デモ】Hook と Emphasis と Callout の動作確認"

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.2
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.2
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/Movidrill.png"
  # === Sprint 3: 既定 BGM（シーン別 bgm が無い区間で流れる）===================
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12  # セリフを邪魔しないよう、既定の 0.15 より少し控えめ

output:
  fps: 30
  width: 1280
  height: 720

# === 冒頭5秒のフック演出 =====================================================
hook:
  durationMs: 5000
  text: "URLの数字いじるだけで他人の請求書が見えた"
  emphasis:
    - "数字いじるだけ"
    - "他人の請求書"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.18
  shake: true
  # === Sprint 3: Hook 専用 BGM + 開幕 SE ====================================
  bgm: "./bgm/intro_tense.mp3"   # Hook 5秒だけ緊張感ある別BGM（音量は 0.35 に自動）
  se:  "./se/hook_impact.mp3"    # Hook 開始 0ms に「ドンッ」を 1 発

# === 本編シーン ============================================================
scenes:
  - id: "incident"
    chapter:
      label: "事件発生：URLいじりが招く事故"
    # 事件解説中はシリアスな BGM に切替（自動で 400ms クロスフェード）
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "たすけてほしいのだ！URLの数字を変えたら、他人の請求書が見えたのだ……！"
        emphasis: ["他人の請求書"]
        se: "./se/warn_buzz.mp3"   # 警告音で「事件感」を出す
        callout:
          text: "🔥 試験頻出"
          style: "exam"
          durationMs: 3000
      - type: dialogue
        character: metan
        face: "困り"
        text: "典型ね。サーバが『そのデータを見ていいか』を毎回確認していないパターンよ。"
        emphasis: ["毎回確認していない"]
        se: "./se/emphasis_chime.mp3"   # キラーンで強調語を補強
        callout:
          text: "認可は毎回サーバ側"
          style: "warn"

  - id: "concept"
    chapter:
      label: "認証と認可の違い"
    # bgm 未指定 → global.bgm.default（パステルハウス）に自動で戻る
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "認証と認可って、何が違うのだ？"
        se: "./se/callout_pop.mp3"   # バッジ出現に合わせてピンッ
        callout:
          text: "💡 認証 vs 認可"
          style: "tip"
      - type: dialogue
        character: metan
        face: "通常"
        text: "認証は『誰か』を確認、認可は『何をしていいか』を確認するの。別物よ。"
        emphasis: ["誰か", "何をしていいか"]
        se: "./se/emphasis_chime.mp3"

  - id: "summary"
    chapter:
      label: "まとめ"
    # まとめは温かい BGM に切替
    bgm: "./bgm/outro_warm.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "ポイントは『認可は毎回サーバ側で確認』。これだけ覚えて帰ってちょうだい。"
        emphasis: ["認可は毎回サーバ側"]
        se: "./se/correct_bell.mp3"   # 「これ覚えて」の決め音
        callout:
          text: "🚨 ここテスト出る"
          style: "breaking"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "覚えたのだ！"

# === Sprint 4: 本編から派生する Shorts（縦長 1080×1920）====================
# generate-shorts コマンドで output/shorts/ 以下に MP4 を一括生成。
# - pickScenes: 抽出するシーンID（順序保持）。未指定なら全シーン。
# - pickLines : シーンの一部行範囲だけ拾う場合（pickScenes より優先）
# - overlayCaption: 動画上部に固定表示する大テロップ（無音再生でも内容が伝わる）
# - cta: 末尾2秒に表示する本編誘導テキスト
shorts:
  - id: "preview-incident"
    title: "URLいじりで他人の請求書が見えた事件"
    pickScenes: ["incident"]
    overlayCaption: "🔥 試験頻出"
    cta: "👇 続きは本編で（概要欄）"

  - id: "concept-only"
    title: "認証 vs 認可（30秒で）"
    pickScenes: ["concept"]
    overlayCaption: "💡 認証 vs 認可"
    cta: "解説本編は概要欄から"

# === YouTube メタデータ（Sprint 2 で配線予定。先に書いておく）=================
youtube:
  audience:
    - "受験者"
    - "新人Webエンジニア"
    - "情シス担当"
  hookKeywords:
    - "URL"
    - "他人の請求書"
    - "ログインしてるのに見えた"
  hashtags:
    - "#情報処理安全確保支援士"
    - "#セキスペ"
    - "#Webセキュリティ"
    - "#ずんだもん"
  titleHints:
    - { style: "shock" }
    - { style: "howto" }
    - { style: "exam" }
