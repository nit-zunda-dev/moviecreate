# =============================================================================
# Sprint 1 動作確認デモ
# - 冒頭 Hook（フラッシュ・ズーム・シェイク・大テロップ・立ち絵）
# - 行レベル emphasis（中央大ドカン）
# - 行レベル callout（右上常駐テロップ・4スタイル）
# 既存16本は触らず、このデモだけで全機能を体感できるようにしてある。
# 起動例:
#   node dist/cli.js lint-retention scenario/zundasecurity/_demo-hook.yaml
#   node dist/cli.js generate-video scenario/zundasecurity/_demo-hook.yaml
# =============================================================================
title: "【デモ】Hook と Emphasis と Callout の動作確認"

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.2
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.2
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/Movidrill.png"

output:
  fps: 30
  width: 1280
  height: 720

# === 冒頭5秒のフック演出 =====================================================
hook:
  durationMs: 5000
  text: "URLの数字いじるだけで他人の請求書が見えた"
  emphasis:
    - "数字いじるだけ"
    - "他人の請求書"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.18
  shake: true

# === 本編シーン ============================================================
scenes:
  - id: "incident"
    chapter:
      label: "事件発生：URLいじりが招く事故"
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "たすけてほしいのだ！URLの数字を変えたら、他人の請求書が見えたのだ……！"
        emphasis: ["他人の請求書"]
        callout:
          text: "🔥 試験頻出"
          style: "exam"
          durationMs: 3000
      - type: dialogue
        character: metan
        face: "困り"
        text: "典型ね。サーバが『そのデータを見ていいか』を毎回確認していないパターンよ。"
        emphasis: ["毎回確認していない"]
        callout:
          text: "認可は毎回サーバ側"
          style: "warn"

  - id: "concept"
    chapter:
      label: "認証と認可の違い"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "認証と認可って、何が違うのだ？"
        callout:
          text: "💡 認証 vs 認可"
          style: "tip"
      - type: dialogue
        character: metan
        face: "通常"
        text: "認証は『誰か』を確認、認可は『何をしていいか』を確認するの。別物よ。"
        emphasis: ["誰か", "何をしていいか"]

  - id: "summary"
    chapter:
      label: "まとめ"
    lines:
      - type: dialogue
        character: metan
        face: "笑い"
        text: "ポイントは『認可は毎回サーバ側で確認』。これだけ覚えて帰ってちょうだい。"
        emphasis: ["認可は毎回サーバ側"]
        callout:
          text: "🚨 ここテスト出る"
          style: "breaking"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "覚えたのだ！"

# === YouTube メタデータ（Sprint 2 で配線予定。先に書いておく）=================
youtube:
  audience:
    - "受験者"
    - "新人Webエンジニア"
    - "情シス担当"
  hookKeywords:
    - "URL"
    - "他人の請求書"
    - "ログインしてるのに見えた"
  hashtags:
    - "#情報処理安全確保支援士"
    - "#セキスペ"
    - "#Webセキュリティ"
    - "#ずんだもん"
  titleHints:
    - { style: "shock" }
    - { style: "howto" }
    - { style: "exam" }
