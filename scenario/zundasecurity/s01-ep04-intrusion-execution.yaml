title: "【登録セキスペ 第4回｜Season1】侵入から実行まで——攻撃の段階・踏み台・横展開・C2の試験ポイントなのだ！"

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/Movidrill.png"

output:
  fps: 30
  width: 1280
  height: 720

scenes:
  # ============================================================
  # オープニング：インシデント導入（侵入が“進行中”）
  # ============================================================
  - id: "incident"
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "た、たすけてほしいのだ！　自分のPCから、社内の別サーバに“夜中に”ログインした記録が残ってるって通報されたのだ！"
        subtitle: "た、たすけてほしいのだ！　自分のPCから、社内の別サーバに“夜中に”ログインした記録が残ってるって通報されたのだ！"

      - type: dialogue
        character: metan
        face: "困り"
        text: "……第3回のフィッシングで取られた資格情報が、まだ生きてるのね。入口の次は「侵入と実行の段階」が始まってるわ。"
        subtitle: "……第3回のフィッシングで取られた資格情報が、まだ生きてるのね。入口の次は「侵入と実行の段階」が始まってるわ。"

      - type: dialogue
        character: zundamon
        face: "困り"
        text: "入口って、メールのリンクの話だったのだ……。でも“中”で何が起きてるか、全然イメージできてなかったのだ……。"
        subtitle: "入口って、メールのリンクの話だったのだ……。でも“中”で何が起きてるか、全然イメージできてなかったのだ……。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "だから今日は、攻撃が「入ったあと」に起きやすい流れを、試験で取り違えない形に整理する。Season1の締めよ。"
        subtitle: "だから今日は、攻撃が「入ったあと」に起きやすい流れを、試験で取り違えない形に整理する。Season1の締めよ。"


  # ============================================================
  # オープニング：シリーズ紹介
  # ============================================================
  - id: "opening"
    lines:
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "みんな、こんにちはなのだ！　ずんだもんなのだ！"
        subtitle: "みんな、こんにちはなのだ！　ずんだもんなのだ！"

      - type: dialogue
        character: metan
        face: "通常"
        text: "四国めたんよ。第4回は「侵入から実行まで」。攻撃の段階、踏み台、権限昇格、横展開、C2あたりを扱うわ。"
        subtitle: "四国めたんよ。第4回は「侵入から実行まで」。攻撃の段階、踏み台、権限昇格、横展開、C2あたりを扱うわ。"

      - type: dialogue
        character: zundamon
        face: "通常"
        text: "第1回がマルウェア、第2回がDDoS、第3回が標的型の入口だったのだ。今回は“中の話”なのだね？"
        subtitle: "第1回がマルウェア、第2回がDDoS、第3回が標的型の入口だったのだ。今回は“中の話”なのだね？"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "そう。セキスペは「入口」だけじゃなく、「侵害が成立したあと」に何が起きるかも文章でつながるの。用語の役割分担が鍵よ。"


  # ============================================================
  # 攻撃の段階：全体像（キルチェーン的な整理）
  # ============================================================
  - id: "attack_phases_overview"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "キルチェーンとかATT&CKとか、名前は聞くのだ。試験ではどこまで覚えるのが現実的なのだ？"
        subtitle: "キルチェーンとかATT&CKとか、名前は聞くのだ。試験ではどこまで覚えるのが現実的なのだ？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "完璧暗記は不要。大事なのは「段階の順番」と「その段階でやりたいこと」が一致しているか、ね。"
        subtitle: "完璧暗記は不要。大事なのは「段階の順番」と「その段階でやりたいこと」が一致しているか、ね。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "典型は、入口で足場を取る→マルウェアやコマンドを実行→居座る→権限を上げる→社内へ広げる→遠隔操作で動かす、の流れ。"
        subtitle: "典型は、入口で足場を取る→マルウェアやコマンドを実行→居座る→権限を上げる→社内へ広げる→遠隔操作で動かす、の流れ。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "ずんだもんのPCが「最初の犠牲者」で、その先に“本丸”がある感じなのだ……。"
        subtitle: "ずんだもんのPCが「最初の犠牲者」で、その先に“本丸”がある感じなのだ……。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "その通り。だからログでは「誰が最初に侵害されたか」と「どこへ広がったか」を分けて読むのがセキスペっぽいわ。"


  # ============================================================
  # 実行：マルウェア起動・不正コマンド
  # ============================================================
  - id: "execution"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "「実行」って、第1回のマルウェアの話と同じ単語なのだ。混ざるのだ……。"
        subtitle: "「実行」って、第1回のマルウェアの話と同じ単語なのだ。混ざるのだ……。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "混ざるわね。整理すると「実行」は広い言葉。試験文脈では、ペイロードの起動、スクリプト実行、スケジュール登録なども含むことが多いわ。"
        subtitle: "混ざるわね。整理すると「実行」は広い言葉。試験文脈では、ペイロードの起動、スクリプト実行、スケジュール登録なども含むことが多いわ。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "ポイントは「目的」。実行の直後は、しばしば永続化や権限昇格、外部との通信確立に繋がる、と文章で読むの。"
        subtitle: "ポイントは「目的」。実行の直後は、しばしば永続化や権限昇格、外部との通信確立に繋がる、と文章で読むの。"

      - type: dialogue
        character: zundamon
        face: "通常"
        text: "つまり「実行＝終わり」じゃなくて、「次の悪いことを可能にするスイッチ」なのだね。"
        subtitle: "つまり「実行＝終わり」じゃなくて、「次の悪いことを可能にするスイッチ」なのだね。"


  # ============================================================
  # 永続化・権限昇格
  # ============================================================
  - id: "persistence_privilege_escalation"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "永続化って、再起動しても残るやつなの？　バックドアと同じなのだ？"
        subtitle: "永続化って、再起動しても残るやつなの？　バックドアと同じなのだ？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "近いけど同義じゃない。永続化は「居座り続けるための仕組み」、バックドアは「秘密の入口」——説明によってはセットで出るわ。"
        subtitle: "近いけど同義じゃない。永続化は「居座り続けるための仕組み」、バックドアは「秘密の入口」——説明によってはセットで出るわ。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "権限昇格は、一般ユーザー権限から管理者へ、みたいに「できることを増やす」段階。試験では脆弱性悪用や設定ミスが原因として出やすいわ。"
        subtitle: "権限昇格は、一般ユーザー権限から管理者へ、みたいに「できることを増やす」段階。試験では脆弱性悪用や設定ミスが原因として出やすいわ。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "権限が上がると、ログ消しや他ホストへの攻撃もやりやすくなるのだ……！"
        subtitle: "権限が上がると、ログ消しや他ホストへの攻撃もやりやすくなるのだ……！"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "その通り。だから「永続化＝権限昇格」と短絡しない。順番と目的で切り分けるのが正解に近いわ。"


  # ============================================================
  # 横展開・踏み台
  # ============================================================
  - id: "lateral_movement_foothold"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "横展開って、感染が広がる話なの？　ワームみたいなのだ？"
        subtitle: "横展開って、感染が広がる話なの？　ワームみたいなのだ？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "似てるけど、典型は「攻撃者が既に手に入れた認証情報や管理経路を使って、別のマシンへ移る」イメージが強いわ。"
        subtitle: "似てるけど、典型は「攻撃者が既に手に入れた認証情報や管理経路を使って、別のマシンへ移る」イメージが強いわ。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "踏み台は「次の攻撃の起点になるホスト」。ずんだもんのPCが踏み台になって、ファイルサーバへ伸びた、が今回の筋よ。"
        subtitle: "踏み台は「次の攻撃の起点になるホスト」。ずんだもんのPCが踏み台になって、ファイルサーバへ伸びた、が今回の筋よ。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "だから「自分が悪いわけじゃないのに」社内インパクトが出るのだ……。怖いのだ……。"
        subtitle: "だから「自分が悪いわけじゃないのに」社内インパクトが出るのだ……。怖いのだ……。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "だからゼロトラストやセグメンテーション、特権アカウント管理が試験でも実務でも効くの。横に広がる道を細くするのよ。"


  # ============================================================
  # C2：遠隔操作と検知の急所
  # ============================================================
  - id: "command_and_control"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "C2って何の略なのだ？　試験で見たらドキッとするのだ。"
        subtitle: "C2って何の略なのだ？　試験で見たらドキッとするのだ。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "Command and Control、日本語だと指揮統制みたいに訳されることもあるわ。攻撃者が被害環境を遠隔で操作する通信が典型ね。"
        subtitle: "Command and Control、日本語だと指揮統制みたいに訳されることもあるわ。攻撃者が被害環境を遠隔で操作する通信が典型ね。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "HTTPSや既存のクラウドサービスを装うなど、正規トラフィックに紛らわせる手口も教科書に載る。だから「通信の見え方」だけで安心しない。"
        subtitle: "HTTPSや既存のクラウドサービスを装うなど、正規トラフィックに紛らわせる手口も教科書に載る。だから「通信の見え方」だけで安心しない。"

      - type: dialogue
        character: zundamon
        face: "通常"
        text: "侵入の“リモコン”がC2で、横展開は“部屋の中を歩く”感じなのだね。"
        subtitle: "侵入の“リモコン”がC2で、横展開は“部屋の中を歩く”感じなのだね。"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "比喩として悪くないわ。試験では「C2＝データ窃取」みたいに目的を取り違えないで。窃取は別フェーズとして書かれることも多いの。"


  # ============================================================
  # 対策：段階ごとに遅らせる
  # ============================================================
  - id: "countermeasures"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "全部止めるのは無理っぽいのだ。現場はどこから手を付けるのだ？"
        subtitle: "全部止めるのは無理っぽいのだ。現場はどこから手を付けるのだ？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "基本は多層防御。入口（MFA・メール対策）に加えて、実行検知（EDR/アンチマルウェア）、通信の可視化（プロキシ・DNSログ）、権限の最小化。"
        subtitle: "基本は多層防御。入口（MFA・メール対策）に加えて、実行検知（EDR/アンチマルウェア）、通信の可視化（プロキシ・DNSログ）、権限の最小化。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "ネットワークはセグメンテーションで横展開を遅らせる。バックアップと復旧手順はランサムウェア系の「最終局面」にも効くわ。"
        subtitle: "ネットワークはセグメンテーションで横展開を遅らせる。バックアップと復旧手順はランサムウェア系の「最終局面」にも効くわ。"

      - type: dialogue
        character: zundamon
        face: "通常"
        text: "「検知できたら勝ち」じゃなくて、「広がる前に時間を稼ぐ」も勝ちなのだね。"
        subtitle: "「検知できたら勝ち」じゃなくて、「広がる前に時間を稼ぐ」も勝ちなのだね。"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "その通り。インシデント対応は次のシーズン以降でも深掘りするけど、今日は「攻撃の段階に合わせた打ち手」を持ち帰って。"


  # ============================================================
  # 試験あるある：段階の取り違え
  # ============================================================
  - id: "exam_tips"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "ひっかけポイント、最後にまとめてほしいのだ！"
        subtitle: "ひっかけポイント、最後にまとめてほしいのだ！"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "定番その1——「横展開」と「C2」を混ぜない。横展開は社内の移動、C2は外部との指揮系が多い、と文章の主語を見なさい。"
        subtitle: "定番その1——「横展開」と「C2」を混ぜない。横展開は社内の移動、C2は外部との指揮系が多い、と文章の主語を見なさい。"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "定番その2——「永続化」と「権限昇格」。居座るのか、できることを増やすのか、目的が違うわ。"
        subtitle: "定番その2——「永続化」と「権限昇格」。居座るのか、できることを増やすのか、目的が違うわ。"

      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "定番その3——「踏み台」は地点！　攻撃の“中継地点”って書いてあったら、まず踏み台を疑うのだ！"
        subtitle: "定番その3——「踏み台」は地点！　攻撃の“中継地点”って書いてあったら、まず踏み台を疑うのだ！"

      - type: dialogue
        character: metan
        face: "通常"
        text: "文章問題は、動詞と名詞のセットがヒント。ログイン、実行、登録、移動、通信、窃取——順番に並べ直すと正解に寄るわ。"


  # ============================================================
  # まとめ・次回予告（Season2へ）
  # ============================================================
  - id: "summary"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "今回のまとめよ。入口の次は、実行・永続化・権限昇格・横展開・C2といった段階で被害が広がりやすい。踏み台は次攻撃の起点。"
        subtitle: "今回のまとめよ。入口の次は、実行・永続化・権限昇格・横展開・C2といった段階で被害が広がりやすい。踏み台は次攻撃の起点。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "対策は多層で、入口強化に加えて実行検知・通信可視化・権限最小化・セグメンテーション。用語は目的で切り分けるの。"
        subtitle: "対策は多層で、入口強化に加えて実行検知・通信可視化・権限最小化・セグメンテーション。用語は目的で切り分けるの。"

      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "Season1は「手口の地図」ができたのだ！　次はWebの闇に進むのだ？！"
        subtitle: "Season1は「手口の地図」ができたのだ！　次はWebの闇に進むのだ？！"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "次はSeason2よ。第5回からはWebアプリの代表性の高い攻撃——SQLインジェクションから入るわ。覚悟しなさい。"
        subtitle: "次はSeason2よ。第5回からはWebアプリの代表性の高い攻撃——SQLインジェクションから入るわ。覚悟しなさい。"

      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "チャンネル登録と高評価もよろしくなのだ！　一緒にセキスペ合格を目指すのだ！"
        subtitle: "チャンネル登録と高評価もよろしくなのだ！　一緒にセキスペ合格を目指すのだ！"

      - type: dialogue
        character: metan
        face: "通常"
        text: "感想やリクエストはコメント欄へ。次のシーズンもしっかりついてきなさい。"
        subtitle: "感想やリクエストはコメント欄へ。次のシーズンもしっかりついてきなさい。"

      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "また見てほしいのだ！　バイバイなのだ！"
        subtitle: "また見てほしいのだ！　バイバイなのだ！"
