title: "【登録セキスペ】BOFとsetuid/setgidの対策と危険性"

# 「BOF と setuid/setgid の対策と危険性」Shorts 専用
# - generate-shorts --ids bof-setuid-countermeasures-full で縦長 MP4 を出力

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.3
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.3
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.25
    postPhonemeLength: 0.05
  defaultBackground: "./image/background/background.png"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 3500
  text: "setuidにBOFがあると権限昇格—— ユーザー・開発者・運用者、それぞれの対策が試験頻出なのだ！"
  emphasis:
    - "setuid"
    - "BOF"
    - "権限昇格"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.15
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "q7_setuid_danger"
    chapter:
      label: "Q7：setuid/setgid属性の危険性"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Q7——setuid/setgid属性の危険性は？"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "所有者やグループの高権限で動くのだ！ 脆弱性があれば一般ユーザーがroot権限で不正実行—— 権限が高いほど被害も大きいのだ！"
        emphasis: ["権限昇格", "root権限"]
        se: "./se/correct_bell.mp3"

  - id: "q8_user_countermeasures"
    chapter:
      label: "Q8：商用ソフト利用者のBOF対策"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Q8——商用ソフト利用者のBOF対策は？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "パッチ適用、ASLR・DEP・スタックカナリア有効化、最小権限運用、EDRやWAFで多層防御—— 更新と保護機能がキーなのだ！"
        emphasis: ["パッチ適用", "多層防御"]
        se: "./se/correct_bell.mp3"

  - id: "q9_developer_countermeasures"
    chapter:
      label: "Q9：開発者のBOF対策"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Q9——開発者が取るBOF対策は？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "境界チェック、安全な関数、ファジングとコードレビュー、コンパイラ保護—— 組み込みの品質で脆弱性を減らすのだ！"
        emphasis: ["境界チェック", "安全な関数"]
        se: "./se/correct_bell.mp3"

  - id: "q10_setuid_bof_countermeasures"
    chapter:
      label: "Q10：setuid/setgid悪用BOFへの対策"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Q10——setuid/setgidを悪用したBOFへの対策は？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "setuid付与を最小化、権限分離、入力検証強化、監査とログ監視—— 高権限×脆弱性を作らないのだ！"
        emphasis: ["最小化", "高権限×脆弱性"]
        se: "./se/correct_bell.mp3"

  - id: "summary_exam"
    chapter:
      label: "まとめ：試験のポイント"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "BOFは境界チェック不足、setuidは権限昇格の踏み台—— ユーザーは更新、開発者は安全実装、運用者は最小権限なのだ！"
        emphasis: ["更新", "最小権限"]
        se: "./se/callout_pop.mp3"

shorts:
  - id: "bof-setuid-countermeasures-full"
    title: "BOFとsetuid/setgidの対策と危険性"
    pickScenes: ["q7_setuid_danger", "q8_user_countermeasures", "q9_developer_countermeasures", "q10_setuid_bof_countermeasures", "summary_exam"]
    overlayCaption: "🛡️ BOF/setuid対策"
    cta: "👇 関連動画は概要欄"
