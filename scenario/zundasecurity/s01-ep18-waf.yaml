    - "Webアプリ・インフラ担当の新人エンジニア"
  hookKeywords:
    - "WAF"
    - "ファイアウォール"
    - "SQLインジェクション"
    - "HTTP"
    - "アプリケーション層"
  hashtags:
    - "#情報処理安全確保支援士"
    - "#セキスペ"
    - "#WAF"
    - "#Webセキュリティ"
    - "#ずんだもん"
  relatedEpisodes:
    - { ep: 17, title: "ファイアウォールの常識のウソ" }
    - { ep: 19, title: "VLAN（次回）" }
  titleHints:
    - { style: "shock" }
    - { style: "howto" }
    - { style: "exam" }
