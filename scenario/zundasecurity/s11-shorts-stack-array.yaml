title: "【登録セキスペ】配列によるスタック実装の最小構成"

# 「配列によるスタック実装」確認問題 Shorts 専用（H24 秋・午前II 問3）
# - generate-shorts --ids stack-array-full で縦長 MP4 を出力

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.3
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.3
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.25
    postPhonemeLength: 0.05
  defaultBackground: "./image/background/background.png"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 3500
  text: "配列スタックに必要なのはtopだけ？ 先頭と末尾の添字、試験で間違えやすいのだ！"
  emphasis:
    - "top"
    - "LIFO"
    - "配列"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.15
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "question_answer"
    chapter:
      label: "問題：配列スタックの最小構成要素"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "問題——配列でスタックを実現する最低限の構成要素はどれ？ アからエの四択よ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "正解はア！ 最後に入った要素を示す添字の変数、つまりtopだけでいいのだ！"
        emphasis: ["top", "ア"]
        se: "./se/correct_bell.mp3"

  - id: "why_correct"
    chapter:
      label: "理由：LIFOとpush/pop"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "なぜtopだけで足りる？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "スタックはLIFO、後入れ先出しなのだ！ pushでtopを増やし、popでtopの要素を取り出して減らす—— トップ位置が分かれば操作できるのだ！"
        emphasis: ["LIFO", "push", "pop"]
        se: "./se/correct_bell.mp3"

  - id: "wrong_patterns"
    chapter:
      label: "ひっかけ：イ・ウ・エがダメな理由"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "イ・ウ・エはなぜ不正解？"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "イは先頭と末尾—— キュー向けなのだ！ ウは一つ前の添字配列—— 連結リストの話、エは途中の添字—— push/popに使えないのだ！"
        emphasis: ["キュー", "連結リスト"]
        se: "./se/correct_bell.mp3"

  - id: "summary_exam"
    chapter:
      label: "まとめ：試験のポイント"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "配列スタックの最小構成は配列とtop—— この二つだけ覚えるのだ！"
        emphasis: ["配列", "top"]
        se: "./se/callout_pop.mp3"

shorts:
  - id: "stack-array-full"
    title: "配列によるスタック実装の最小構成"
    pickScenes: ["question_answer", "why_correct", "wrong_patterns", "summary_exam"]
    overlayCaption: "📚 配列スタック"
    cta: "👇 関連動画は概要欄"
