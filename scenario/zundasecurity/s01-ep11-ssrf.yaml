title: "【登録セキスペ 第11回｜Season2】SSRFを攻略——社内IP・メタデータ取得と入力検証・出荷制御の試験ポイントなのだ！"

# =============================================================================
# 学習スライドとの対応（s01-ep11-ssrf-study-slides.html）
# -----------------------------------------------------------------------------
# スライドの「1/13」などの数字 = 下表の「スライド #」。HTML では <section data-i="N">。
# 台本は scenes の - id: が1ブロック。話の区切り＝基本その id でスライドを切り替える想定。
# -----------------------------------------------------------------------------
# 台本 id (scenes)     | 主に出すスライド # | 内容のあたり
# --------------------|------------------|----------------------------------
# incident            | 2                | プレビュー・①〜④の導入図
# opening             | 1                | 第11回の位置づけ・学習目標・本編の流れ図
# what_is_ssrf        | 1, 3, 5, 6       | 1=冒頭のCSRF違い枠／全体像、3=2つの円、5=CSRF対比、6=URL取り込み例
# attack_flow         | 3, 4             | 3=到達圏、4=4ステップの流れ
# internal_access     | 7                | 3つの棚のうち「社の中」周り（スライド7と重複可）
# cloud_metadata      | 7, 8             | 7=雲の秘密棚、8=合鍵棚（IMDS）の絵
# bypass_concepts     | 9                | 禁止リスト単体の限界・脇道
# defense_input       | 10               | アプリ側（ホワイトリスト等）
# defense_network     | 11               | 通信・出口の多層
# exam_tips           | 12               | 試験のひっかけ
# summary             | 13               | まとめ
# =============================================================================
# 撮影メモ: 本編台本の順は incident（導入）→ opening（挨拶）→ … 。学習スライド1は
# 「全編の地図」、スライド2は incident 専用。台本の先頭に合わせるならスライド2→1の順で出してもよい。
# =============================================================================

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/Movidrill.png"

output:
  fps: 30
  width: 1280
  height: 720

scenes:
  # ============================================================
  # オープニング：インシデント導入（プレビュー機能把持サーバのURL丸コピ）
  # ============================================================
  - id: "incident"   # 学習スライド: 主に #2
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "た、助けてほしいのだ！　社内の『URLを開いてHTMLを取ってくるプレビュー』機能に、雑にURLを入れたら……管理のWikiが丸見えになって外部に抜かれたのだ……！"
        subtitle: "た、助けてほしいのだ！　社内の『URLを開いてHTMLを取ってくるプレビュー』機能に、雑にURLを入れたら……管理のWikiが丸見えになって外部に抜かれたのだ……！"

      - type: dialogue
        character: metan
        face: "困り"
        text: "……典型は、インターネット側のユーザーは直接到達できない地点へ、サーバのHTTPクライアントが代行してしまう——それがSSRF。第10回までのクッキーやCSRFは『ブラウザの便乗』——今度は『サーバ自身の出荷口』の話よ。"
        subtitle: "……典型は、インターネット側のユーザーは直接到達できない地点へ、サーバのHTTPクライアントが代行してしまう——それがSSRF。第10回までのクッキーやCSRFは『ブラウザの便乗』——今度は『サーバ自身の出荷口』の話よ。"

      - type: dialogue
        character: zundamon
        face: "困り"
        text: "『URLを入れる欄』が武器になるのだ……？！　ふつうのリンクじゃ入れない穴に、うちのサーバが自転車便で届けに行くのだ？！"
        subtitle: "『URLを入れる欄』が武器になるのだ……？！　ふつうのリンクじゃ入れない穴に、うちのサーバが自転車便で届けに行くのだ？！"

      - type: dialogue
        character: metan
        face: "通常"
        text: "言い方は荒いけど、骨格はそう。社内向け管理画面、旧来の管理ポート、そしてクラウドのメタデータ——試験では『誰の権限でリクエストが出るか』と『どう塞ぐか』が頻出よ。今日は図解で固定するわ。"


  # ============================================================
  # オープニング：シリーズ紹介
  # ============================================================
  - id: "opening"   # 学習スライド: 主に #1（冒頭の挨拶・全体図のパート）
    lines:
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "みんな、こんにちはなのだ！　ずんだもんなのだ！"
        subtitle: "みんな、こんにちはなのだ！　ずんだもんなのだ！"

      - type: dialogue
        character: metan
        face: "通常"
        text: "四国めたんよ。第11回もSeason2——Webアプリの弱点編。前回はクッキーとセッション管理。今回は、サーバが外部URLの取得などでハマりやすい SSRF よ。"
        subtitle: "四国めたんよ。第11回もSeason2——Webアプリの弱点編。前回はクッキーとセッション管理。今回は、サーバが外部URLの取得などでハマりやすい SSRF よ。"

      - type: dialogue
        character: zundamon
        face: "通常"
        text: "SSRF って、略語のまま出てくると冷や汗なのだ……Server Side Request なにがし？"
        subtitle: "SSRF って、略語のまま出てくると冷や汗なのだ……Server Side Request なにがし？"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "展開は Server-Side Request Forgery。要するに、攻撃者が指定した先へアプリのサーバがHTTP等でアクセスし、その結果を使って悪用する——地図は『ユーザーの到達圏外×サーバの到達圏内』の重なりから描け。"
        subtitle: "展開は Server-Side Request Forgery。要するに、攻撃者が指定した先へアプリのサーバがHTTP等でアクセスし、その結果を使って悪用する——地図は『ユーザーの到達圏外×サーバの到達圏内』の重なりから描け。"


  # ============================================================
  # SSRFの定義と典型パターン
  # ============================================================
  - id: "what_is_ssrf"   # 学習スライド: #1 一部, #3, #5, #6
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "第7回のCSRFと、名前が近くて紛らわしいのだ……。"
        subtitle: "第7回のCSRFと、名前が近くて紛らわしいのだ……。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "整理するわ。CSRFは『被害者のブラウザの認証文脈を悪用』——本編は向きが違う。SSRFは『攻撃者が信頼されるサーバにリクエストを出させ、到達性を乗っ取る』がキーワードよ。"
        subtitle: "整理するわ。CSRFは『被害者のブラウザの認証文脈を悪用』——本編は向きが違う。SSRFは『攻撃者が信頼されるサーバにリクエストを出させ、到達性を乗っ取る』がキーワードよ。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "脆弱になりやすいのは、URLを受け取ってサーバがフェッチする——画像プレビュー、Webhookテスト、インポート、PDF生成、OGP取得、などの機能ね。"
        subtitle: "脆弱になりやすいのは、URLを受け取ってサーバがフェッチする——画像プレビュー、Webhookテスト、インポート、PDF生成、OGP取得、などの機能ね。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "便利機能ほど、サーバが外に出荷する口が増えるのだ……！"
        subtitle: "便利機能ほど、サーバが外に出荷する口が増えるのだ……！"


  # ============================================================
  # 攻撃の流れ（到達圏のすり替え）
  # ============================================================
  - id: "attack_flow"   # 学習スライド: #3（到達圏）, #4（4ステップ）
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "攻撃、ざっくりどう進むのだ？"
        subtitle: "攻撃、ざっくりどう進むのだ？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "① 攻撃者が、本来ブロックされそうなURLを、パラメータ等に入れる。② アプリのサーバがそのURLにアクセス。③ 応答内容や、タイミング、エラーメッセージ等が攻撃者に戻る——ブラインドで情報が薄い版も出題されるわ。"
        subtitle: "① 攻撃者が、本来ブロックされそうなURLを、パラメータ等に入れる。② アプリのサーバがそのURLにアクセス。③ 応答内容や、タイミング、エラーメッセージ等が攻撃者に戻る——ブラインドで情報が薄い版も出題されるわ。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "狙い先の例は、ループバック（127.0.0.1）や、RFC1918の社内、リンクローカル、そしてメタデータエンドポイント——用語の寄せ集めが試験の定番形。"
        subtitle: "狙い先の例は、ループバック（127.0.0.1）や、RFC1918の社内、リンクローカル、そしてメタデータエンドポイント——用語の寄せ集めが試験の定番形。"

      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "地図に『敵の目線』は届かないけど、『うちの配送センターの目線』は届くのだ！"
        subtitle: "地図に『敵の目線』は届かないけど、『うちの配送センターの目線』は届くのだ！"


  # ============================================================
  # 社内スキャン・管理画面
  # ============================================================
  - id: "internal_access"   # 学習スライド: #7（3つの棚・社内）
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "社内IPって、なんでそんなに怖いのだ？"
        subtitle: "社内IPって、なんでそんなに怖いのだ？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "境界防御の内側は、信頼の厚い設計になりがち——パスワード雑、認証弱、管理画面の露出、レガシーHTTP、など。SSRFの『配送員』はそこに置き配できてしまう。"
        subtitle: "境界防御の内側は、信頼の厚い設計になりがち——パスワード雑、認証弱、管理画面の露出、レガシーHTTP、など。SSRFの『配送員』はそこに置き配できてしまう。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "外から触れない倉庫の鍵、サーバ越しにこじ開けられるのだ……！"
        subtitle: "外から触れない倉庫の鍵、サーバ越しにこじ開けられるのだ……！"


  # ============================================================
  # クラウドメタデータ
  # ============================================================
  - id: "cloud_metadata"   # 学習スライド: #7 ③, #8（雲の合鍵・IMDS）
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "メタデータ……なんか高級そうなのだ。"
        subtitle: "メタデータ……なんか高級そうなのだ。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "文脈はシンプル。VMやコンテナ上で、特権的な一時クレデンシャル等にアクセスできてしまうエンドポイントがあり得る。仕様と対策名は教材で押さえて——IMDSの説明が文脈に乗ることが多いわ。"
        subtitle: "文脈はシンプル。VMやコンテナ上で、特権的な一時クレデンシャル等にアクセスできてしまうエンドポイントがあり得る。仕様と対策名は教材で押さえて——IMDSの説明が文脈に乗ることが多いわ。"

      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "倉庫の番号札まで取られたら終わりなのだ……！"
        subtitle: "倉庫の番号札まで取られたら終わりなのだ……！"


  # ============================================================
  # バイパス系の匂い（試験は概念）
  # ============================================================
  - id: "bypass_concepts"   # 学習スライド: #9
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "IPでブロックすれば解決なのだ？"
        subtitle: "IPでブロックすれば解決なのだ？"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "雑にブロックするだけは危険——リダイレクト、DNSの先送り、エンコーディング、代替スキーム等、フィルタ回避の匂いを文献で掴まされるわ。実装戦は深いが、試験はまず『単純黒リスト不十分』の理解を取りに来る。"
        subtitle: "雑にブロックするだけは危険——リダイレクト、DNSの先送り、エンコーディング、代替スキーム等、フィルタ回避の匂いを文献で掴まされるわ。実装戦は深いが、試験はまず『単純黒リスト不十分』の理解を取りに来る。"

      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "黒リスト地獄、また地獄なのだ……！"
        subtitle: "黒リスト地獄、また地獄なのだ……！"


  # ============================================================
  # 対策：入力・設計
  # ============================================================
  - id: "defense_input"   # 学習スライド: #10
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "対策、どこから手を付けるのだ？"
        subtitle: "対策、どこから手を付けるのだ？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "基本は 許可リスト——取得してよい先の限定、スキーム制限（https限定等）、プライベート帯域の拒否、リダイレクトの扱い。そして『ユーザ入力URLを鵜呑みにフェッチ』の設計そのものを疑うの。"
        subtitle: "基本は 許可リスト——取得してよい先の限定、スキーム制限（https限定等）、プライベート帯域の拒否、リダイレクトの扱い。そして『ユーザ入力URLを鵜呑みにフェッチ』の設計そのものを疑うの。"

      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "『どこに届けてもいい外販』をやめて、『正規の卸先だけに届ける』のだ！"
        subtitle: "『どこに届けてもいい外販』をやめて、『正規の卸先だけに届ける』のだ！"


  # ============================================================
  # 対策：ネットワーク・出荷
  # ============================================================
  - id: "defense_network"   # 学習スライド: #11
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "アプリだけ直しても、まだ抜け道あるのだ？"
        subtitle: "アプリだけ直しても、まだ抜け道あるのだ？"

      - type: dialogue
        character: metan
        face: "通常"
        text: "多層で見る。例えば エグレス制御（外向きの通信制限）、分離（フロントとフェッチャの分離）、WAF/プロキシでのアウトバウンド制御——試験では『どの層の対策か』を当てに来ることもあるわ。"
        subtitle: "多層で見る。例えば エグレス制御（外向きの通信制限）、分離（フロントとフェッチャの分離）、WAF/プロキシでのアウトバウンド制御——試験では『どの層の対策か』を当てに来ることもあるわ。"

      - type: dialogue
        character: metan
        face: "通常"
        text: "雲側は、メタデータ取得の要らない権限、Hop制限、そして事後検知もセット——『アプリのバリデ1本』が万能、とは言い切れない、が試験の型。"
        subtitle: "雲側は、メタデータ取得の要らない権限、Hop制限、そして事後検知もセット——『アプリのバリデ1本』が万能、とは言い切れない、が試験の型。"


  # ============================================================
  # 試験あるある
  # ============================================================
  - id: "exam_tips"   # 学習スライド: #12
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "ひっかけをまとめてほしいのだ！"
        subtitle: "ひっかけをまとめてほしいのだ！"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "定番その1——SSRFを『SQLインジェクション』と取り違えない。入口は違うわ。"
        subtitle: "定番その1——SSRFを『SQLインジェクション』と取り違えない。入口は違うわ。"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "定番その2——CSRF対策（トークン等）を貼っても、サーバ出荷の穴は基本塞がれない。混ぜるな危険。"
        subtitle: "定番その2——CSRF対策（トークン等）を貼っても、サーバ出荷の穴は基本塞がれない。混ぜるな危険。"

      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "定番その3——『プライベートIPを弾く』だけでは完結しにくい、と文献のスタンスを覚えておくのだ！"
        subtitle: "定番その3——『プライベートIPを弾く』だけでは完結しにくい、と文献のスタンスを覚えておくのだ！"


  # ============================================================
  # まとめ・次回予告
  # ============================================================
  - id: "summary"   # 学習スライド: #13
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "今回のまとめよ。SSRFは、攻撃者の指定先へアプリのサーバがリクエストし、到達圏外の内製資産やメタデータに触れうる。対策の骨格はアプリの入力制御とスキーム制限、許可リスト、リダイレクト扱い。ネットワークのエグレス分離と、クラウド側の設計を多層で考えるの。"
        subtitle: "今回のまとめよ。SSRFは、攻撃者の指定先へアプリのサーバがリクエストし、到達圏外の内製資産やメタデータに触れうる。対策の骨格はアプリの入力制御とスキーム制限、許可リスト、リダイレクト扱い。ネットワークのエグレス分離と、クラウド側の設計を多層で考えるの。"

      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "『ブラウザ便乗』の次は『サーバ出荷便乗』なのだ……！　第10回のセッションと、攻撃の出発点が違うのを覚えたのだ！"
        subtitle: "『ブラウザ便乗』の次は『サーバ出荷便乗』なのだ……！　第10回のセッションと、攻撃の出発点が違うのを覚えたのだ！"

      - type: dialogue
        character: metan
        face: "笑い"
        text: "図解スライドで『誰のリクエストか』の矢印を何度も引き直しなさい。曖昧なまま午後の長文に突っ込むと、選択肢の迷子になるわよ。"
        subtitle: "図解スライドで『誰のリクエストか』の矢印を何度も引き直しなさい。曖昧なまま午後の長文に突っ込むと、選択肢の迷子になるわよ。"

      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "チャンネル登録と高評価もよろしくなのだ！　一緒にセキスペ合格を目指すのだ！"
        subtitle: "チャンネル登録と高評価もよろしくなのだ！　一緒にセキスペ合格を目指すのだ！"

      - type: dialogue
        character: metan
        face: "通常"
        text: "感想や次のテーマのリクエストはコメント欄へ。用語帳に『到達圏のすり替え』一言で書けるか、が実力のバロメータよ。"
        subtitle: "感想や次のテーマのリクエストはコメント欄へ。用語帳に『到達圏のすり替え』一言で書けるか、が実力のバロメータよ。"

      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "また見てほしいのだ！　バイバイなのだ！"
        subtitle: "また見てほしいのだ！　バイバイなのだ！"
