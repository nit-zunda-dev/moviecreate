title: "【登録セキスペ 第23回｜Season4】MACとSAML—メッセージ認証とフェデレーションで「誰が送ったか」を保証するのだ！"

# =============================================================================
# Season 4 第3回：MAC（メッセージ認証コード）と SAML（フェデレーション認証）
# - 詳細図: s01-ep23-mac-saml-study-slides.html ← global.slidesHtml
# - 要約版 Reveal: s01-ep23-mac-saml-reveal-slides.html
# -----------------------------------------------------------------------------
# 台本 id (scenes)         | slideIndex | study スライド
# -------------------------|------------|------------------
# incident                 | 0          | 導入（SSO応答の改ざん疑い）
# opening                  | 1          | 第23回・ゴール
# what_is_mac              | 2          | MACの定義（鍵付きタグ）
# mac_variants             | 3          | HMAC/CMAC/GMAC
# mac_vs_signature         | 4          | MAC vs デジタル署名
# federation_overview      | 5          | フェデレーション認証の全体像
# saml_actors              | 6          | SP/IdP/User Agent
# saml_flow                | 7          | SP-Initiated SSO のフロー
# saml_assertion_traps     | 8          | アサーション署名と攻撃
# exam_traps               | 9          | 試験の誤答
# summary                  | 10         | まとめ
# =============================================================================

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/background.png"
  slidesHtml: "./s01-ep23-mac-saml-study-slides.html"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12
  endScreen:
    enabled: true
    durationMs: 7000
    subscribeText: "チャンネル登録で次回も見逃さない！"
    nextEpisode:
      title: "次回：FIDOと多要素認証—パスワードレスの世界へ"

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 5000
  text: "SAMLレスポンスの署名検証を飛ばしてたのだ……"
  emphasis:
    - "SAML"
    - "署名検証を飛ばしてた"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.18
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "incident"
    slideIndex: 0
    chapter:
      label: "導入：SSOの応答が改ざんされた疑い"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "シングルサインオンで管理画面に入れちゃったのだ……。社内SPで、誰でも管理者になれちゃう状態だったのだ！"
        se: "./se/warn_buzz.mp3"
      - type: dialogue
        character: metan
        face: "通常"
        text: "それはSAMLアサーションの署名検証を実装し忘れたパターンね。第22回のハッシュとHMACを土台に、今日は『誰が送ったか』を保証するMACとSAMLを整理するわ。"
        se: "./se/emphasis_chime.mp3"

  - id: "opening"
    slideIndex: 1
    chapter:
      label: "第23回の地図：MACとSAML"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "ゴールは三つ。MACの定義と種類、MACとデジタル署名の違い、SAMLの三者モデルとアサーション検証。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "ハッシュの次は『送信者認証』なのだ！ Season4、暗号と認証の続きなのだ！"
        se: "./se/callout_pop.mp3"

  - id: "what_is_mac"
    slideIndex: 2
    chapter:
      label: "MACの定義：共有鍵で作る短いタグ"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "MACって……前回のHMACと何が違うのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "MACは『共有秘密鍵Kとメッセージから固定長のタグを作る』という広い概念。受信側も同じKでタグを再計算して照合するの。一致すれば改ざんなし、かつ送り手はKを知る正規参加者。"
        se: "./se/emphasis_chime.mp3"

  - id: "mac_variants"
    slideIndex: 3
    chapter:
      label: "MACの種類：HMAC・CMAC・GMAC"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "HMACはハッシュ関数ベース。CMACはAESなどのブロック暗号ベース。GMACはGCMモードの認証部分。いずれも『鍵付きで短いタグを作る』点は同じよ。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "HMACはMACの仲間の一つで、ハッシュを使う方式なのだ！ 暗号モードのGCMにも認証が入ってるなんて知らなかったのだ！"
        se: "./se/callout_pop.mp3"

  - id: "mac_vs_signature"
    slideIndex: 4
    chapter:
      label: "MAC vs デジタル署名"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "MACとデジタル署名って、どっちも『改ざん検知＋送信者の証明』じゃないのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "決定的に違うのは『鍵』。MACは共有秘密鍵で、両者が同じ鍵を持つ。だから第三者には証明できない。署名は秘密鍵と公開鍵のペアで、公開鍵を持つ誰でも検証でき、否認防止が成り立つの。"
        se: "./se/warn_buzz.mp3"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "否認防止が要るなら署名、二者間の高速な認証ならMAC……用途で使い分けるのだ！"
        emphasis: ["否認防止", "署名", "MAC"]
        se: "./se/emphasis_chime.mp3"

  - id: "federation_overview"
    slideIndex: 5
    chapter:
      label: "フェデレーション認証：他人のIDを信頼する仕組み"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "フェデレーション認証は、ユーザーが信頼できるIdPで一度ログインすれば、複数のサービスに自動的にサインインできる仕組みよ。代表規格がSAMLとOpenID Connect。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "1回ログインで全部入れる便利なやつなのだ……でも、その代わり『誰がそう言ったか』の証明がめちゃくちゃ重要になるのだ！"
        se: "./se/callout_pop.mp3"

  - id: "saml_actors"
    slideIndex: 6
    chapter:
      label: "SAMLの三者：SP・IdP・User Agent"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "SAMLには三者が登場。SPはサービス提供者、IdPはID基盤、User Agentはユーザーのブラウザよ。ブラウザがSPとIdPの間でメッセージを運ぶ『仲介役』なのが特徴。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "SPとIdPは直接通信しないこともあるのだ！ ブラウザがリダイレクトでアサーションを運ぶのだ！"
        se: "./se/emphasis_chime.mp3"

  - id: "saml_flow"
    slideIndex: 7
    chapter:
      label: "SP-Initiated SSO のフロー"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "実際の流れを教えてほしいのだ！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "①ユーザーがSPにアクセス。②SPがAuthnRequestを作りブラウザ経由でIdPへ。③IdPがユーザーを認証。④IdPが署名付きSAMLアサーションを発行。⑤ブラウザがSPに送り、SPは署名と宛先と有効期限を検証してログインを確立。"
        se: "./se/callout_pop.mp3"

  - id: "saml_assertion_traps"
    slideIndex: 8
    chapter:
      label: "アサーション署名と攻撃"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "SAMLで一番危険なのは何なのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "アサーションの署名検証漏れと、XML署名ラッピング攻撃。署名された要素と参照する要素がズレていると、攻撃者が中身をすり替えられるの。さらにReplay攻撃を防ぐためNotOnOrAfterとAudienceを必ず検証するわ。"
        se: "./se/warn_buzz.mp3"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "署名は『あるか』だけじゃなく『何に署名されているか』まで見ないとダメなのだ！"
        emphasis: ["何に署名されているか"]
        se: "./se/emphasis_chime.mp3"

  - id: "exam_traps"
    slideIndex: 9
    chapter:
      label: "試験で狙われる誤答"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "MAC＝公開鍵、HMACはMACの外の別物、SAMLはJSON——全部ひっかけなのだ！"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "その通り。MACは共有鍵、HMACはMACの一実装、SAMLはXML。そして『否認防止が要るかどうか』が署名とMACの分かれ目よ。"
        se: "./se/callout_pop.mp3"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "鍵の種類・否認防止・検証範囲——この3点で選ぶのだ！"
        emphasis: ["鍵の種類", "否認防止", "検証範囲"]
        se: "./se/emphasis_chime.mp3"

  - id: "summary"
    slideIndex: 10
    chapter:
      label: "まとめ：誰が送ったかをコードで保証"
    bgm: "./bgm/outro_warm.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "まとめよ。MACは共有鍵による短いタグ、HMACはその一実装。署名との違いは否認防止。SAMLはSP・IdP・ブラウザの三者で、アサーションの署名と宛先と期限を検証する。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "次回はFIDOと多要素認証——パスワードレスの世界よ。"
        se: "./se/correct_bell.mp3"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "導入のSSOバグ、署名検証とAudienceを実装し直すのだ！ チャンネル登録と高評価、よろしくなのだ！"
        se: "./se/callout_pop.mp3"

shorts:
  - id: "mac-vs-signature"
    title: "MACと署名の違いを30秒で"
    pickLines:
      - { sceneId: "what_is_mac", from: 0, to: 1 }
      - { sceneId: "mac_vs_signature", from: 0, to: 2 }
    overlayCaption: "⚡ MAC vs 署名"
    cta: "👇 本編で全体像を確認"

  - id: "saml-traps"
    title: "SAMLで狙われる弱点"
    pickScenes: ["saml_assertion_traps", "summary"]
    overlayCaption: "🚨 SAML署名検証"
    cta: "本編で完全マスター（概要欄）"

