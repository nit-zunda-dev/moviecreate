title: "【登録セキスペ 第22回｜Season4】ハッシュ関数—データの指紋で改ざんを検知するのだ！"

# =============================================================================
# Season 4 第2回：ハッシュ関数
# - 詳細図: s01-ep22-hash-study-slides.html ← global.slidesHtml
# - 要約版 Reveal: s01-ep22-hash-reveal-slides.html
# -----------------------------------------------------------------------------
# 台本 id (scenes)       | slideIndex | study スライド
# -----------------------|------------|------------------
# incident               | 0          | 導入（チェックサム不一致）
# opening                | 1          | 第22回・ゴール
# what_is_hash           | 2          | 定義 H(M)
# properties             | 3          | 一方向性・衝突耐性・アバランチ
# integrity_flow         | 4          | 完全性の確認フロー
# link_signature         | 5          | 署名とハッシュ（第21回接続）
# password_storage       | 6          | ソルト＋bcrypt
# algorithms             | 7          | MD5/SHA-1/SHA-256/SHA-3
# hmac                   | 8          | 鍵付きハッシュ
# exam_traps             | 9          | 試験の誤答
# summary                | 10         | まとめ
# =============================================================================

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/background.png"
  slidesHtml: "./s01-ep22-hash-study-slides.html"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12
  endScreen:
    enabled: true
    durationMs: 7000
    subscribeText: "チャンネル登録で次回も見逃さない！"
    nextEpisode:
      title: "次回：MACとSAML—メッセージ認証とフェデレーション認証"

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 5000
  text: "インストーラのハッシュが公式と違うのだ"
  emphasis:
    - "ハッシュ"
    - "公式と違う"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.18
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "incident"
    slideIndex: 0
    chapter:
      label: "導入：チェックサム不一致"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "公式サイトの SHA-256 を計算したら、ダウンロードした setup.exe と全然違うのだ！ 改ざんされたのだ……？"
        se: "./se/warn_buzz.mp3"
      - type: dialogue
        character: metan
        face: "通常"
        text: "それは完全性の話よ。第21回で署名の土台に出たハッシュ——今日はその正体から、パスワード保存と HMAC まで一気にいくわ。"
        se: "./se/emphasis_chime.mp3"

  - id: "opening"
    slideIndex: 1
    chapter:
      label: "第22回の地図：ハッシュで押さえる論点"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "今日のゴールは三つ。ハッシュの定義と性質、完全性確認と署名との関係、実務でのアルゴリズム選びと HMAC。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "PKI の次は『指紋』なのだ！ Season4、暗号と認証の続きなのだ！"
        se: "./se/callout_pop.mp3"

  - id: "what_is_hash"
    slideIndex: 2
    chapter:
      label: "定義：H(M) はデータの指紋"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "ハッシュって、データを短く圧縮して元に戻すやつなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "違うわ。H(M) は任意長の入力から固定長のダイジェストを出す一方向関数。同じ M なら同じ値、でも M から復元はしないの。"
        se: "./se/emphasis_chime.mp3"

  - id: "properties"
    slideIndex: 3
    chapter:
      label: "性質：試験の三柱"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "一方向性——H(M) から M は実質戻せない。衝突耐性——別の M′ で同じハッシュを作りにくい。アバランチ——1ビット変えると出力が激変。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "ちょっと変えただけで指紋がバラバラになるのだ！ 改ざん検知に効くのだ！"
        se: "./se/callout_pop.mp3"

  - id: "integrity_flow"
    slideIndex: 4
    chapter:
      label: "完全性：公開ハッシュと照合"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "公式サイトのハッシュと、手元で sha256sum した結果が一致すれば、途中でいじられてない可能性が高いのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "その通り。HTTPS だけでは配布ファイルの正しさまでは保証しない。信頼できる経路でハッシュ値を取って照合するのが定番よ。不一致なら再取得か配布元確認。"
        se: "./se/warn_buzz.mp3"

  - id: "link_signature"
    slideIndex: 5
    chapter:
      label: "第21回との接続：署名は H(M) に印"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "デジタル署名は、大きなデータ M をそのまま秘密鍵で触らない。まず H(M) を計算し、そのハッシュに秘密鍵で署名するの。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "ハッシュ＝改ざん検知、署名＝誰が書いたかの印なのだ！ 第21回とつながったのだ！"
        se: "./se/emphasis_chime.mp3"

  - id: "password_storage"
    slideIndex: 6
    chapter:
      label: "パスワード：ソルト＋遅い KDF"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "パスワードもハッシュにすれば安全なのだ？ MD5 で保存していいのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "平文は論外。MD5 や SHA-256 単体は速すぎて総当たり向き。ランダムなソルトを足して bcrypt や Argon2 など、意図的に遅い専用 KDF を使うのよ。"
        se: "./se/callout_pop.mp3"

  - id: "algorithms"
    slideIndex: 7
    chapter:
      label: "アルゴリズム：SHA-256 が現役"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "MD5 と SHA-1 は衝突攻撃が現実的で新規用途は非推奨。実務と試験の標準は SHA-256。SHA-3 は別設計で、選択肢として知っておけば十分。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "レガシーに MD5 が残ってるのを見たことがあるのだ…… 新規では使わないのだ！"
        se: "./se/warn_buzz.mp3"

  - id: "hmac"
    slideIndex: 8
    chapter:
      label: "HMAC：鍵付きハッシュ"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "ハッシュだけだと、誰が送ったか分からないのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そう。HMAC(K, M) は共有秘密鍵 K と組み合わせる。受信側も同じ K で再計算し、一致すれば改ざんなし。API 署名の基礎で、次回 MAC と整理するわ。"
        se: "./se/emphasis_chime.mp3"

  - id: "exam_traps"
    slideIndex: 9
    chapter:
      label: "試験で狙われる誤答"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "ハッシュ＝暗号化、MD5 でパスワード、ハッシュだけで署名——全部ひっかけなのだ！"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "その通り。復号できるか、鍵が要るか、誰の印か——この三つで選びなさい。"
        se: "./se/callout_pop.mp3"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "一方向·用途·アルゴリズム。この3点で選ぶのだ！"
        emphasis: ["一方向", "用途", "アルゴリズム"]
        se: "./se/emphasis_chime.mp3"

  - id: "summary"
    slideIndex: 10
    chapter:
      label: "まとめ：ハッシュで完全性を守る"
    bgm: "./bgm/outro_warm.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "まとめよ。H(M) の定義と三性質、ファイル完全性と署名、ソルト付き KDF、SHA-256 と HMAC。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "次回は MAC と SAML——メッセージ認証とフェデレーション認証よ。"
        se: "./se/correct_bell.mp3"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "導入のインストーラ、もう一度 sha256sum するのだ！ チャンネル登録と高評価、よろしくなのだ！"
        se: "./se/callout_pop.mp3"

shorts:
  - id: "hash-basics"
    title: "ハッシュって何？30秒で理解"
    pickLines:
      - { sceneId: "opening", from: 0, to: 1 }
      - { sceneId: "what_is_hash", from: 0, to: 1 }
    overlayCaption: "⚡ ハッシュ基礎"
    cta: "👇 本編で全体像を確認"

  - id: "hash-traps"
    title: "ハッシュの誤答4選"
    pickScenes: ["exam_traps", "summary"]
    overlayCaption: "🚨 試験ひっかけ"
    cta: "本編で完全マスター（概要欄）"

