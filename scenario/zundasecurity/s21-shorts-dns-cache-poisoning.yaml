title: "【登録セキスペ】DNSキャッシュポイズニング対策の確認問題"

# 「DNSキャッシュポイズニング対策の確認問題」Shorts 専用
# - generate-shorts --ids dns-cache-poisoning-full で縦長 MP4 を出力
# - 背景: 黒板のみ（scene.background は指定しない）

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.3
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.3
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.25
    postPhonemeLength: 0.05
  defaultBackground: "./image/background/background.png"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 3500
  text: "DNSキャッシュポイズニング対策—— トランザクションIDのランダム化が試験頻出なのだ！"
  emphasis:
    - "キャッシュポイズニング"
    - "トランザクションID"
    - "ランダム化"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.15
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "question_answer"
    chapter:
      label: "確認問題：正解はどれ？"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "確認問題——DNSキャッシュポイズニング攻撃に対する有効な対策はどれ？ アからエの四択よ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "正解はイ！ DNSヘッダ内のIDを固定せずランダム化するのだ！"
        emphasis: ["イ", "ランダム化"]
        se: "./se/correct_bell.mp3"

  - id: "why_correct"
    chapter:
      label: "理由：なぜイが正解か"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "なぜイが正解？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "攻撃者は正当な応答より先に偽応答を送り、トランザクションIDと送信元ポート番号の両方を当てる必要があるのだ！ IDをランダム化すると推測困難で、攻撃成功率が大きく下がるのだ！"
        emphasis: ["トランザクションID", "送信元ポート"]
        se: "./se/correct_bell.mp3"

  - id: "wrong_patterns"
    chapter:
      label: "ひっかけ：ア・ウ・エがダメな理由"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "ア・ウ・エはなぜ不正解？"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "アはマルウェアのリアルタイム隔離—— 直接の対策ではない、ウは送信元ポート53固定—— 推測しやすく危険、エは宛先ポート53のみ応答—— 通常のDNS動作条件で対策の本質ではないのだ！"
        emphasis: ["マルウェア隔離", "53固定", "対策の本質"]
        se: "./se/correct_bell.mp3"

  - id: "summary_exam"
    chapter:
      label: "まとめ：試験のポイント"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "キャッシュポイズニング対策の肝はクエリ時の値を推測困難にすること—— トランザクションIDと送信元ポートのランダム化で覚えるのだ！"
        emphasis: ["推測困難", "ランダム化"]
        se: "./se/callout_pop.mp3"

shorts:
  - id: "dns-cache-poisoning-full"
    title: "DNSキャッシュポイズニング対策の確認問題"
    pickScenes:
      - "question_answer"
      - "why_correct"
      - "wrong_patterns"
      - "summary_exam"
    overlayCaption: "🌐 DNSキャッシュポイズニング"
    cta: "👇 関連動画は概要欄"
