    cta: "👇 本編で全体像を確認"

  - id: "fido-passkey"
    title: "FIDOとパスキーの要点"
    pickScenes: ["webauthn_flow", "summary"]
    overlayCaption: "🔐 パスワードレス"
    cta: "本編で完全マスター（概要欄）"

