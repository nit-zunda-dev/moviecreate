  hookKeywords:
    - "VPN"
    - "IPsec"
    - "SSL-VPN"
    - "サイト間VPN"
    - "リモートアクセス"
  hashtags:
    - "#情報処理安全確保支援士"
    - "#セキスペ"
    - "#VPN"
    - "#IPsec"
    - "#ずんだもん"
  relatedEpisodes:
    - { ep: 17, title: "ファイアウォールの正体" }
    - { ep: 19, title: "VLANで社内を分離" }
  titleHints:
    - { style: "shock" }
    - { style: "howto" }
    - { style: "exam" }
