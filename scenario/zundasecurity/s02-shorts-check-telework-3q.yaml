title: "【登録セキスペ】Check! Q1–Q3：テレワーク基礎"

# 教科書 Check!（テレワーク）Shorts 専用
# - 本編なし。generate-shorts のみで縦長 MP4 を出力

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/background.png"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 4000
  text: "テレワーク＝在宅勤務だけ？ 試験の定義、間違えやすいのだ！"
  emphasis:
    - "テレワーク"
    - "在宅勤務"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.15
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "check_q1_definition"
    chapter:
      label: "Check! Q1：テレワークとは何か"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Check Q1——テレワークとは何か。定義を述べなさい。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "ICT、情報通信技術を使って、オフィスなど特定の勤務地にとらわれずに業務を行う、柔軟な働き方なのだ！ 在宅だけじゃなく、サテライトや移動中も含むのだ！"
        emphasis: ["ICT", "特定の勤務地"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解。キーワードはICTと、勤務地に縛られないこと。在宅勤務はテレワークの一形態にすぎないわ。"
        se: "./se/correct_bell.mp3"

  - id: "check_q2_considerations"
    chapter:
      label: "Check! Q2：導入時の主な検討事項"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Check Q2——テレワーク導入における主な検討事項は。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "情報セキュリティ、VPNや端末管理、通信インフラ、労務管理、就業規則、教育訓練、BCP——導入前に全部決めないと事故るのだ！"
        emphasis: ["情報セキュリティ", "労務管理"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "その通り。特に試験では、リモートアクセスの認証・暗号化と、勤務時間・健康管理のルール整備がセットで問われるわ。"
        se: "./se/correct_bell.mp3"

  - id: "check_q3_methods"
    chapter:
      label: "Check! Q3：主な実施方式と特徴"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Check Q3——テレワークの主な実施方式と特徴を述べなさい。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "在宅型は自宅で通勤削減、サテライト型は近くの拠点で対面も可、モバイル型は外出先で自由度が高い——でもセキュリティリスクも最大なのだ！"
        emphasis: ["在宅型", "サテライト型", "モバイル型"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解。三方式を場所とメリット・デメリットで整理して。モバイル型は端末紛失・盗難対策が必須よ。"
        se: "./se/correct_bell.mp3"

  - id: "trap_telework_types"
    chapter:
      label: "ひっかけ整理：三方式の比較"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "在宅型＝自宅・孤立化に注意。サテライト型＝通勤短縮＋対面協働。モバイル型＝柔軟だが端末管理と情報漏洩対策が最優先。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "テレワーク＝在宅だけ、は即アウト——三方式、場所とリスクで覚えるのだ！"
        emphasis: ["在宅だけ", "三方式"]
        se: "./se/callout_pop.mp3"

shorts:
  - id: "telework-q1"
    title: "Check! Q1：テレワークの定義"
    pickScenes: ["check_q1_definition"]
    overlayCaption: "📝 Check! Q1"
    cta: "👇 Q2・Q3もショートで"

  - id: "telework-q2"
    title: "Check! Q2：テレワーク導入の検討事項"
    pickScenes: ["check_q2_considerations"]
    overlayCaption: "📝 Check! Q2"
    cta: "👇 Q1・Q3もショートで"

  - id: "telework-q3"
    title: "Check! Q3：テレワーク三方式"
    pickScenes: ["check_q3_methods", "trap_telework_types"]
    overlayCaption: "📝 Check! Q3"
    cta: "👇 Q1・Q2もショートで"

  - id: "telework-all"
    title: "Check! Q1–Q3：テレワークまとめ"
    pickScenes:
      - "check_q1_definition"
      - "check_q2_considerations"
      - "check_q3_methods"
      - "trap_telework_types"
    overlayCaption: "📝 Check! テレワーク"
    cta: "👇 本編は概要欄から"
