title: "【登録セキスペ 第13回｜Season2】ディレクトリトラバーサルを攻略——パス結合の欠陥と正規化・間接参照の試験ポイントなのだ！"

# =============================================================================
# 学習スライドとの対応（s01-ep13-path-traversal-study-slides.html）
# -----------------------------------------------------------------------------
# スライドの「1/13」など = 下表の「スライド #」。HTML では <section data-i="N">。
# 台本は scenes の - id: が1ブロック。話の区切り＝基本その id でスライドを切り替える想定。
# -----------------------------------------------------------------------------
# 台本 id (scenes)       | 主に出すスライド # | 内容のあたり
# ----------------------|------------------|----------------------------------
# incident               | 2                | 導入：download?name= と OS上のパス
# opening                | 1                | 第13回の位置づけ・学習目標・本編の流れ図
# concept_root           | 3                | URL と Webルート／実パス
# dotdot                 | 4                | ../ と正規化後の検証
# encoding               | 5                | %2e%2e%2f 等のすり抜け
# surfaces               | 6                | ダウンロード・include・画像 等
# attack_flow            | 7                | 攻撃4段階
# os_diff                | 8                | Unix と Windows
# defense_canonical      | 9                | 正規化・ベース配下の検証
# defense_indirect       | 10               | doc_id など間接参照
# compare_lfi            | 11               | LFI・RFI・本件の整理
# exam_tips              | 12               | 試験のひっかけ（WAF・SSRF・第12回）
# summary                | 13               | まとめ
# =============================================================================
# 撮影メモ: 本編台本の順は incident（導入）→ opening（挨拶）→ … 。
# 学習スライド1は「全編の地図」、スライド2は incident。先に incident を出してから
# スライド1に戻す運用でもよい。
# 動画生成（generate-video）: global.slidesHtml → Reveal キャプチャと slideIndex の対応
# =============================================================================

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/Movidrill.png"
  videoFrame: "./docs/generate_scene_illustrations/hikei.png"
  slidesHtml: "./s01-ep13-path-traversal-reveal-slides.html"

output:
  fps: 30
  width: 1280
  height: 720

scenes:
  # ============================================================
  # インシデント導入（資料ダウンロードのパラメータ）
  # ============================================================
  - id: "incident"
    slideIndex: 0
    lines:
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "たすけてほしいのだ！　社内マニュアルの『ファイル名』をURLで指定してダウンロードする機能があって、試しに変な文字を入れたら……サーバの設定っぽい中身が返ってきたのだ……！"
        subtitle: "たすけてほしいのだ！　社内マニュアルの『ファイル名』をURLで指定してダウンロードする機能があって、試しに変な文字を入れたら……サーバの設定っぽい中身が返ってきたのだ……！"
      - type: dialogue
        character: metan
        face: "困り"
        text: "典型的には、ユーザー入力をそのままファイルパスに連結している、という欠陥。ドットドットスラッシュで親ディレクトリへ登り、公開ディレクトリの外にあるファイルを読めてしまう——ディレクトリトラバーサル、パストラバーサルと呼ぶわ。"
        subtitle: "典型的には、ユーザー入力をそのままファイルパスに連結している、という欠陥。ドットドットスラッシュで親ディレクトリへ登り、公開ディレクトリの外にあるファイルを読めてしまう——ディレクトリトラバーサル、パストラバーサルと呼ぶわ。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "前回のオープンリダイレクトは、次のURLをブラウザに飛ばす話だったのに、今回は違うのだ？"
        subtitle: "前回のオープンリダイレクトは、次のURLをブラウザに飛ばす話だったのに、今回は違うのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "違う。第12回はHTTPの Location で利用者のブラウザが移動する話。今回は、サーバがローカルファイルを開くときのパスが壊れて、秘密ファイルを読まれる話。矢印の主役が『ブラウザの遷移』か『サーバ上のファイルオープン』か、で切るの。"
        subtitle: "違う。第12回はHTTPの Location で利用者のブラウザが移動する話。今回は、サーバがローカルファイルを開くときのパスが壊れて、秘密ファイルを読まれる話。矢印の主役が『ブラウザの遷移』か『サーバ上のファイルオープン』か、で切るの。"

  # ============================================================
  # オープニング：第13回の位置づけ
  # ============================================================
  - id: "opening"
    slideIndex: 1
    lines:
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "では第13回の本題なのだ。今回は、フォルダの外まで読みにいっちゃう欠陥を、はっきりしたいのだ。"
        subtitle: "では第13回の本題なのだ。今回は、フォルダの外まで読みにいっちゃう欠陥を、はっきりしたいのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "今回扱うのはディレクトリトラバーサル。Webサーバ上で、本来見せてはいないパス上のファイルが、パラメータ経由で読めてしまうタイプの弱点よ。試験では、パス結合、正規化、LFI との違い、がセットで出やすいわ。"
        subtitle: "今回扱うのはディレクトリトラバーサル。Webサーバ上で、本来見せてはいないパス上のファイルが、パラメータ経由で読めてしまうタイプの弱点よ。試験では、パス結合、正規化、LFI との違い、がセットで出やすいわ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "スライドの流れ図、長いのだ……でも最初に地図があると安心なのだ。"
        subtitle: "スライドの流れ図、長いのだ……でも最初に地図があると安心なのだ。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "図ではいつも、誰の入力が、どこでパスに混ざり、OS がどの実パスを開くか、の三段を追う。それが頭に入れば長文も怖くないわ。"
        subtitle: "図ではいつも、誰の入力が、どこでパスに混ざり、OS がどの実パスを開くか、の三段を追う。それが頭に入れば長文も怖くないわ。"

  # ============================================================
  # Webルートと実パス
  # ============================================================
  - id: "concept_root"
    slideIndex: 2
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "ブラウザから見える『/static/manual.pdf』と、サーバの中の長いパスは、同じファイルなのだ？"
        subtitle: "ブラウザから見える『/static/manual.pdf』と、サーバの中の長いパスは、同じファイルなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "対応する。DocumentRoot などの公開ディレクトリを起点に、URL のパスがファイルパスにマップされる。問題は、その変換の途中にユーザー由来の文字列がそのまま混ざると、公開範囲をすり抜けられること。"
        subtitle: "対応する。DocumentRoot などの公開ディレクトリを起点に、URL のパスがファイルパスにマップされる。問題は、その変換の途中にユーザー由来の文字列がそのまま混ざると、公開範囲をすり抜けられること。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "見た目はファイル名だけのつもりが、実はパス全体が入れ替わる余地があるのだ……。"
        subtitle: "見た目はファイル名だけのつもりが、実はパス全体が入れ替わる余地があるのだ……。"

  # ============================================================
  # ../ の仕組み
  # ============================================================
  - id: "dotdot"
    slideIndex: 3
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "親ディレクトリへ移動する相対パス成分が二つ並ぶと、一つ上に登る。公開フォルダの中から始めても、繰り返しで外向きに出られる。"
        subtitle: "親ディレクトリへ移動する相対パス成分が二つ並ぶと、一つ上に登る。公開フォルダの中から始めても、繰り返しで外向きに出られる。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "検査は『ドットが含まれるからNG』でよくないのだ？"
        subtitle: "検査は『ドットが含まれるからNG』でよくないのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "単純な禁止リストは抜け道が付きやすい。定番の型は、結合したあとに実パスへ正規化して、許可したベースディレクトリの子になっているかを見る、よ。"
        subtitle: "単純な禁止リストは抜け道が付きやすい。定番の型は、結合したあとに実パスへ正規化して、許可したベースディレクトリの子になっているかを見る、よ。"

  # ============================================================
  # エンコードすり抜け
  # ============================================================
  - id: "encoding"
    slideIndex: 4
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "パーセントエンコードされた『ドットドットスラッシュ』って、普通の ../ と同じなのだ？"
        subtitle: "パーセントエンコードされた『ドットドットスラッシュ』って、普通の ../ と同じなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "デコードの結果として同じになることがある。チェックとデコードの順序がずれると、フィルタをかわされる。だから試験では『禁止文字を削るだけ』より『正規化後に許可』が正しい側になりやすいわ。"
        subtitle: "デコードの結果として同じになることがある。チェックとデコードの順序がずれると、フィルタをかわされる。だから試験では『禁止文字を削るだけ』より『正規化後に許可』が正しい側になりやすいわ。"

  # ============================================================
  # 発生箇所
  # ============================================================
  - id: "surfaces"
    slideIndex: 5
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "ダウンロード機能のファイル名パラメータ、テンプレートの include に渡す路、画像や添付のパス——共通点は、ユーザー入力がファイルパスに近い形で合成されること。"
        subtitle: "ダウンロード機能のファイル名パラメータ、テンプレートの include に渡す路、画像や添付のパス——共通点は、ユーザー入力がファイルパスに近い形で合成されること。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "ZIP を解凍するときのズレも近い話なのだ？"
        subtitle: "ZIP を解凍するときのズレも近い話なのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ZIPスリップは別の名前で試験にも出るが、『パスの外向き脱出』という気持ちは近い。今日はまず Web のパラメータ結合を押さえる。"
        subtitle: "ZIPスリップは別の名前で試験にも出るが、『パスの外向き脱出』という気持ちは近い。今日はまず Web のパラメータ結合を押さえる。"

  # ============================================================
  # 攻撃の流れ
  # ============================================================
  - id: "attack_flow"
    slideIndex: 6
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "流れは短く言うと、入力点を見つけて、親へ登る列を試し、エンコードや長さを調整して、設定ファイルやソースが読めるか確認する、の四段が典型。"
        subtitle: "流れは短く言うと、入力点を見つけて、親へ登る列を試し、エンコードや長さを調整して、設定ファイルやソースが読めるか確認する、の四段が典型。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "読めたあと、そこからパスワードや鍵が書いてあったら終わりなのだ……。"
        subtitle: "読めたあと、そこからパスワードや鍵が書いてあったら終わりなのだ……。"
      - type: dialogue
        character: metan
        face: "困り"
        text: "その通り。機密の『読取』が実害の中心。だから対策も、開いてよい実パスを厳しく縛るのが本丸よ。"
        subtitle: "その通り。機密の『読取』が実害の中心。だから対策も、開いてよい実パスを厳しく縛るのが本丸よ。"

  # ============================================================
  # OS の違い
  # ============================================================
  - id: "os_diff"
    slideIndex: 7
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "Linux と Windows で、パスの書き方が違うのだ？　試験はどっちも出るのだ？"
        subtitle: "Linux と Windows で、パスの書き方が違うのだ？　試験はどっちも出るのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "スラッシュとバックスラッシュ、ドライブレター、UNC 形式など、表記は違う。原理は同じで、正規化したうえで許可範囲に収まるか、よ。"
        subtitle: "スラッシュとバックスラッシュ、ドライブレター、UNC 形式など、表記は違う。原理は同じで、正規化したうえで許可範囲に収まるか、よ。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "長文では具体的な記号より『解決後のパスで判定』という一言が正解側になりやすいわ。"
        subtitle: "長文では具体的な記号より『解決後のパスで判定』という一言が正解側になりやすいわ。"

  # ============================================================
  # 対策① 正規化・ベース固定
  # ============================================================
  - id: "defense_canonical"
    slideIndex: 8
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の型その一。公開するルートを一つ決め、ユーザー入力と結合したあとにパスを解決し、その絶対パスがルート配下の子孫かどうかを検証する。"
        subtitle: "対策の型その一。公開するルートを一つ決め、ユーザー入力と結合したあとにパスを解決し、その絶対パスがルート配下の子孫かどうかを検証する。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "正規化する前にチェックするとダメなのだ？"
        subtitle: "正規化する前にチェックするとダメなのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "典型の落とし穴はそれ。エンコードや別表記で、検査時と実行時で食い違うから。試験の正攻法は『正規化のあと』がキーワードになりやすいわ。"
        subtitle: "典型の落とし穴はそれ。エンコードや別表記で、検査時と実行時で食い違うから。試験の正攻法は『正規化のあと』がキーワードになりやすいわ。"

  # ============================================================
  # 対策② 間接参照
  # ============================================================
  - id: "defense_indirect"
    slideIndex: 9
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策の型その二。パス文字列をユーザーに渡さず、内部IDだけを渡してサーバ側の許可リストから実ファイルを引く。第12回の『意図IDと表』と発想は近いわ。"
        subtitle: "対策の型その二。パス文字列をユーザーに渡さず、内部IDだけを渡してサーバ側の許可リストから実ファイルを引く。第12回の『意図IDと表』と発想は近いわ。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "ユーザーはパスを知らないから、ドットドットも入れられないのだ。"
        subtitle: "ユーザーはパスを知らないから、ドットドットも入れられないのだ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そのとおり。実装コストはかかるが、試験では『間接参照』が強い選択肢として出ることがあるわ。"
        subtitle: "そのとおり。実装コストはかかるが、試験では『間接参照』が強い選択肢として出ることがあるわ。"

  # ============================================================
  # LFI / RFI / 混同防止
  # ============================================================
  - id: "compare_lfi"
    slideIndex: 10
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "ローカルファイルインクルージョンと、今日の話は同じなのだ？"
        subtitle: "ローカルファイルインクルージョンと、今日の話は同じなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "用語の置き場は文献でぶれるが、試験ではこう切ると混乱が減る。ディレクトリトラバーサルは『パス操作で任意ファイル読み』の広い話として語られることもある。LFI は include などでサーバ内ファイルを取り込む系としてセットで覚えられていることが多いわ。"
        subtitle: "用語の置き場は文献でぶれるが、試験ではこう切ると混乱が減る。ディレクトリトラバーサルは『パス操作で任意ファイル読み』の広い話として語られることもある。LFI は include などでサーバ内ファイルを取り込む系としてセットで覚えられていることが多いわ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "RFI は外部URLからコードを取り込む設定ミス。第11回のSSRF はサーバがHTTPで取りに行く別軸。悪い文字列が『どの機構』に効くかで並べ替えるの。"
        subtitle: "RFI は外部URLからコードを取り込む設定ミス。第11回のSSRF はサーバがHTTPで取りに行く別軸。悪い文字列が『どの機構』に効くかで並べ替えるの。"

  # ============================================================
  # 試験のひっかけ
  # ============================================================
  - id: "exam_tips"
    slideIndex: 11
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "試験で、どの対策と混ぜて出されやすいのだ？"
        subtitle: "試験で、どの対策と混ぜて出されやすいのだ？"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "一つ、WAF だけあればパストラバーサルも丸ごと防げる、は短絡的になりやすい。アプリの結合ロジックは別レイヤよ。"
        subtitle: "一つ、WAF だけあればパストラバーサルも丸ごと防げる、は短絡的になりやすい。アプリの結合ロジックは別レイヤよ。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "二つ、第11回のSSRF対策は『外向きHTTPの届け先』の話。今日はローカルファイルのパス。キーワードで混ぜないで。"
        subtitle: "二つ、第11回のSSRF対策は『外向きHTTPの届け先』の話。今日はローカルファイルのパス。キーワードで混ぜないで。"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "三つ、第12回のオープンリダイレクトはブラウザの遷移先URL。今日はサーバが開くファイルパス。別カテゴリよ。"
        subtitle: "三つ、第12回のオープンリダイレクトはブラウザの遷移先URL。今日はサーバが開くファイルパス。別カテゴリよ。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "誰が・どの経路で・何を開くか、のラベルをはっきりさせるのだ。"
        subtitle: "誰が・どの経路で・何を開くか、のラベルをはっきりさせるのだ。"

  # ============================================================
  # まとめ
  # ============================================================
  - id: "summary"
    slideIndex: 12
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "まとめ。ディレクトリトラバーサルは、ユーザー入力がファイルパスに不適切に混ざり、公開範囲外のファイルを読まれる欠陥。対策の柱は、正規化後にベースディレクトリ配下か検証すること、と、パス文字列を渡さず間接参照すること、の二本よ。"
        subtitle: "まとめ。ディレクトリトラバーサルは、ユーザー入力がファイルパスに不適切に混ざり、公開範囲外のファイルを読まれる欠陥。対策の柱は、正規化後にベースディレクトリ配下か検証すること、と、パス文字列を渡さず間接参照すること、の二本よ。"
      - type: dialogue
