title: "【登録セキスペ】Check! Q1–Q4：セキュリティの定義と分類"

# 教科書 Check! Q1–Q4（セキュリティ／情報セキュリティ／分類）Shorts 専用
# - 本編なし。generate-shorts のみで縦長 MP4 を出力

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/background.png"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 4000
  text: "セキュリティと情報セキュリティ、混同してないのだ！？"
  emphasis:
    - "セキュリティ"
    - "情報セキュリティ"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.15
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "q1_security"
    chapter:
      label: "Q1：セキュリティとは"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "【Q1】セキュリティって、何なのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "組織や個人の資産への脅威から、その資産を保護する対策や活動よ。人・物・情報すべて含む概念ね。"
        se: "./se/emphasis_chime.mp3"

  - id: "q2_infosec"
    chapter:
      label: "Q2：情報セキュリティとは"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "【Q2】情報セキュリティは、セキュリティと違うのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "情報資産を守るための対策や活動——セキュリティのうち、情報に特化した部分よ。"
        se: "./se/emphasis_chime.mp3"

  - id: "q3_classification"
    chapter:
      label: "Q3：情報セキュリティの分類"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "【Q3】情報セキュリティは、どう分類するのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "物理的・論理的・人的の三つ。施錠は物理、パスワードは論理、教育は人的——こう覚えるわ。"
        emphasis: ["物理的", "論理的", "人的"]
        se: "./se/callout_pop.mp3"

  - id: "q4_logical"
    chapter:
      label: "Q4：論理的セキュリティの分類"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "【Q4】論理的セキュリティの中身は？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "技術的と管理的。FWや暗号が技術、規程や手順が管理。試験の定番分類よ。"
        emphasis: ["技術的", "管理的"]
        se: "./se/correct_bell.mp3"

shorts:
  - id: "check-q1-q4"
    title: "Check! Q1–Q4：セキュリティの定義と分類"
    pickScenes: ["q1_security", "q2_infosec", "q3_classification", "q4_logical"]
    overlayCaption: "📘 Check! Q1–Q4"
    cta: "👇 本編でCIA三要素も解説"
