        subtitle: "対策：OS・ソフトの更新、セキュリティソフト導入、信頼できるサイトのみ利用、バックアップ（3-2-1ルール）。インシデント対応：封じ込め→根絶→復旧。身代金は払わない。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "試験キーワード：マルウェア、ランサムウェア、トロイの木馬、ワーム、スパイウェア、ボットネット、脆弱性、ゼロデイ、CVE、パッチ管理、インシデント対応。"
        subtitle: "試験キーワード：マルウェア、ランサムウェア、トロイの木馬、ワーム、スパイウェア、ボットネット、脆弱性、ゼロデイ、CVE、パッチ管理、インシデント対応。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "全部覚えたのだ！次回はSQLインジェクション回なのだ！楽しみなのだ！"
        subtitle: "全部覚えたのだ！次回はSQLインジェクション回なのだ！楽しみなのだ！"
      - type: dialogue
