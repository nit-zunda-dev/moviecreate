  # ============================================================
  # 8. めたんのセキュリティ講座（解説コーナー）
  # ============================================================
  - id: "lecture-intro"
    background: "./image/background/bg_security_lesson.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "はい、「めたんのセキュリティ講座」よ。今日のマルウェアを試験対策の視点で深掘りするわ。支援士試験を目指している人は特に注目してね。"
        subtitle: "はい、「めたんのセキュリティ講座」よ。今日のマルウェアを試験対策の視点で深掘りするわ。支援士試験を目指している人は特に注目してね。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "今日はマルウェアの種類がいっぱい出てきたのだ。整理するのだ！"
        subtitle: "今日はマルウェアの種類がいっぱい出てきたのだ。整理するのだ！"

  - id: "lecture-malware-classification"
    background: "./image/background/bg_security_lesson.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "マルウェアの分類を試験向けにまとめるわ。ウイルス——他のファイルに寄生して自己複製。感染させたファイルを開かれることで拡散する。"
        subtitle: "マルウェアの分類を試験向けにまとめるわ。ウイルス——他のファイルに寄生して自己複製。感染させたファイルを開かれることで拡散する。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ワーム——宿主不要で単体で自己複製・拡散。ネットワークを通じて急速に広がる。トロイの木馬——正規ソフトに偽装して侵入。自己複製はしないが他のマルウェアを呼び込む。"
        subtitle: "ワーム——宿主不要で単体で自己複製・拡散。ネットワークを通じて急速に広がる。トロイの木馬——正規ソフトに偽装して侵入。自己複製はしないが他のマルウェアを呼び込む。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ランサムウェア——ファイルを暗号化して身代金を要求。スパイウェア——秘密裏に情報を収集・送信。ボット——攻撃者の命令を受けてDDoS攻撃などに加担する。"
        subtitle: "ランサムウェア——ファイルを暗号化して身代金を要求。スパイウェア——秘密裏に情報を収集・送信。ボット——攻撃者の命令を受けてDDoS攻撃などに加担する。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "ボット！？自分のPCが攻撃に使われるのだ！？"
        subtitle: "ボット！？自分のPCが攻撃に使われるのだ！？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "ボットに感染したPCの集合体を「ボットネット」と言う。感染に気づかないまま踏み台にされるケースもある。これも試験頻出よ。"
        subtitle: "ボットに感染したPCの集合体を「ボットネット」と言う。感染に気づかないまま踏み台にされるケースもある。これも試験頻出よ。"

  - id: "lecture-vulnerability"
    background: "./image/background/bg_security_lesson.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "次に重要な概念——脆弱性とパッチ管理。脆弱性（ぜいじゃくせい）とはソフトウェアのセキュリティ上の欠陥のこと。CVE（Common Vulnerabilities and Exposures）という番号で管理される。"
        subtitle: "次に重要な概念——脆弱性とパッチ管理。脆弱性（ぜいじゃくせい）とはソフトウェアのセキュリティ上の欠陥のこと。CVE（Common Vulnerabilities and Exposures）という番号で管理される。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "シーブイイー！？何それなのだ？"
        subtitle: "シーブイイー！？何それなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "脆弱性ごとに「CVE-2024-12345」のような一意の番号が付く。この番号で世界中のセキュリティ担当者が同じ脆弱性について話せるようになっているの。"
        subtitle: "脆弱性ごとに「CVE-2024-12345」のような一意の番号が付く。この番号で世界中のセキュリティ担当者が同じ脆弱性について話せるようになっているの。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "「ゼロデイ脆弱性」も重要用語よ。発見されたけどまだパッチ（修正プログラム）が存在しない——つまり対策がゼロの日から悪用されている脆弱性のこと。"
        subtitle: "「ゼロデイ脆弱性」も重要用語よ。発見されたけどまだパッチ（修正プログラム）が存在しない——つまり対策がゼロの日から悪用されている脆弱性のこと。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "ゼロデイは対策がないから怖いのだ！"
        subtitle: "ゼロデイは対策がないから怖いのだ！"
      - type: dialogue
        character: metan
        face: "通常"
        text: "そう。だからベンダーがパッチをリリースしたら速やかに適用する——これがパッチ管理の基本。既知の脆弱性への攻撃は、アップデートで防げることが多い。"
        subtitle: "そう。だからベンダーがパッチをリリースしたら速やかに適用する——これがパッチ管理の基本。既知の脆弱性への攻撃は、アップデートで防げることが多い。"

  - id: "lecture-incident-response"
    background: "./image/background/bg_security_lesson.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "もう一つ試験頻出の「インシデント対応」フロー。NIST（米国国立標準技術研究所）の定義では、準備→検知・分析→封じ込め→根絶→復旧→事後対応の流れが基本とされている。"
        subtitle: "もう一つ試験頻出の「インシデント対応」フロー。NIST（米国国立標準技術研究所）の定義では、準備→検知・分析→封じ込め→根絶→復旧→事後対応の流れが基本とされている。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "今回の事件は……まずネット切断で「封じ込め」、PCを初期化して「根絶」、バックアップから「復旧」——の順番なのだ！"
        subtitle: "今回の事件は……まずネット切断で「封じ込め」、PCを初期化して「根絶」、バックアップから「復旧」——の順番なのだ！"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "完璧よ。このフローは試験でも、実務でも大切。慌てないために、事前に手順を決めておくことが「準備」の段階ね。"
        subtitle: "完璧よ。このフローは試験でも、実務でも大切。慌てないために、事前に手順を決めておくことが「準備」の段階ね。"

  - id: "lecture-closing"
    background: "./image/background/bg_security_lesson.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "今日のまとめ。マルウェアの種類：ウイルス・ワーム・トロイの木馬・ランサムウェア・スパイウェア・ボット。感染経路：添付ファイル・不正サイト・USB・脆弱性。"
        subtitle: "今日のまとめ。マルウェアの種類：ウイルス・ワーム・トロイの木馬・ランサムウェア・スパイウェア・ボット。感染経路：添付ファイル・不正サイト・USB・脆弱性。"
