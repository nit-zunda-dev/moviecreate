        text: "ランサムウェア感染後のPCは、セキュリティソフトでスキャンしても完全に除去できないことがある。OSを再インストールして完全にクリーンな状態に戻すのが最も確実な方法よ。"
        subtitle: "ランサムウェア感染後のPCは、セキュリティソフトでスキャンしても完全に除去できないことがある。OSを再インストールして完全にクリーンな状態に戻すのが最も確実な方法よ。"
      - type: dialogue
