  # ============================================================
  # 6. 再発防止策の設計
  # ============================================================
  - id: "prevention-strategy"
    background: "./image/background/bg_detective_whiteboard.png"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "最後に再発防止策をまとめる。マルウェア感染を防ぐポイントは五つ。"
        subtitle: "最後に再発防止策をまとめる。マルウェア感染を防ぐポイントは五つ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "一つ目——OSとソフトウェアを常に最新の状態に保つ。アップデートには脆弱性の修正が含まれている。「アップデートが面倒」と放置するのが一番危険。"
        subtitle: "一つ目——OSとソフトウェアを常に最新の状態に保つ。アップデートには脆弱性の修正が含まれている。「アップデートが面倒」と放置するのが一番危険。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "二つ目——セキュリティソフト（ウイルス対策ソフト）を導入して、常時スキャンを有効にする。定義ファイルの更新も自動にしておくこと。"
        subtitle: "二つ目——セキュリティソフト（ウイルス対策ソフト）を導入して、常時スキャンを有効にする。定義ファイルの更新も自動にしておくこと。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "三つ目——信頼できるサイトからしかダウンロードしない。公式サイト・公式ストアを使い、「無料で入手できます」という誘い文句には疑いを持つ。"
        subtitle: "三つ目——信頼できるサイトからしかダウンロードしない。公式サイト・公式ストアを使い、「無料で入手できます」という誘い文句には疑いを持つ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "四つ目——メールの添付ファイルや不審なリンクを不用意に開かない。前回も言ったフィッシングと組み合わさることが多い。"
        subtitle: "四つ目——メールの添付ファイルや不審なリンクを不用意に開かない。前回も言ったフィッシングと組み合わさることが多い。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "五つ目——バックアップを定期的に取る。3-2-1ルールが理想よ。3つのコピー、2種類の媒体、1つはオフサイト保管——つまりクラウドに保存ね。"
        subtitle: "五つ目——バックアップを定期的に取る。3-2-1ルールが理想よ。3つのコピー、2種類の媒体、1つはオフサイト保管——つまりクラウドに保存ね。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "3-2-1ルール！かっこいいのだ！三つコピー、二種類の媒体、一つはクラウドなのだ！"
        subtitle: "3-2-1ルール！かっこいいのだ！三つコピー、二種類の媒体、一つはクラウドなのだ！"
      - type: dialogue
        character: tsumugi
        face: "通常"
        text: "今後はちゃんとバックアップする……絶対にする。"
        subtitle: "今後はちゃんとバックアップする……絶対にする。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "あとランサムウェアの場合、感染したPCをネットワークにつないだまま放置すると、社内LAN全体や家族のPCにも広がる可能性がある。今回のように早期に切断できたのは正解よ。"
        subtitle: "あとランサムウェアの場合、感染したPCをネットワークにつないだまま放置すると、社内LAN全体や家族のPCにも広がる可能性がある。今回のように早期に切断できたのは正解よ。"

