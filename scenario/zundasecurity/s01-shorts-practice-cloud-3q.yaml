title: "【登録セキスペ】確認問題3選：ISMAP・PaaS・VDI"

# 教科書 1.5 確認問題（R7春/R4春/R3春 午前Ⅱ）Shorts 専用
# - 本編なし。generate-shorts のみで縦長 MP4 を出力

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/background.png"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 4000
  text: "PaaSとIaaS、DBMSのパッチはどっちが管理するのだ！？"
  emphasis:
    - "PaaS"
    - "IaaS"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.15
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "practice_ismap"
    chapter:
      label: "確認問題：ISMAP（R7 春 午前Ⅱ 問11）"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "問題——政府情報システムのためのセキュリティ評価制度ISMAPの説明はどれか。ア個人情報保護マーク、イ海外移転の特例、ウ政府クラウド調達の事前評価登録、エプライベートクラウド向け国際規格。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "アはプライバシーマーク系、イは越境移転、エは別の規格の話…… 正解はウ！ 政府が求めるセキュリティを満たすクラウドを事前評価・登録する制度なのだ！"
        emphasis: ["ISMAP"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解はウ。調達時のセキュリティ水準確保と円滑な導入が目的。官公庁向けクラウド選定で名前が出る定番よ。"
        se: "./se/correct_bell.mp3"

  - id: "practice_paas_responsibility"
    chapter:
      label: "確認問題：PaaSと共有責任（R4 春 午前Ⅱ 問12）"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "問題——利用者が①データのアクセス制御・暗号化、②アプリのセキュアプログラミングを担い、事業者が③DBMS、④OS、⑤ハードウェアを担うのはどのクラウド形態か。"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "IaaSだとOSも利用者側…… SaaSだとアプリも事業者…… ①②が利用者、③④⑤が事業者なら正解はウ、PaaSなのだ！"
        emphasis: ["PaaS"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解はウ。PaaSは基盤からDBMSまで事業者、アプリとデータは利用者。SaaSは設定中心、IaaSはOS以上が利用者——境界を表で覚えて。"
        se: "./se/correct_bell.mp3"

  - id: "practice_vdi_screen"
    chapter:
      label: "確認問題：VDIと画面転送（R3 春 午前Ⅱ 問16）"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "問題——社内PCからDMZ上のVDIサーバの仮想マシンにログインしてインターネット閲覧する。マルウェア侵入とファイル漏えいを防ぐ条件はどれか。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "ファイル転送も使うと漏えい経路になる…… 正解はイ！ PCとVDIサーバ間は画面転送プロトコルだけに限定するのだ！"
        emphasis: ["画面転送"]
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解はイ。ブラウザはVDI側で動き、社内PCには画面情報だけ渡す。ファイル転送を許すアは漏えい・感染経路になりうるわ。"
        se: "./se/correct_bell.mp3"

  - id: "trap_cloud_models"
    chapter:
      label: "ひっかけ整理：SaaS・PaaS・IaaSの境界"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "SaaS＝アプリまで事業者、利用者は設定・データ。PaaS＝DBMS・OSまで事業者、利用者はアプリ開発とデータ。IaaS＝HWまで事業者、利用者はOS以上。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "下に行くほど自社で触る範囲が増える——三つ、境界を間違えないのだ！"
        emphasis: ["SaaS", "PaaS", "IaaS"]
        se: "./se/callout_pop.mp3"

shorts:
  - id: "ismap-quiz"
    title: "ISMAP四択の正解（R7春 問11）"
    pickScenes: ["practice_ismap"]
    overlayCaption: "📝 確認問題"
    cta: "👇 Check! Q4も概要欄"

  - id: "paas-quiz"
    title: "PaaS共有責任の正解（R4春 問12）"
    pickScenes: ["practice_paas_responsibility", "trap_cloud_models"]
    overlayCaption: "📝 確認問題"
    cta: "👇 Check! Q1–Q2も本編で"

  - id: "vdi-quiz"
    title: "VDI画面転送の正解（R3春 問16）"
    pickScenes: ["practice_vdi_screen"]
    overlayCaption: "📝 確認問題"
    cta: "👇 Check! Q8も概要欄"
