title: "【登録セキスペ】パスワードクラックの仕組みと対策"

# 「パスワードクラックの解説図解」Shorts 専用
# - generate-shorts --ids password-crack-full で縦長 MP4 を出力

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.3
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.3
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.25
    postPhonemeLength: 0.05
  defaultBackground: "./image/background/background.png"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 3500
  text: "パスワードクラックは知識認証が標的—— 辞書攻撃と総当たり、MFAと試行制限で守るのだ！"
  emphasis:
    - "パスワードクラック"
    - "辞書攻撃"
    - "MFA"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.15
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "q1_targets"
    chapter:
      label: "Q1：どの認証システムに有効か"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Q1——パスワードクラックはどんな認証に有効？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "ユーザーが覚える知識認証—— IDとパスワード認証が標的なのだ！ 弱いPW、使い回し、漏えいPWは簡単に突破されるのだ！"
        emphasis: ["知識認証", "使い回し"]
        se: "./se/correct_bell.mp3"

  - id: "q1_attack_flow"
    chapter:
      label: "Q1補足：攻撃の流れと対象例"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "攻撃者は何をする？"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "辞書攻撃や総当たりでPWを推測、ログイン成功で不正アクセス—— Web、SSH、メールなどが対象、MFAがあれば突破は難しいのだ！"
        emphasis: ["辞書攻撃", "総当たり", "MFA"]
        se: "./se/correct_bell.mp3"

  - id: "q2_prevention"
    chapter:
      label: "Q2：予防・防止の対策"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Q2——パスワードクラックの予防対策は？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "長く複雑なPW、パスワードマネージャ、試行回数制限、MFA、CAPTCHA—— 保存はソルト付きハッシュ、bcryptやArgon2で平文保存は禁止なのだ！"
        emphasis: ["試行回数制限", "ソルト付きハッシュ"]
        se: "./se/correct_bell.mp3"

  - id: "q2_prevention_detail"
    chapter:
      label: "Q2補足：特に重要な四つの対策"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "特に重要な対策は？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "MFA、長いPW、試行制限、ソルト付きハッシュ—— 漏えいPW禁止とユーザー教育もセット、多層防御で成功率を下げるのだ！"
        emphasis: ["MFA", "多層防御"]
        se: "./se/correct_bell.mp3"

  - id: "q3_detection"
    chapter:
      label: "Q3：検知方法"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "Q3——パスワードクラックの検知方法は？"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "ログイン失敗の急増、同一IPからの大量試行、複数アカウントへの集中攻撃—— 異常な時間・場所のログインも怪しいのだ！"
        emphasis: ["ログイン失敗", "同一IP"]
        se: "./se/correct_bell.mp3"

  - id: "q3_detection_detail"
    chapter:
      label: "Q3補足：SIEMとインシデント対応"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "ログはどう活かす？"
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "認証・WAF・アプリログをSIEMで相関分析、漏えいID/PWの使い回しも検知—— アラート、自動ロック、調査、インシデント対応へつなぐのだ！"
        emphasis: ["SIEM", "クレデンシャルスタッフィング"]
        se: "./se/correct_bell.mp3"

  - id: "summary_exam"
    chapter:
      label: "まとめ：試験のポイント"
    lines:
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "基本は強い認証情報、試行制限、MFA、ログ監視—— この四つセットで覚えるのだ！"
        emphasis: ["試行制限", "ログ監視"]
        se: "./se/callout_pop.mp3"

shorts:
  - id: "password-crack-full"
    title: "パスワードクラックの仕組みと対策"
    pickScenes:
      - "q1_targets"
      - "q1_attack_flow"
      - "q2_prevention"
      - "q2_prevention_detail"
      - "q3_detection"
      - "q3_detection_detail"
      - "summary_exam"
    overlayCaption: "🔐 パスワードクラック"
    cta: "👇 関連動画は概要欄"
