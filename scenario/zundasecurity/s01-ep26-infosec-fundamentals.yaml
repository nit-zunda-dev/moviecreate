title: "【登録セキスペ 第26回｜Season5】情報セキュリティ基礎—CIA三要素とCheck!10問＋フェールセーフのだ！"

# =============================================================================
# Season 5 第1回：情報セキュリティの基礎（教科書 Check! Q1–Q10 ＋ 確認問題）
# - 詳細図: s01-ep26-infosec-fundamentals-study-slides.html ← global.slidesHtml
# -----------------------------------------------------------------------------
# 台本 id (scenes)          | slideIndex | study スライド
# --------------------------|------------|------------------
# incident                  | 0          | 導入（試験でCIAと混同）
# opening                   | 1          | 第26回・Check!10問の地図
# cia_triad                 | 2          | Q1 三つの特性
# cia_maintain              | 3          | Q2 確保・維持の考慮点
# additional_props          | 4          | Q3–Q4 付加的な特性
# measure_functions         | 5          | Q5 対策の機能
# external_internal         | 6          | Q6–Q7 外部攻撃・内部犯罪
# before_measures           | 7          | Q8 対策検討の前に
# principles                | 8          | Q9–Q10 最小権限・職務分離
# practice_fail_safe        | 9          | 確認問題（H31 午前Ⅰ 問16）
# design_concepts           | 10         | フールプルーフ等の整理
# summary                   | 11         | まとめ
# =============================================================================

characters:
  metan:
    speakerId: 2
    image: "./image/metan/通常.png"
    position: right
    subtitleColor: "#FF88BB"
    voice:
      speedScale: 1.25
      intonationScale: 1.05

  zundamon:
    speakerId: 3
    image: "./image/zundamon/通常.png"
    position: left
    subtitleColor: "#88DD44"
    voice:
      speedScale: 1.25
      intonationScale: 1.1

global:
  defaultSpeaker: "zundamon"
  voice:
    speedScale: 1.2
    postPhonemeLength: 0.08
  defaultBackground: "./image/background/background.png"
  slidesHtml: "./s01-ep26-infosec-fundamentals-study-slides.html"
  bgm:
    default: "./bgm/パステルハウス.mp3"
    volume: 0.12
  endScreen:
    enabled: true
    durationMs: 7000
    subscribeText: "チャンネル登録で次回も見逃さない！"
    nextEpisode:
      title: "次回：ISMSと組織のセキュリティマネジメント"

output:
  fps: 30
  width: 1280
  height: 720

hook:
  durationMs: 5000
  text: "可用性と機密性、どっちが正解なのだ！？"
  emphasis:
    - "可用性"
    - "機密性"
  character: zundamon
  face: "驚き"
  flash:
    color: "#ff2244"
    durationMs: 250
  zoom:
    from: 1.00
    to: 1.18
  shake: true
  bgm: "./bgm/intro_tense.mp3"
  se: "./se/hook_impact.mp3"

scenes:
  - id: "incident"
    slideIndex: 0
    chapter:
      label: "導入：教科書のCheck!が試験の土台"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "模試で『情報の三要素』って出たのに、真正性まで全部選んじゃったのだ…… 教科書のCheck!、ちゃんとやればよかったのだ！"
        se: "./se/warn_buzz.mp3"
      - type: dialogue
        character: metan
        face: "通常"
        text: "今日はその Check! 十問と、平成31年春のフェールセーフ問題まで一気にいくわ。Season5、組織の話の前に『土台』を固める回よ。"
        se: "./se/emphasis_chime.mp3"

  - id: "opening"
    slideIndex: 1
    chapter:
      label: "第26回の地図：Check!10問＋確認問題"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "流れはこう。CIA三要素と付加的な特性、対策の機能、外部と内部、対策の前準備、最小権限と職務分離。最後にフェールセーフの四択。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "10問プラス確認問題、全部動画で回収するのだ！ Season5 スタートなのだ！"
        se: "./se/callout_pop.mp3"

  - id: "cia_triad"
    slideIndex: 2
    chapter:
      label: "Q1：情報セキュリティの三つの特性"
    bgm: "./bgm/main_serious.mp3"
    lines:
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "三つの特性って、なんなのだ？ セキュリティ、プライバシー、コンプライアンス……？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "違うわ。基本は CIA よ。機密性——知らない人に見せない。完全性——正しくない情報を防ぐ。可用性——必要なとき使える。試験の『三要素』はほぼこれ。"
        se: "./se/emphasis_chime.mp3"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "C・I・A、頭文字で覚えるのだ！"
        emphasis: ["機密性", "完全性", "可用性"]
        se: "./se/callout_pop.mp3"

  - id: "cia_maintain"
    slideIndex: 3
    chapter:
      label: "Q2：三特性を確保・維持する考慮点"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "機密性はアクセス制御と暗号化、知る必要のある人だけ。完全性は改ざん防止、ハッシュや署名、権限管理。可用性は冗長化、バックアップ、障害対策、BCP。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "攻撃の種類で『何が壊れるか』を当てはめるのだ。漏洩は機密性、改ざんは完全性、サービス停止は可用性なのだ！"
        se: "./se/warn_buzz.mp3"

  - id: "additional_props"
    slideIndex: 4
    chapter:
      label: "Q3–Q4：付加的な特性と考慮点"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "付加的って、CIA にプラスαなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "その通り。真正性——相手や情報源が本物か。否認防止——後から『やってない』と言えない。信頼性——期待どおり動く・信頼できる。教材ではこの三つが定番。"
        se: "./se/emphasis_chime.mp3"
      - type: dialogue
        character: metan
        face: "通常"
        text: "確保の考慮は、証明書やデジタル署名で真正性と否認防止、監査ログと運用で信頼性——第21回の PKI や署名の話とつながるわ。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "三要素と付加、混同しないのだ！"
        se: "./se/callout_pop.mp3"

  - id: "measure_functions"
    slideIndex: 5
    chapter:
      label: "Q5：情報セキュリティ対策の機能"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "対策には機能があるの。予防——起きる前に防ぐ。検知——起きたことを知る。復旧——被害を戻す。教材によっては抑止や証拠保全もセットで出るわ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "FW は予防、ログ監視は検知、バックアップから戻すのは復旧——こう分類するのだ！"
        se: "./se/emphasis_chime.mp3"

  - id: "external_internal"
    slideIndex: 6
    chapter:
      label: "Q6–Q7：外部攻撃と内部犯罪で強化する機能"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "外部のサイバー攻撃には、予防を高めるのが基本。パッチ、FW、WAF、認証強化。加えて検知——IDS、SIEM——で侵入の気配を掴む。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "内部犯罪は検知が効きやすい。操作ログ、権限の異常、職務分離の不備の監査。予防として最小権限と承認フローもセットよ。"
      - type: dialogue
        character: zundamon
        face: "驚き"
        text: "外は『入ってこない』、内は『悪さに気づく』——向きが違うのだ！"
        se: "./se/callout_pop.mp3"

  - id: "before_measures"
    slideIndex: 7
    chapter:
      label: "Q8：対策を検討する前に行うこと"
    lines:
      - type: dialogue
        character: zundamon
        face: "困り"
        text: "いきなりFWを買えばいいのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "違うわ。資産の洗い出し、脅威と脆弱性の把握、リスクアセスメント、方針や要求事項の定義——対策の前に『何を守り、どれだけ危ないか』を決めるの。"
        se: "./se/warn_buzz.mp3"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "道具ありきはダメなのだ。リスクアセスメント先なのだ！"
        emphasis: ["リスクアセスメント"]
        se: "./se/emphasis_chime.mp3"

  - id: "principles"
    slideIndex: 8
    chapter:
      label: "Q9–Q10：最小権限と職務分離"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "最小権限の原則——業務に必要な最小限の権限だけを与える。職務分離——一人が重要処理を端から端まで独占しない。申請と承認、開発と本番運用の分離が典型。"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "ずんだもんに管理者権限、やめてほしいのだ…… 最小権限なのだ！"
        se: "./se/callout_pop.mp3"
      - type: dialogue
        character: metan
        face: "笑い"
        text: "その気持ち、正しいわ。内部不正の予防と検知、両方に効く原則よ。"

  - id: "practice_fail_safe"
    slideIndex: 9
    chapter:
      label: "確認問題：フェールセーフ（H31 春 午前Ⅰ 問16）"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "問題文——フェールセーフの考えに基づいて設計したものはどれか。まず四択を読むわ。"
      - type: dialogue
        character: zundamon
        face: "通常"
        text: "アは電池の向きを逆にすると入らない。イは交通管制が故障したら信号が赤。ウはNIC二重化。エはRAID1。…… イが安全側に倒すやつなのだ？"
      - type: dialogue
        character: metan
        face: "通常"
        text: "正解はイ。故障時に安全な状態——信号は赤——へ遷移するのがフェールセーフ。FWが落ちたら全部遮断、も同じ発想よ。"
        se: "./se/correct_bell.mp3"

  - id: "design_concepts"
    slideIndex: 10
    chapter:
      label: "ひっかけ整理：フールプルーフ・フェールソフト・フォールトトレランス"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "アはフールプルーフ——人為ミスを起こしにくくする。ウはフェールソフト——故障しても一部機能を維持。エはフォールトトレランス——冗長で信頼性向上。用語を混ぜないの。"
      - type: dialogue
        character: zundamon
        face: "笑い"
        text: "安全に倒す・ミス防止・動き続ける・二重化——四つ、別物なのだ！"
        emphasis: ["フェールセーフ", "フールプルーフ", "フェールソフト", "フォールトトレランス"]
        se: "./se/callout_pop.mp3"

  - id: "summary"
    slideIndex: 11
    chapter:
      label: "まとめ：Check!10問とフェールセーフ"
    bgm: "./bgm/outro_warm.mp3"
    lines:
      - type: dialogue
        character: metan
        face: "通常"
        text: "まとめよ。CIAと付加特性、予防・検知・復旧、外部と内部、リスクアセスメント、最小権限と職務分離。確認問題はフェールセーフ＝イ。"
      - type: dialogue
        character: metan
        face: "通常"
        text: "次回は ISMS と組織のセキュリティマネジメント——今日の土台の上に載せていくわ。"
        se: "./se/correct_bell.mp3"
      - type: dialogue
        character: zundamon
        face: "喜び"
        text: "教科書のCheck!、動画で全部回収したのだ！ チャンネル登録と高評価、よろしくなのだ！"
        se: "./se/callout_pop.mp3"

shorts:
  - id: "check-q1-q2"
    title: "Check! Q1–Q2：CIA三要素と確保の考え方"
    pickScenes: ["cia_triad", "cia_maintain"]
    overlayCaption: "📘 Check! Q1–Q2"
    cta: "👇 本編でCheck!10問"

  - id: "check-q3-q4"
    title: "Check! Q3–Q4：付加的な特性と確保の考え方"
    pickScenes: ["additional_props"]
    overlayCaption: "📘 Check! Q3–Q4"
    cta: "👇 本編でCheck!10問"

  - id: "check-q5"
    title: "Check! Q5：情報セキュリティ対策の機能"
    pickScenes: ["measure_functions"]
    overlayCaption: "📘 Check! Q5"
    cta: "👇 本編でCheck!10問"

  - id: "check-q6-q7"
    title: "Check! Q6–Q7：外部攻撃と内部犯罪"
    pickScenes: ["external_internal"]
    overlayCaption: "📘 Check! Q6–Q7"
    cta: "👇 本編でCheck!10問"

  - id: "check-q8"
    title: "Check! Q8：対策検討の前にやること"
    pickScenes: ["before_measures"]
    overlayCaption: "📘 Check! Q8"
    cta: "👇 本編でCheck!10問"

  - id: "check-q9-q10"
    title: "Check! Q9–Q10：最小権限と職務分離"
    pickScenes: ["principles"]
    overlayCaption: "📘 Check! Q9–Q10"
    cta: "👇 本編でCheck!10問"

  - id: "cia-basics"
    title: "CIA三要素30秒"
    pickLines:
      - { sceneId: "opening", from: 0, to: 0 }
      - { sceneId: "cia_triad", from: 0, to: 2 }
    overlayCaption: "⚡ CIA基礎"
    cta: "👇 本編でCheck!10問"

  - id: "fail-safe-quiz"
    title: "フェールセーフ四択の正解"
    pickScenes: ["practice_fail_safe", "design_concepts"]
    overlayCaption: "📝 確認問題"
    cta: "本編で10問まとめて解説"

